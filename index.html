<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>持仓跟踪</title>

    <!-- ===== PWA 配置 ===== -->
    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="持仓跟踪" />
    <link rel="apple-touch-icon" href="icon-1024.png" />
    <meta name="theme-color" content="#f2f5fa" />

    <style>
        /* ===== CSS 变量（原样保留） ===== */
        :root {
            --radius-md: 20px;
            --radius-full: 50%;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        html, body {
            width: 100%;
            min-height: 100vh;
            background: #5c2600;
            display: flex;
            justify-content: center;
            padding: 4px;
            overflow-x: hidden;
        }
        .app-container {
            max-width: 480px;
            width: 100%;
            background: #ffffff;
            border-radius: var(--radius-md);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            padding: 14px 14px 20px;
            display: flex;
            flex-direction: column;
            align-self: flex-start;
            gap: 14px;
        }

        .summary-card {
            background: linear-gradient(145deg, #0b1a33, #132b4a);
            border-radius: var(--radius-md);
            padding: 14px 20px 12px 20px;
            color: white;
            flex-shrink: 0;
            cursor: default;
            user-select: none;
            -webkit-user-select: none;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.12);
        }
        .summary-today {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
        }
        .summary-today .today-label {
            font-size: 13px;
            font-weight: 500;
            opacity: 0.7;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .summary-today .today-label svg {
            width: 16px;
            height: 16px;
            stroke: rgba(255,255,255,0.7);
            stroke-width: 2;
            fill: none;
        }
        .summary-today .today-value {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.2;
            margin-top: 0px;
        }
        .summary-today .today-value.positive { color: #E63946; }
        .summary-today .today-value.negative { color: #2A9D8F; }
        .summary-today .today-value.neutral { color: #94a3b8; }
        .summary-today .today-value.privacy { color: #94a3b8; letter-spacing: 4px; }

        .summary-divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.10);
            margin: 0 0 10px 0;
        }

        .summary-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .summary-stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            position: relative;
            gap: 2px;
        }
        .summary-stat-item:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 15%;
            height: 70%;
            width: 1px;
            background: rgba(255, 255, 255, 0.12);
        }
        .summary-stat-item .stat-label-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .summary-stat-item .stat-icon {
            width: 14px;
            height: 14px;
            stroke: rgba(255, 255, 255, 0.5);
            stroke-width: 2;
            fill: none;
            flex-shrink: 0;
        }
        .summary-stat-item .stat-label {
            font-size: 10px;
            opacity: 0.5;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .summary-stat-item .stat-number {
            font-size: 17px;
            font-weight: 600;
            line-height: 1.3;
        }
        .summary-stat-item .stat-number.privacy {
            letter-spacing: 3px;
            color: #94a3b8 !important;
        }
        .stat-number.positive { color: #E63946; }
        .stat-number.negative { color: #2A9D8F; }
        .stat-number.neutral { color: #94a3b8; }

        .fund-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .fund-card {
            background: #ffffff;
            border-radius: var(--radius-md);
            padding: 6px 12px 6px 0;
            border: 1px solid #eef2f8;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-shrink: 0;
            min-height: 90px;
            transition: box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
        .fund-card:active {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            background: #fafcff;
        }

        .fund-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            border-radius: 0;
            transition: background 0.3s;
        }
        .fund-card.decor-actual::before {
            background: #132b4a;
        }
        .fund-card.decor-estimate::before {
            background: #8aabb8;
        }

        .fund-card .fund-content {
            padding-left: 14px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .fund-row {
            display: flex;
            align-items: center;
            line-height: 1.3;
        }
        .fund-row-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 30px;
        }
        .fund-row-mid {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 28px;
        }
        .fund-row-bot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 26px;
        }

        .fund-name-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .fund-name {
            font-size: 14px;
            font-weight: 600;
            color: #0b1a33;
        }
        .fund-code {
            font-weight: 400;
            font-size: 10px;
            color: #6b7d98;
            background: #f0f4fc;
            padding: 0 8px;
            border-radius: var(--radius-md);
            line-height: 18px;
            margin-left: 4px;
        }

        .fund-actions {
            display: flex;
            gap: 0px;
        }
        .fund-actions button {
            background: transparent;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: var(--radius-full);
            color: #8a9bb5;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.1s;
        }
        .fund-actions button:active {
            background: #f0f0f0;
        }
        .fund-actions button.edit-btn:active {
            background: #eef4fe;
            color: #2a7de1;
        }

        .fund-profit {
            font-size: 13px;
            font-weight: 600;
        }
        .fund-profit .label-sm {
            font-weight: 400;
            font-size: 9px;
            color: #7b8da8;
        }
        .fund-profit.positive { color: #E63946; }
        .fund-profit.negative { color: #2A9D8F; }
        .fund-profit.neutral { color: #94a3b8; }

        .fund-return {
            font-size: 12px;
            font-weight: 600;
        }
        .fund-return .label-sm {
            font-weight: 400;
            font-size: 9px;
            color: #7b8da8;
        }
        .fund-return.positive { color: #E63946; }
        .fund-return.negative { color: #2A9D8F; }
        .fund-return.neutral { color: #94a3b8; }

        .fund-details-left {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px;
            font-size: 11px;
            color: #5a6e8a;
        }
        .fund-details-left .detail-item {
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .fund-details-left .detail-item i {
            opacity: 0.5;
            color: #8a9bb5;
            font-size: 11px;
        }
        .fund-details-right {
            font-size: 15px;
            font-weight: 600;
            color: #0b1a33;
            margin-left: auto;
        }
        .fund-details-right i {
            color: #8a9bb5;
            font-size: 11px;
            margin-right: 4px;
            opacity: 0.5;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #7b8da8;
        }
        .empty-state i {
            font-size: 36px;
            color: #d5dde8;
            margin-bottom: 6px;
        }
        .empty-state p {
            font-size: 14px;
            font-weight: 500;
        }
        .empty-state .sub {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 2px;
        }

        .bottom-action-card {
            background: linear-gradient(145deg, #0b1a33, #132b4a);
            border-radius: var(--radius-md);
            padding: 6px 4px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            display: flex;
            align-items: stretch;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .bottom-action-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 255, 255, 0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        .action-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 8px 4px;
            cursor: pointer;
            transition: background 0.2s ease;
            border: none;
            background: transparent;
            color: #ffffff;
            position: relative;
            border-radius: var(--radius-md);
            min-height: 52px;
        }

        .action-btn:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 15%;
            height: 70%;
            width: 1px;
            background: rgba(255, 255, 255, 0.12);
        }

        .action-btn:active {
            background: rgba(255, 255, 255, 0.06);
        }

        .action-btn .icon-wrap {
            width: 28px;
            height: 28px;
            border-radius: var(--radius-full);
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: #ffffff;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: background 0.2s;
            will-change: transform;
        }

        @keyframes iconPop {
            0% { transform: scale(1); }
            35% { transform: scale(1.3); }
            60% { transform: scale(0.92); }
            100% { transform: scale(1); }
        }

        .action-btn .icon-wrap.pop {
            animation: iconPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .action-btn .label {
            font-size: 10px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.75);
            letter-spacing: 0.2px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 0;
        }
        .modal-overlay.active {
            display: flex;
        }

        .add-modal .add-content,
        .backup-modal .backup-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 32px 24px;
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 0;
            border: none;
            box-shadow: none;
            position: relative;
        }

        .add-modal .add-content h2,
        .backup-modal .backup-content h2 {
            font-size: 22px;
            font-weight: 700;
            color: #0b1a33;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 0px;
        }
        .add-modal .add-content h2 i,
        .backup-modal .backup-content h2 i {
            color: #0b1a33;
        }

        .sub-placeholder {
            height: 24px;
            flex-shrink: 0;
        }

        .add-modal .add-content .input-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }
        .add-modal .add-content .input-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(4px);
            font-size: 15px;
            color: #ffffff;
            outline: none;
            transition: 0.15s;
            -webkit-appearance: none;
        }
        .add-modal .add-content .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
            font-size: 14px;
        }
        .add-modal .add-content .input-group input:focus {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.2);
        }

        .add-modal .add-content .auto-fill-info {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-md);
            padding: 8px 14px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
            margin-top: -6px;
            margin-bottom: 2px;
            text-align: center;
        }
        .add-modal .add-content .auto-fill-info.show {
            display: block;
        }

        .add-modal .add-content .modal-actions {
            display: flex;
            gap: 12px;
            width: 100%;
            justify-content: center;
            margin-top: 12px;
        }
        .add-modal .add-content .modal-actions button {
            flex: 1;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: 0.15s;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            color: #ffffff;
        }
        .add-modal .add-content .modal-actions button:active {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0.96);
        }
        .add-modal .add-content .modal-actions .btn-cancel {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .add-modal .add-content .modal-actions .btn-confirm:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .backup-modal .backup-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }
        .backup-modal .backup-actions button,
        .backup-modal .backup-actions .file-input-wrap {
            width: 100%;
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-align: center;
            line-height: 1.3;
            transition: 0.15s;
            cursor: pointer;
            padding: 14px 16px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
        }
        .backup-modal .backup-actions .file-input-wrap {
            padding: 0;
            position: relative;
            overflow: hidden;
        }
        .backup-modal .backup-actions .file-input-wrap button {
            width: 100%;
            height: 100%;
            padding: 14px 16px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            background: transparent;
            border: none;
            backdrop-filter: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
        }
        .backup-modal .backup-actions .file-input-wrap input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .backup-modal .backup-actions button:active,
        .backup-modal .backup-actions .file-input-wrap:active {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0.96);
        }

        .modal-close-btn {
            position: absolute;
            bottom: 48px;
            left: 50%;
            transform: translateX(-50%);
            width: 48px;
            height: 48px;
            border-radius: var(--radius-full);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            z-index: 10;
        }
        .modal-close-btn:active {
            transform: translateX(-50%) scale(0.88);
            background: rgba(255, 255, 255, 0.25);
        }
        .modal-close-btn svg {
            width: 24px;
            height: 24px;
            stroke: rgba(255, 255, 255, 0.7);
            stroke-width: 2;
            fill: none;
        }

        .prompt-modal .prompt-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 24px;
            width: 100%;
            max-width: 340px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--radius-md);
            border: none;
        }
        .prompt-modal .prompt-content h2 {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
        }
        .prompt-modal .prompt-content .prompt-message {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.5;
            margin-bottom: 18px;
        }
        .prompt-modal .prompt-content .modal-actions {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
        }
        .prompt-modal .prompt-content .modal-actions button {
            flex: 1;
            padding: 12px;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.15s;
            max-width: 140px;
        }
        .prompt-modal .prompt-content .modal-actions .btn-cancel {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .prompt-modal .prompt-content .modal-actions .btn-cancel:active {
            background: rgba(255, 255, 255, 0.25);
        }
        .prompt-modal .prompt-content .modal-actions .btn-confirm {
            background: #ffffff;
            color: #0b1a33;
        }
        .prompt-modal .prompt-content .modal-actions .btn-confirm:active {
            background: #e8edf5;
        }
        .prompt-modal .prompt-content .modal-actions .btn-danger {
            background: #E63946;
            color: #ffffff;
        }
        .prompt-modal .prompt-content .modal-actions .btn-danger:active {
            background: #c92a3a;
        }

        .fund-list::-webkit-scrollbar {
            width: 3px;
        }
        .fund-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .fund-list::-webkit-scrollbar-thumb {
            background: #d5dde8;
            border-radius: 10px;
        }

        .refresh-loading {
            pointer-events: none;
            opacity: 0.6;
        }
        .refresh-loading i {
            animation: spin 1s infinite linear;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .updating-tip {
            text-align: center;
            font-size: 12px;
            color: #7b8da8;
            padding: 4px 0 8px 0;
            display: none;
        }
        .updating-tip.show {
            display: block;
        }
        .updating-tip i {
            margin-right: 4px;
        }

        @media (max-width: 420px) {
            .app-container { padding: 10px 12px 16px; }
            .summary-card { padding: 12px 14px 10px 14px; }
            .summary-today .today-value { font-size: 26px; }
            .summary-today .today-label { font-size: 12px; }
            .summary-stat-item .stat-number { font-size: 15px; }
            .summary-stat-item .stat-icon { width: 12px; height: 12px; }
            .summary-stat-item .stat-label { font-size: 9px; }

            .fund-card { min-height: 78px; }
            .fund-card .fund-content { padding-left: 12px; }
            .fund-name { font-size: 13px; }
            .fund-profit { font-size: 12px; }
            .fund-return { font-size: 11px; }
            .fund-details-left { font-size: 10px; gap: 10px; }
            .fund-details-right { font-size: 13px; }
            .fund-row-top { height: 28px; }
            .fund-row-mid { height: 26px; }
            .fund-row-bot { height: 24px; }

            .add-modal .add-content,
            .backup-modal .backup-content { padding: 24px 16px; }
            .add-modal .add-content .input-group input { font-size: 14px; padding: 10px 14px; }
            .add-modal .add-content .input-group input::placeholder { font-size: 13px; }
            .add-modal .add-content .modal-actions button {
                font-size: 14px;
                padding: 10px 14px;
            }
            .backup-modal .backup-actions button,
            .backup-modal .backup-actions .file-input-wrap button {
                font-size: 14px;
                padding: 12px 14px;
            }
            .modal-close-btn {
                width: 40px;
                height: 40px;
                bottom: 40px;

    </style>
</head>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

<script>
    // ================================================================
    //  Fund Holder · 精简版（速度优化版）
    //  采用完整版的并发限流、时段分流、快速超时、重试、流式渲染
    // ================================================================

    // ===== 存储键名 =====
    var STORAGE_H = 'capsule_holdings';
    var STORAGE_C = 'capsule_cache';

    // ===== 数据 =====
    var holdings = {};
    var cache = {};
    var isUpdating = false;
    var privacyMode = false;

    // ===== 工具函数 =====
    function loadData() {
        try { holdings = JSON.parse(localStorage.getItem(STORAGE_H)) || {}; } catch (e) { holdings = {}; }
        try { cache = JSON.parse(localStorage.getItem(STORAGE_C)) || {}; } catch (e) { cache = {}; }
    }
    function saveAll() {
        localStorage.setItem(STORAGE_H, JSON.stringify(holdings));
        localStorage.setItem(STORAGE_C, JSON.stringify(cache));
    }
    loadData();

    // ===== 交易日判断 =====
    var HOLIDAYS = new Set([
        '2026-01-01', '2026-01-02', '2026-01-03',
        '2026-02-15', '2026-02-16', '2026-02-17', '2026-02-18', '2026-02-19',
        '2026-02-20', '2026-02-21', '2026-02-22', '2026-02-23',
        '2026-04-04', '2026-04-05', '2026-04-06',
        '2026-05-01', '2026-05-02', '2026-05-03', '2026-05-04', '2026-05-05',
        '2026-06-19', '2026-06-20', '2026-06-21',
        '2026-09-25', '2026-09-26', '2026-09-27',
        '2026-10-01', '2026-10-02', '2026-10-03', '2026-10-04',
        '2026-10-05', '2026-10-06', '2026-10-07'
    ]);

    function isTradingDay() {
        var d = new Date();
        var ds = d.toISOString().slice(0, 10);
        if (d.getDay() === 0 || d.getDay() === 6) return false;
        return !HOLIDAYS.has(ds);
    }

    function getMinutes() {
        var now = new Date();
        return now.getHours() * 60 + now.getMinutes();
    }

    // 交易时段：9:15 ~ 15:15
    function isTradingTime() {
        if (!isTradingDay()) return false;
        var m = getMinutes();
        return m >= 555 && m < 915;
    }

    // ===== 名称校验 =====
    function isValidName(name) {
        if (!name || typeof name !== 'string') return false;
        var trimmed = name.trim();
        if (trimmed.length < 2) return false;
        if (/^[\d\s]+$/.test(trimmed)) return false;
        if (/^[．·\-_]+$/.test(trimmed)) return false;
        return true;
    }
    function getValidName(name, code) {
        return isValidName(name) ? name.trim() : code;
    }

    // ================================================================
    //  1. 天天基金（盘中估值）—— 支持重试
    // ================================================================
    function fetchTTFund(code, retries) {
        if (retries === undefined) retries = 2;
        return new Promise(function(resolve) {
            var attempt = function(remain) {
                var script = document.createElement('script');
                var timer = setTimeout(function() { cleanup();
                    if (remain > 0) attempt(remain - 1);
                    else resolve(null); }, 4000);
                window.jsonpgz = function(data) {
                    if (data && data.fundcode === code) {
                        cleanup();
                        resolve(data);
                    }
                };

                function cleanup() {
                    clearTimeout(timer);
                    if (script.parentNode) script.remove();
                    delete window.jsonpgz;
                }
                script.src = 'https://fundgz.1234567.com.cn/js/' + code + '.js?rt=' + Date.now();
                script.onerror = function() { cleanup();
                    if (remain > 0) attempt(remain - 1);
                    else resolve(null); };
                document.head.appendChild(script);
            };
            attempt(retries);
        });
    }

    // ================================================================
    //  2. 腾讯证券（实际净值）—— 带超时
    // ================================================================
    function fetchTencentNav(code) {
        return new Promise(function(resolve) {
            var script = document.createElement('script');
            var timer = setTimeout(function() { cleanup();
                resolve(null); }, 4000);
            var varName = 'v_jj' + code;

            function cleanup() {
                clearTimeout(timer);
                if (script.parentNode) script.remove();
            }

            script.src = 'https://qt.gtimg.cn/q=jj' + code;
            script.onload = function() {
                cleanup();
                var raw = window[varName];
                if (raw && typeof raw === 'string') {
                    var parts = raw.split('~');
                    var nav = parseFloat(parts[5]) || 0;
                    var rate = parseFloat(parts[7]) || 0;
                    var date = parts[8] || '';
                    var name = parts[1] || '';
                    if (!isValidName(name)) name = code;
                    if (nav > 0 && date) {
                        resolve({ nav: nav, rate: rate, date: date, name: name });
                    } else {
                        resolve(null);
                    }
                } else {
                    resolve(null);
                }
            };
            script.onerror = function() { cleanup();
                resolve(null); };
            document.head.appendChild(script);
        });
    }

    // ================================================================
    //  3. 统一数据获取（时段分流）
    // ================================================================
    async function fetchFundDataOnly(code) {
        var today = new Date().toISOString().substring(0, 10);
        var d = cache[code] || {};

        // 如果已有今天的实际净值，直接返回缓存（避免重复请求）
        if (d.actualDate === today && parseFloat(d.actualNav) > 0) {
            return {
                name: getValidName(d.name, code),
                nav: parseFloat(d.actualNav),
                changePercent: parseFloat(d.actualRate) || 0,
                navDate: today,
                gsz: parseFloat(d.gsz) || 0,
                gszzl: parseFloat(d.gszzl) || 0,
                source: 'cache'
            };
        }

        var isTrading = isTradingTime();

        // ===== 交易时段：优先天天基金（实时估值） =====
        if (isTrading) {
            var ttData = await fetchTTFund(code, 2);
            if (ttData && ttData.gsz) {
                var name = getValidName(ttData.name, code);
                return {
                    name: name,
                    gsz: parseFloat(ttData.gsz) || 0,
                    gszzl: parseFloat(ttData.gszzl) || 0,
                    nav: parseFloat(ttData.dwjz) || 0,
                    changePercent: parseFloat(ttData.gszzl) || 0,
                    navDate: ttData.jzrq || '',
                    source: 'tt'
                };
            }
            // 估值失败，尝试用缓存中的估值，或返回空
            if (d.gsz && parseFloat(d.gsz) > 0) {
                return {
                    name: getValidName(d.name, code),
                    gsz: parseFloat(d.gsz) || 0,
                    gszzl: parseFloat(d.gszzl) || 0,
                    nav: parseFloat(d.actualNav) || 0,
                    changePercent: parseFloat(d.gszzl) || 0,
                    navDate: d.actualDate || '',
                    source: 'cache_est'
                };
            }
            return null;
        }

        // ===== 非交易时段（盘后/周末）：腾讯实际净值 =====
        var txData = await fetchTencentNav(code);
        if (txData && txData.nav > 0) {
            var name = getValidName(txData.name, code);
            return {
                name: name,
                nav: txData.nav,
                changePercent: txData.rate,
                navDate: txData.date,
                gsz: txData.nav,
                gszzl: txData.rate,
                source: 'tencent'
            };
        }

        // 腾讯失败，尝试使用缓存的实际净值（即使日期不是今天）
        if (d.actualNav && parseFloat(d.actualNav) > 0) {
            return {
                name: getValidName(d.name, code),
                nav: parseFloat(d.actualNav),
                changePercent: parseFloat(d.actualRate) || 0,
                navDate: d.actualDate || '',
                gsz: parseFloat(d.gsz) || 0,
                gszzl: parseFloat(d.gszzl) || 0,
                source: 'cached_nav'
            };
        }

        // 最后尝试估值缓存
        if (d.gsz && parseFloat(d.gsz) > 0) {
            return {
                name: getValidName(d.name, code),
                gsz: parseFloat(d.gsz) || 0,
                gszzl: parseFloat(d.gszzl) || 0,
                nav: parseFloat(d.actualNav) || 0,
                changePercent: parseFloat(d.gszzl) || 0,
                navDate: d.actualDate || '',
                source: 'cache_est'
            };
        }

        return null;
    }

    // ================================================================
    //  4. 更新单只基金（智能合并）
    // ================================================================
    async function updateFund(code) {
        var old = cache[code] || {};
        var data = await fetchFundDataOnly(code);
        if (!data) {
            if (!old.name) {
                cache[code] = { name: code, gsz: 0, gszzl: 0, actualNav: '0', actualRate: 0, actualDate: '', source: 'none' };
            }
            saveAll();
            return cache[code];
        }

        var name = getValidName(data.name, code);
        // 保留已有的实际净值（如果已有，且新数据不是腾讯实际净值，则不覆盖）
        var hasExistingNav = old.actualNav && parseFloat(old.actualNav) > 0;
        var isNewNav = data.source === 'tencent' || data.source === 'cached_nav';

        var newEntry = {
            name: name,
            gsz: data.gsz || old.gsz || 0,
            gszzl: data.gszzl !== undefined ? data.gszzl : old.gszzl || 0,
            actualNav: old.actualNav,
            actualRate: old.actualRate,
            actualDate: old.actualDate,
            source: old.source || 'tt'
        };

        if (isNewNav && data.nav > 0) {
            newEntry.actualNav = String(data.nav);
            newEntry.actualRate = data.changePercent !== undefined ? data.changePercent : old.actualRate;
            newEntry.actualDate = data.navDate || old.actualDate || '';
            newEntry.source = data.source || 'tencent';
        } else if (!hasExistingNav && data.nav > 0) {
            // 如果原来没有实际净值，但数据中有（可能是估值中带的净值），也保存
            newEntry.actualNav = String(data.nav);
            newEntry.actualRate = data.changePercent !== undefined ? data.changePercent : old.actualRate;
            newEntry.actualDate = data.navDate || old.actualDate || '';
            newEntry.source = data.source || 'tt';
        }

        cache[code] = newEntry;
        saveAll();
        return cache[code];
    }

    // ================================================================
    //  5. 批量并发更新（每次 3 个，流式渲染）
    // ================================================================
    async function batchUpdate(codes) {
        if (!codes.length) return;
        // 每次并发 3 个
        var batchSize = 3;
        for (var i = 0; i < codes.length; i += batchSize) {
            var batch = codes.slice(i, i + batchSize);
            // 使用 allSettled 避免单只失败影响整批
            await Promise.allSettled(batch.map(function(code) {
                return updateFund(code);
            }));
            // 每批完成后立即渲染（流式）
            renderAll();
        }
    }

    // ================================================================
    //  6. 更新入口
    // ================================================================
    async function silentUpdate() {
        try {
            var codes = Object.keys(holdings);
            if (codes.length) {
                await batchUpdate(codes);
            }
        } catch (e) {
            console.warn('后台更新失败，数据保持不变', e);
        }
    }

    async function refreshWithCache() {
        if (isUpdating) return;
        isUpdating = true;
        showUpdating(true);

        // 先立即展示现有数据（如果还没有显示）
        renderAll();

        // 开始更新
        await silentUpdate();

        showUpdating(false);
        isUpdating = false;
        // 更新完成后调度下一次刷新
        scheduleAutoRefresh();
    }

    // ================================================================
    //  7. 自动刷新（仅在交易时段每 60 秒）
    // ================================================================
    var autoTimer = null;

    function startAutoRefresh() {
        stopAutoRefresh();
        if (!isTradingDay()) return;
        if (isTradingTime()) refreshWithCache();
        autoTimer = setInterval(function() {
            if (isTradingTime()) refreshWithCache();
            else stopAutoRefresh();
        }, 60000);
    }

    function stopAutoRefresh() {
        if (autoTimer) { clearInterval(autoTimer);
            autoTimer = null; }
    }

    function scheduleAutoRefresh() {
        // 自动刷新由 startAutoRefresh 管理
    }

    // ================================================================
    //  8. 显示逻辑（优先使用实际净值，不限日期）
    // ================================================================
    function getDisplay(code) {
        var d = cache[code] || {};
        var today = new Date().toISOString().slice(0, 10);

        // 优先使用实际净值（只要存在且大于0，不限日期）
        var nav = parseFloat(d.actualNav);
        if (!isNaN(nav) && nav > 0) {
            var rate = parseFloat(d.actualRate);
            if (isNaN(rate) || rate === 0) {
                rate = parseFloat(d.gszzl) || 0;
            }
            return { nav: nav, rate: rate, source: 'actual' };
        }

        // 其次使用估值
        var estNav = parseFloat(d.gsz);
        if (!isNaN(estNav) && estNav > 0) {
            return { nav: estNav, rate: parseFloat(d.gszzl) || 0, source: 'estimate' };
        }

        // 最后回退成本价
        var h = holdings[code] || {};
        var cost = parseFloat(h.cost) || 0;
        if (cost > 0) {
            return { nav: cost, rate: 0, source: 'cost' };
        }
        return { nav: null, rate: null, source: 'none' };
    }

    // ================================================================
    //  9. 计算汇总
    // ================================================================
    function computeSummary() {
        var codes = Object.keys(holdings);
        if (!codes.length) return { totalAsset: 0, todayProfit: 0, totalProfit: 0, totalYield: 0 };
        var totalCost = 0,
            totalMV = 0,
            todayProfit = 0;
        codes.forEach(function(code) {
            var h = holdings[code];
            var cost = parseFloat(h.cost) || 0;
            var shares = parseFloat(h.shares) || 0;
            totalCost += cost * shares;
            var display = getDisplay(code);
            var nav = display.nav || cost;
            var rate = display.rate || 0;
            // 计算前一日净值（若 rate 不为0）
            var prev = rate !== 0 ? nav / (1 + rate / 100) : nav;
            var mv = nav * shares;
            totalMV += mv;
            todayProfit += (nav - prev) * shares;
        });
        var totalProfit = totalMV - totalCost;
        var totalYield = totalCost > 0 ? (totalProfit / totalCost * 100) : 0;
        return { totalAsset: totalMV, todayProfit: todayProfit, totalProfit: totalProfit, totalYield: totalYield };
    }

    function allFundsUpdated() {
        var codes = Object.keys(holdings);
        if (!codes.length) return false;
        var today = new Date().toISOString().slice(0, 10);
        return codes.every(function(code) {
            var d = cache[code] || {};
            return d.actualDate === today && parseFloat(d.actualNav) > 0;
        });
    }

    // ================================================================
    //  10. 隐私模式（三连击切换）
    // ================================================================
    function applyPrivacyMode() {
        var todayEl = document.getElementById('todayProfitBig');
        var totalAssetsEl = document.getElementById('totalAssets');
        var totalProfitEl = document.getElementById('totalProfit');
        var totalReturnEl = document.getElementById('totalReturn');

        if (privacyMode) {
            todayEl.classList.add('privacy');
            todayEl.textContent = '***';
            totalAssetsEl.classList.add('privacy');
            totalAssetsEl.textContent = '***';
            totalProfitEl.classList.add('privacy');
            totalProfitEl.textContent = '***';
            totalReturnEl.classList.add('privacy');
            totalReturnEl.textContent = '***';
        } else {
            todayEl.classList.remove('privacy');
            totalAssetsEl.classList.remove('privacy');
            totalProfitEl.classList.remove('privacy');
            totalReturnEl.classList.remove('privacy');
            renderAll();
        }
    }

    var clickCount = 0;
    var clickTimer = null;

    function setupPrivacyEasterEgg() {
        var card = document.getElementById('summaryCard');
        card.addEventListener('click', function(e) {
            if (e.target.closest('button')) return;
            clearTimeout(clickTimer);
            clickCount++;
            clickTimer = setTimeout(function() {
                if (clickCount >= 3) {
                    privacyMode = !privacyMode;
                    applyPrivacyMode();
                }
                clickCount = 0;
            }, 400);
        });
    }

    // ================================================================
    //  11. 渲染函数
    // ================================================================
    function renderSummary() {
        if (privacyMode) return;

        var s = computeSummary();
        var codes = Object.keys(holdings);
        var isAllUpdated = allFundsUpdated();

        var todayEl = document.getElementById('todayProfitBig');
        if (codes.length === 0) {
            todayEl.textContent = '+0.00';
            todayEl.className = 'today-value neutral';
            document.getElementById('todayLabel').innerHTML =
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></svg> 今日预估盈亏';
        } else {
            var val = s.todayProfit;
            todayEl.textContent = (val >= 0 ? '+' : '') + val.toFixed(2);
            todayEl.className = 'today-value ' + (val > 0 ? 'positive' : val < 0 ? 'negative' : 'neutral');

            var label = document.getElementById('todayLabel');
            var icon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></svg>';
            label.innerHTML = icon + (isAllUpdated ? '今日实际盈亏' : '今日预估盈亏');
        }

        var setStat = function(id, val, isPct) {
            var el = document.getElementById(id);
            if (codes.length === 0) {
                el.textContent = isPct ? '0.00%' : '0.00';
                el.className = 'stat-number neutral';
                return;
            }
            if (isPct && val === 0) {
                el.textContent = '--';
                el.className = 'stat-number neutral';
                return;
            }
            var prefix = !isPct && val >= 0 ? '+' : '';
            el.textContent = prefix + val.toFixed(2) + (isPct ? '%' : '');
            var cls = val > 0 ? 'positive' : val < 0 ? 'negative' : 'neutral';
            el.className = 'stat-number ' + cls;
        };

        setStat('totalAssets', s.totalAsset, false);
        setStat('totalProfit', s.totalProfit, false);
        setStat('totalReturn', s.totalYield, true);
    }

    function renderFundList() {
        var container = document.getElementById('fundList');
        var codes = Object.keys(holdings);
        if (codes.length === 0) {
            container.innerHTML =
                '<div class="empty-state"><i class="fas fa-inbox"></i><p>还没有持仓基金</p><div class="sub">点击底部「添加持仓」</div></div>';
            return;
        }

        // 按市值降序排序
        var sorted = codes.slice().sort(function(a, b) {
            var hA = holdings[a],
                hB = holdings[b];
            var dA = getDisplay(a),
                dB = getDisplay(b);
            var mvA = (dA.nav || parseFloat(hA.cost) || 0) * (parseFloat(hA.shares) || 0);
            var mvB = (dB.nav || parseFloat(hB.cost) || 0) * (parseFloat(hB.shares) || 0);
            return mvB - mvA;
        });

        var html = '';
        sorted.forEach(function(code) {
            var h = holdings[code];
            var d = cache[code] || {};
            var display = getDisplay(code);
            var cost = parseFloat(h.cost) || 0;
            var shares = parseFloat(h.shares) || 0;
            var currentNav = display.nav || cost;
            var rate = display.rate || 0;
            var prevNav = rate !== 0 ? currentNav / (1 + rate / 100) : currentNav;
            var marketValue = currentNav * shares;
            var todayProfit = (currentNav - prevNav) * shares;
            var todayProfitRate = prevNav !== 0 ? (todayProfit / (prevNav * shares)) * 100 : 0;

            var name = getValidName(d.name, code);
            if (!isValidName(name) && isValidName(h.name)) {
                name = h.name;
            }
            if (!isValidName(name)) {
                name = code;
            }

            var isActual = display.source === 'actual';
            var decorClass = isActual ? 'decor-actual' : 'decor-estimate';
            var sign = todayProfit >= 0 ? '+' : '';

            var profitDisplay = isNaN(todayProfit) ? '0.00' : sign + todayProfit.toFixed(2);
            var returnDisplay = isNaN(todayProfitRate) ? '0.00%' : sign + todayProfitRate.toFixed(2) + '%';

            var pClass = 'neutral';
            if (!isNaN(todayProfit) && todayProfit > 0) pClass = 'positive';
            else if (!isNaN(todayProfit) && todayProfit < 0) pClass = 'negative';

            var rClass = 'neutral';
            if (!isNaN(todayProfitRate) && todayProfitRate > 0) rClass = 'positive';
            else if (!isNaN(todayProfitRate) && todayProfitRate < 0) rClass = 'negative';

            html +=
                '<div class="fund-card ' + decorClass + '" data-code="' + code + '">' +
                '<div class="fund-content">' +
                '<div class="fund-row fund-row-top">' +
                '<div class="fund-name-wrap"><span class="fund-name">' + name + '</span><span class="fund-code">' + code +
                '</span></div>' +
                '<div class="fund-actions"><button class="edit-btn" onclick="editFund(\'' + code +
                '\')"><i class="fas fa-pen"></i></button><button onclick="deleteFund(\'' + code +
                '\')"><i class="fas fa-trash-alt"></i></button></div>' +
                '</div>' +
                '<div class="fund-row fund-row-mid">' +
                '<span class="fund-profit ' + pClass + '"><span class="label-sm">今日盈亏</span> ' + profitDisplay +
                '</span>' +
                '<span class="fund-return ' + rClass + '"><span class="label-sm">收益率</span> ' + returnDisplay +
                '</span>' +
                '</div>' +
                '<div class="fund-row fund-row-bot">' +
                '<div class="fund-details-left"><span class="detail-item"><i class="fas fa-layer-group"></i> 份额：' +
                shares.toFixed(2) +
                '</span><span class="detail-item"><i class="fas fa-tag"></i> 成本：' + cost.toFixed(4) + '</span></div>' +
                '<div class="fund-details-right"><i class="fas fa-coins"></i> ¥' + marketValue.toFixed(2) + '</div>' +
                '</div>' +
                '</div>' +
                '</div>';
        });
        container.innerHTML = html;
    }

    function renderAll() {
        renderSummary();
        renderFundList();
    }

    // ================================================================
    //  12. 刷新状态 UI
    // ================================================================
    function showUpdating(show) {
        var tip = document.getElementById('updatingTip');
        var btn = document.getElementById('refreshBtn');
        var icon = btn ? btn.querySelector('.icon-wrap i') : null;
        if (show) {
            tip.classList.add('show');
            btn.classList.add('refresh-loading');
            if (icon) icon.className = 'fas fa-spinner fa-spin';
        } else {
            tip.classList.remove('show');
            btn.classList.remove('refresh-loading');
            if (icon) icon.className = 'fas fa-sync-alt';
        }
    }

    // ================================================================
    //  13. CRUD 操作
    // ================================================================
    async function deleteFund(code) {
        var confirmed = await showConfirm('确定要删除这只基金吗？');
        if (!confirmed) return;
        delete holdings[code];
        delete cache[code];
        saveAll();
        renderAll();
    }

    function editFund(code) {
        var fund = holdings[code];
        if (!fund) return;
        document.getElementById('fundCodeInput').value = code;
        document.getElementById('fundCostInput').value = fund.cost;
        document.getElementById('fundSharesInput').value = fund.shares;
        var confirmBtn = document.getElementById('confirmAddBtn');
        confirmBtn.dataset.editCode = code;
        confirmBtn.textContent = '更新基金';
        confirmBtn.disabled = true;
        document.getElementById('modalOverlay').classList.add('active');
        autoFillFromCode(code);
    }

    // ================================================================
    //  14. 模态框工具
    // ================================================================
    var promptOverlay = document.getElementById('promptModalOverlay');
    var promptTitle = document.getElementById('promptTitle');
    var promptMessage = document.getElementById('promptMessage');
    var promptActions = document.getElementById('promptActions');

    function showPrompt(title, message, buttons) {
        return new Promise(function(resolve) {
            promptTitle.textContent = title || '提示';
            promptMessage.textContent = message || '';
            promptActions.innerHTML = '';
            buttons.forEach(function(btn) {
                var el = document.createElement('button');
                el.textContent = btn.text;
                el.className = btn.className || 'btn-confirm';
                el.addEventListener('click', function() {
                    closePrompt();
                    resolve(btn.value);
                });
                promptActions.appendChild(el);
            });
            promptOverlay.classList.add('active');
        });
    }

    function closePrompt() { promptOverlay.classList.remove('active'); }

    function showAlert(message, title) {
        if (title === undefined) title = '提示';
        return showPrompt(title, message, [{ text: '确定', className: 'btn-confirm', value: true }]);
    }

    function showConfirm(message, title) {
        if (title === undefined) title = '确认操作';
        return showPrompt(title, message, [
            { text: '取消', className: 'btn-cancel', value: false },
            { text: '确定', className: 'btn-danger', value: true }
        ]);
    }

    promptOverlay.addEventListener('click', function(e) {
        if (e.target === promptOverlay && promptActions.children.length === 1) {
            var btn = promptActions.querySelector('.btn-confirm');
            if (btn) btn.click();
        }
    });

    // ================================================================
    //  15. 添加基金：自动识别名称
    // ================================================================
    var currentFetchName = '';

    async function autoFillFromCode(code) {
        var infoBox = document.getElementById('autoFillInfo');
        var infoText = document.getElementById('autoFillText');
        var confirmBtn = document.getElementById('confirmAddBtn');
        if (code.length !== 6 || isNaN(code)) {
            infoBox.classList.remove('show');
            confirmBtn.disabled = true;
            currentFetchName = '';
            return;
        }
        try {
            var data = await fetchTTFund(code, 2);
            if (data && data.name) {
                currentFetchName = data.name;
                infoText.textContent = '已识别：' + data.name;
                infoBox.style.borderColor = 'rgba(255,255,255,0.2)';
                infoBox.classList.add('show');
                confirmBtn.disabled = false;
            } else {
                infoBox.classList.remove('show');
                confirmBtn.disabled = true;
                currentFetchName = '';
            }
        } catch (e) {
            infoBox.classList.remove('show');
            confirmBtn.disabled = true;
            currentFetchName = '';
        }
    }

    // ================================================================
    //  16. 模态框绑定
    // ================================================================
    function setupModal() {
        var overlay = document.getElementById('modalOverlay');
        var closeBtn = document.getElementById('closeModalBtn');
        var confirmBtn = document.getElementById('confirmAddBtn');
        var openBtn = document.getElementById('openAddModalBtn');
        var codeInput = document.getElementById('fundCodeInput');
        var costInput = document.getElementById('fundCostInput');
        var sharesInput = document.getElementById('fundSharesInput');
        var closeCircle = document.getElementById('closeModalBtnCircle');

        openBtn.addEventListener('click', function() {
            var icon = this.querySelector('.icon-wrap');
            if (icon) {
                icon.classList.remove('pop');
                void icon.offsetWidth;
                icon.classList.add('pop');
            }
            confirmBtn.dataset.editCode = '';
            confirmBtn.textContent = '确认添加';
            confirmBtn.disabled = true;
            codeInput.value = '';
            costInput.value = '';
            sharesInput.value = '';
            document.getElementById('autoFillInfo').classList.remove('show');
            currentFetchName = '';
            overlay.classList.add('active');
            setTimeout(function() { codeInput.focus(); }, 300);
        });

        closeBtn.addEventListener('click', function() { overlay.classList.remove('active'); });
        closeCircle.addEventListener('click', function() { overlay.classList.remove('active'); });

        overlay.addEventListener('click', function(e) {
            var content = this.querySelector('.add-content');
            if (content && !content.contains(e.target)) {
                this.classList.remove('active');
            }
        });

        codeInput.addEventListener('input', function() {
            var code = this.value.trim();
            if (code.length === 6 && !isNaN(code)) {
                autoFillFromCode(code);
            } else {
                document.getElementById('autoFillInfo').classList.remove('show');
                confirmBtn.disabled = true;
                currentFetchName = '';
            }
        });

        confirmBtn.addEventListener('click', async function() {
            var code = codeInput.value.trim();
            var cost = parseFloat(costInput.value);
            var shares = parseFloat(sharesInput.value);
            if (code.length !== 6) { await showAlert('请输入6位基金代码'); return; }
            if (isNaN(cost) || cost <= 0) { await showAlert('请输入有效的成本价'); return; }
            if (isNaN(shares) || shares <= 0) { await showAlert('请输入有效的持有份额'); return; }
            var name = currentFetchName;
            if (!name) {
                try {
                    var data = await fetchTTFund(code, 2);
                    if (data && data.name) name = data.name;
                } catch (_) {}
            }
            if (!name) {
                await showAlert('未能识别基金代码，请确认正确后重试');
                return;
            }
            var editCode = confirmBtn.dataset.editCode;
            if (editCode) {
                if (editCode !== code) {
                    delete holdings[editCode];
                    delete cache[editCode];
                }
                holdings[code] = { cost: cost, shares: shares, name: name };
            } else {
                if (holdings[code]) {
                    var overwrite = await showConfirm('已存在 ' + name + '(' + code + ')，是否覆盖？');
                    if (!overwrite) return;
                }
                holdings[code] = { cost: cost, shares: shares, name: name };
            }
            saveAll();
            overlay.classList.remove('active');
            await updateFund(code);
            renderAll();
        });
    }

    // ================================================================
    //  17. 数据管理
    // ================================================================
    function setupBackup() {
        var overlay = document.getElementById('backupModalOverlay');
        var openBtn = document.getElementById('openBackupModalBtn');
        var exportBtn = document.getElementById('exportBtn');
        var importInput = document.getElementById('importFileInput');
        var clearCacheBtn = document.getElementById('clearCacheBtn');
        var closeCircle = document.getElementById('closeBackupModalBtnCircle');

        openBtn.addEventListener('click', function() {
            var icon = this.querySelector('.icon-wrap');
            if (icon) {
                icon.classList.remove('pop');
                void icon.offsetWidth;
                icon.classList.add('pop');
            }
            overlay.classList.add('active');
        });

        closeCircle.addEventListener('click', function() { overlay.classList.remove('active'); });

        overlay.addEventListener('click', function(e) {
            var content = this.querySelector('.backup-content');
            if (content && !content.contains(e.target)) {
                this.classList.remove('active');
            }
        });

        exportBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            var data = JSON.stringify({ holdings: holdings, cache: cache }, null, 2);
            var blob = new Blob([data], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = '持仓配置_' + new Date().toISOString().slice(0, 10) + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        importInput.addEventListener('change', async function(e) {
            e.stopPropagation();
            var file = this.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = async function(ev) {
                try {
                    var data = JSON.parse(ev.target.result);
                    if (data.holdings && typeof data.holdings === 'object') {
                        var confirmed = await showConfirm('将导入 ' + Object.keys(data.holdings).length +
                            ' 只基金配置，覆盖当前所有数据，确定吗？');
                        if (confirmed) {
                            holdings = data.holdings || {};
                            cache = data.cache || {};
                            saveAll();
                            overlay.classList.remove('active');
                            await refreshWithCache();
                        }
                    } else {
                        await showAlert('配置格式无效，请检查文件');
                    }
                } catch (_) {
                    await showAlert('文件解析失败，请确保是有效的 JSON 文件');
                }
            };
            reader.readAsText(file);
            this.value = '';
        });

        clearCacheBtn.addEventListener('click', async function(e) {
            e.stopPropagation();
            var confirmed = await showConfirm('确定要清除所有缓存数据吗？\n（持仓配置不会被删除）', '清除缓存');
            if (confirmed) {
                cache = {};
                localStorage.setItem(STORAGE_C, JSON.stringify(cache));
                overlay.classList.remove('active');
                renderAll();
                await showAlert('缓存已清除');
            }
        });
    }

    // ================================================================
    //  18. 刷新按钮
    // ================================================================
    function setupRefresh() {
        var refreshBtn = document.getElementById('refreshBtn');
        refreshBtn.addEventListener('click', function() {
            var icon = this.querySelector('.icon-wrap');
            if (icon) {
                icon.classList.remove('pop');
                void icon.offsetWidth;
                icon.classList.add('pop');
            }
            refreshWithCache();
        });
    }

    // ================================================================
    //  19. PWA Service Worker 注册（可选）
    // ================================================================
    function registerSW() {
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(function() { console.log('Service Worker 注册成功'); })
                .catch(function() { console.log('Service Worker 注册失败'); });
        }
    }

    // ================================================================
    //  20. 启动
    // ================================================================
    document.addEventListener('DOMContentLoaded', function() {
        loadData();
        setupPrivacyEasterEgg();
        setupRefresh();
        renderAll();

        if (Object.keys(holdings).length > 0) {
            var hasCache = Object.keys(cache).length > 0;
            if (!hasCache) {
                refreshWithCache().then(function() {
                    if (isTradingTime()) startAutoRefresh();
                });
            } else {
                silentUpdate().then(function() {
                    if (isTradingTime()) startAutoRefresh();
                });
            }
        }

        setupModal();
        setupBackup();

        // 每30秒检查是否进入/离开交易时段，自动管理定时器
        setInterval(function() {
            if (isTradingTime() && !autoTimer) startAutoRefresh();
            if (!isTradingTime() && autoTimer) stopAutoRefresh();
        }, 30000);

        registerSW();
    });
</script>
