<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>持仓跟踪</title>

    <!-- ===== PWA 配置 ===== -->
    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="持仓跟踪" />
    <link rel="apple-touch-icon" href="icon-1024.png" />
    <meta name="theme-color" content="#f2f5fa" />

    <style>
        /* ===== 大卡片外壳 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        html, body {
            width: 100%;
            min-height: 100vh;
            background: #f2f5fa;
            display: flex;
            justify-content: center;
            padding: 4px;
            overflow-x: hidden;
        }
        .app-container {
            max-width: 480px;
            width: 100%;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            padding: 14px 14px 20px;
            display: flex;
            flex-direction: column;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .app-header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #0b1a33;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .app-header h1 svg {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }
        .header-actions {
            display: flex;
            gap: 4px;
        }
        .header-actions button {
            background: #e8edf5;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 15px;
            color: #1a4f8b;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-actions button:active {
            transform: scale(0.88);
            background: #d5dde8;
        }
        .header-actions button i {
            font-size: 16px;
        }

        .summary-card {
            background: linear-gradient(145deg, #0b1a33, #132b4a);
            border-radius: 20px;
            padding: 14px 20px 12px 20px;
            color: white;
            margin-bottom: 16px;
            flex-shrink: 0;
            cursor: default;
            user-select: none;
            -webkit-user-select: none;
        }
        .summary-today {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
        }
        .summary-today .today-label {
            font-size: 13px;
            font-weight: 500;
            opacity: 0.7;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .summary-today .today-label svg {
            width: 16px;
            height: 16px;
            stroke: rgba(255,255,255,0.7);
            stroke-width: 2;
            fill: none;
        }
        .summary-today .today-value {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.2;
            margin-top: 0px;
        }
        .summary-today .today-value.positive { color: #E63946; }
        .summary-today .today-value.negative { color: #2A9D8F; }
        .summary-today .today-value.neutral { color: #94a3b8; }
        .summary-today .today-value.privacy { color: #94a3b8; letter-spacing: 4px; }

        .summary-divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.10);
            margin: 0 0 10px 0;
        }

        .summary-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .summary-stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            position: relative;
            gap: 2px;
        }
        .summary-stat-item:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 15%;
            height: 70%;
            width: 1px;
            background: rgba(255, 255, 255, 0.12);
        }
        .summary-stat-item .stat-label-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .summary-stat-item .stat-icon {
            width: 14px;
            height: 14px;
            stroke: rgba(255, 255, 255, 0.5);
            stroke-width: 2;
            fill: none;
            flex-shrink: 0;
        }
        .summary-stat-item .stat-label {
            font-size: 10px;
            opacity: 0.5;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .summary-stat-item .stat-number {
            font-size: 17px;
            font-weight: 600;
            line-height: 1.3;
        }
        .summary-stat-item .stat-number.privacy {
            letter-spacing: 3px;
            color: #94a3b8 !important;
        }
        .stat-number.positive { color: #E63946; }
        .stat-number.negative { color: #2A9D8F; }
        .stat-number.neutral { color: #94a3b8; }

        .fund-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .fund-card {
            background: #ffffff;
            border-radius: 14px;
            padding: 6px 12px 6px 0;
            border: none;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-shrink: 0;
            min-height: 90px;
            transition: box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }
        .fund-card:active {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            background: #fafcff;
        }

        /* 装饰条：深蓝=净值，浅灰蓝=估值 */
        .fund-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            border-radius: 0;
            transition: background 0.3s;
        }
        .fund-card.decor-actual::before {
            background: #132b4a;
        }
        .fund-card.decor-estimate::before {
            background: #8aabb8;
        }

        .fund-card .fund-content {
            padding-left: 14px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .fund-row {
            display: flex;
            align-items: center;
            line-height: 1.3;
        }
        .fund-row-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 30px;
        }
        .fund-row-mid {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 28px;
        }
        .fund-row-bot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 26px;
        }

        .fund-name-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .fund-name {
            font-size: 14px;
            font-weight: 600;
            color: #0b1a33;
        }
        .fund-code {
            font-weight: 400;
            font-size: 10px;
            color: #6b7d98;
            background: #f0f4fc;
            padding: 0 8px;
            border-radius: 30px;
            line-height: 18px;
            margin-left: 4px;
        }

        .fund-actions {
            display: flex;
            gap: 0px;
        }
        .fund-actions button {
            background: transparent;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            color: #8a9bb5;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.1s;
        }
        .fund-actions button:active {
            background: #f0f0f0;
        }
        .fund-actions button.edit-btn:active {
            background: #eef4fe;
            color: #2a7de1;
        }

        .fund-profit {
            font-size: 13px;
            font-weight: 600;
        }
        .fund-profit .label-sm {
            font-weight: 400;
            font-size: 9px;
            color: #7b8da8;
        }
        .fund-profit.positive { color: #E63946; }
        .fund-profit.negative { color: #2A9D8F; }
        .fund-profit.neutral { color: #94a3b8; }

        .fund-return {
            font-size: 12px;
            font-weight: 600;
        }
        .fund-return .label-sm {
            font-weight: 400;
            font-size: 9px;
            color: #7b8da8;
        }
        .fund-return.positive { color: #E63946; }
        .fund-return.negative { color: #2A9D8F; }
        .fund-return.neutral { color: #94a3b8; }

        .fund-details-left {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px;
            font-size: 11px;
            color: #5a6e8a;
        }
        .fund-details-left .detail-item {
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .fund-details-left .detail-item i {
            opacity: 0.5;
            color: #8a9bb5;
            font-size: 11px;
        }
        .fund-details-right {
            font-size: 15px;
            font-weight: 600;
            color: #0b1a33;
            margin-left: auto;
        }
        .fund-details-right i {
            color: #8a9bb5;
            font-size: 11px;
            margin-right: 4px;
            opacity: 0.5;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #7b8da8;
        }
        .empty-state i {
            font-size: 36px;
            color: #d5dde8;
            margin-bottom: 6px;
        }
        .empty-state p {
            font-size: 14px;
            font-weight: 500;
        }
        .empty-state .sub {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 2px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }

        .add-modal .add-content,
        .backup-modal .backup-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 24px;
            width: 100%;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .add-modal .add-content h2,
        .backup-modal .backup-content h2 {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .add-modal .add-content .sub,
        .backup-modal .backup-content .sub {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            margin-bottom: 16px;
        }
        .add-modal .add-content .input-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }
        .add-modal .add-content .input-group label {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            text-align: left;
            margin-bottom: -4px;
        }
        .add-modal .add-content .input-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(4px);
            font-size: 16px;
            color: #ffffff;
            outline: none;
            transition: 0.15s;
            -webkit-appearance: none;
        }
        .add-modal .add-content .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }
        .add-modal .add-content .input-group input:focus {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.2);
        }
        .add-modal .add-content .auto-fill-info {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
            margin-top: -4px;
            margin-bottom: 4px;
            text-align: center;
        }
        .add-modal .add-content .auto-fill-info.show {
            display: block;
        }
        .add-modal .add-content .modal-actions {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
        }
        .add-modal .add-content .modal-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.15s;
        }
        .add-modal .add-content .modal-actions .btn-cancel {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .add-modal .add-content .modal-actions .btn-cancel:active {
            background: rgba(255, 255, 255, 0.25);
        }
        .add-modal .add-content .modal-actions .btn-confirm {
            background: #ffffff;
            color: #0b1a33;
        }
        .add-modal .add-content .modal-actions .btn-confirm:active {
            background: #e8edf5;
        }
        .add-modal .add-content .modal-actions .btn-confirm:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ===== 数据管理：三个按钮统一毛玻璃 + 一行不换行 + 完整文字 ===== */
        .backup-actions-grid {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            gap: 6px;
            justify-content: center;
            width: 100%;
            margin-bottom: 6px;
        }
        .backup-actions-grid button,
        .backup-actions-grid .file-input-wrap {
            flex: 1 1 0;
            min-width: 0;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            white-space: nowrap;
            text-align: center;
            line-height: 1.2;
            transition: 0.15s;
            cursor: pointer;
            padding: 0;
        }
        .backup-actions-grid button {
            padding: 10px 4px;
            font-size: 12px;
            font-weight: 600;
            color: #ffffff;
        }
        .backup-actions-grid .file-input-wrap {
            padding: 0;
            position: relative;
            overflow: hidden;
        }
        .backup-actions-grid .file-input-wrap button {
            width: 100%;
            height: 100%;
            padding: 10px 4px;
            font-size: 12px;
            font-weight: 600;
            color: #ffffff;
            background: transparent;
            border: none;
            backdrop-filter: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            white-space: nowrap;
            cursor: pointer;
        }
        .backup-actions-grid .file-input-wrap input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .backup-actions-grid button:active,
        .backup-actions-grid .file-input-wrap:active {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0.96);
        }

        .backup-modal .backup-close {
            margin-top: 12px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            cursor: pointer;
            padding: 8px 16px;
        }
        .backup-modal .backup-close:active {
            color: rgba(255, 255, 255, 0.7);
        }

        .prompt-modal .prompt-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 340px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .prompt-modal .prompt-content h2 {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
        }
        .prompt-modal .prompt-content .prompt-message {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.5;
            margin-bottom: 18px;
        }
        .prompt-modal .prompt-content .modal-actions {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
        }
        .prompt-modal .prompt-content .modal-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.15s;
            max-width: 140px;
        }
        .prompt-modal .prompt-content .modal-actions .btn-cancel {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .prompt-modal .prompt-content .modal-actions .btn-cancel:active {
            background: rgba(255, 255, 255, 0.25);
        }
        .prompt-modal .prompt-content .modal-actions .btn-confirm {
            background: #ffffff;
            color: #0b1a33;
        }
        .prompt-modal .prompt-content .modal-actions .btn-confirm:active {
            background: #e8edf5;
        }
        .prompt-modal .prompt-content .modal-actions .btn-danger {
            background: #E63946;
            color: #ffffff;
        }
        .prompt-modal .prompt-content .modal-actions .btn-danger:active {
            background: #c92a3a;
        }

        .fund-list::-webkit-scrollbar {
            width: 3px;
        }
        .fund-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .fund-list::-webkit-scrollbar-thumb {
            background: #d5dde8;
            border-radius: 10px;
        }

        .refresh-loading {
            pointer-events: none;
            opacity: 0.6;
        }
        .refresh-loading i {
            animation: spin 1s infinite linear;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .updating-tip {
            text-align: center;
            font-size: 12px;
            color: #7b8da8;
            padding: 4px 0 8px 0;
            display: none;
        }
        .updating-tip.show {
            display: block;
        }
        .updating-tip i {
            margin-right: 4px;
        }

        @media (max-width: 420px) {
            .app-container { padding: 10px 12px 16px; }
            .summary-card { padding: 12px 14px 10px 14px; }
            .summary-today .today-value { font-size: 26px; }
            .summary-today .today-label { font-size: 12px; }
            .summary-stat-item .stat-number { font-size: 15px; }
            .summary-stat-item .stat-icon { width: 12px; height: 12px; }
            .summary-stat-item .stat-label { font-size: 9px; }

            .fund-card { min-height: 78px; }
            .fund-card .fund-content { padding-left: 12px; }
            .fund-name { font-size: 13px; }
            .fund-profit { font-size: 12px; }
            .fund-return { font-size: 11px; }
            .fund-details-left { font-size: 10px; gap: 10px; }
            .fund-details-right { font-size: 13px; }
            .fund-row-top { height: 28px; }
            .fund-row-mid { height: 26px; }
            .fund-row-bot { height: 24px; }

            .header-actions button { width: 32px; height: 32px; font-size: 13px; }
            .header-actions button i { font-size: 14px; }
            .app-header h1 { font-size: 18px; }
            .app-header h1 svg { width: 22px; height: 22px; }
            .add-modal .add-content,
            .backup-modal .backup-content { padding: 18px; }
            .add-modal .add-content .input-group input { font-size: 15px; padding: 10px 14px; }
            .backup-actions-grid button,
            .backup-actions-grid .file-input-wrap button {
                font-size: 10px;
                padding: 8px 2px;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="app">

    <header class="app-header">
        <h1>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4.97883 9.68508C2.99294 8.89073 2 8.49355 2 8C2 7.50645 2.99294 7.10927 4.97883 6.31492L7.7873 5.19153C9.77318 4.39718 10.7661 4 12 4C13.2339 4 14.2268 4.39718 16.2127 5.19153L19.0212 6.31492C21.0071 7.10927 22 7.50645 22 8C22 8.49355 21.0071 8.89073 19.0212 9.68508L16.2127 10.8085C14.2268 11.6028 13.2339 12 12 12C10.7661 12 9.77318 11.6028 7.7873 10.8085L4.97883 9.68508Z" fill="#1C274C"/>
                <path fill-rule="evenodd" clip-rule="evenodd" d="M2 8C2 8.49355 2.99294 8.89073 4.97883 9.68508L7.7873 10.8085C9.77318 11.6028 10.7661 12 12 12C13.2339 12 14.2268 11.6028 16.2127 10.8085L19.0212 9.68508C21.0071 8.89073 22 8.49355 22 8C22 7.50645 21.0071 7.10927 19.0212 6.31492L16.2127 5.19153C14.2268 4.39718 13.2339 4 12 4C10.7661 4 9.77318 4.39718 7.7873 5.19153L4.97883 6.31492C2.99294 7.10927 2 7.50645 2 8Z" fill="#1C274C"/>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

<script>
    // ============================================================
    //  数据源：腾讯证券（净值优先）+ 天天基金（估值兜底）
    // ============================================================

    const STORAGE_H = 'capsule_holdings';
    const STORAGE_C = 'capsule_cache';
    let holdings = {};
    let cache = {};
    let isUpdating = false;
    let privacyMode = false;

    function loadData() {
        try { holdings = JSON.parse(localStorage.getItem(STORAGE_H)) || {}; } catch (e) { holdings = {}; }
        try { cache = JSON.parse(localStorage.getItem(STORAGE_C)) || {}; } catch (e) { cache = {}; }
    }

    function saveAll() {
        localStorage.setItem(STORAGE_H, JSON.stringify(holdings));
        localStorage.setItem(STORAGE_C, JSON.stringify(cache));
    }
    loadData();

    const HOLIDAYS = new Set([
        '2026-01-01', '2026-01-02', '2026-01-03',
        '2026-02-15', '2026-02-16', '2026-02-17', '2026-02-18', '2026-02-19',
        '2026-02-20', '2026-02-21', '2026-02-22', '2026-02-23',
        '2026-04-04', '2026-04-05', '2026-04-06',
        '2026-05-01', '2026-05-02', '2026-05-03', '2026-05-04', '2026-05-05',
        '2026-06-19', '2026-06-20', '2026-06-21',
        '2026-09-25', '2026-09-26', '2026-09-27',
        '2026-10-01', '2026-10-02', '2026-10-03', '2026-10-04',
        '2026-10-05', '2026-10-06', '2026-10-07'
    ]);

    function isTradingDay() {
        const d = new Date();
        const ds = d.toISOString().slice(0, 10);
        if (d.getDay() === 0 || d.getDay() === 6) return false;
        return !HOLIDAYS.has(ds);
    }

    function isTradingTime() {
        if (!isTradingDay()) return false;
        const m = new Date().getHours() * 60 + new Date().getMinutes();
        return m >= 555 && m < 915;
    }

    function isValidName(name) {
        if (!name) return false;
        if (typeof name !== 'string') return false;
        const trimmed = name.trim();
        if (trimmed.length < 2) return false;
        if (/^[\d\s]+$/.test(trimmed)) return false;
        if (/^[．·\-_]+$/.test(trimmed)) return false;
        return true;
    }

    function getValidName(name, code) {
        if (isValidName(name)) return name.trim();
        return code;
    }

    // ===== 天天基金（盘中估值） =====
    function fetchTTFund(code) {
        return new Promise(function(resolve) {
            const script = document.createElement('script');
            const timer = setTimeout(function() { cleanup();
                resolve(null); }, 8000);
            window.jsonpgz = function(data) {
                if (data && data.fundcode === code) {
                    cleanup();
                    resolve(data);
                }
            };

            function cleanup() {
                clearTimeout(timer);
                if (script.parentNode) script.remove();
            }
            script.src = 'https://fundgz.1234567.com.cn/js/' + code + '.js?rt=' + Date.now();
            script.onerror = function() { cleanup();
                resolve(null); };
            document.head.appendChild(script);
        });
    }

    // ===== 腾讯证券（实际净值） =====
    function fetchTencentNav(code) {
        return new Promise(function(resolve) {
            const script = document.createElement('script');
            const timer = setTimeout(function() { cleanup();
                resolve(null); }, 10000);
            const varName = 'v_jj' + code;

            function cleanup() {
                clearTimeout(timer);
                if (script.parentNode) script.remove();
            }

            script.src = 'https://qt.gtimg.cn/q=jj' + code;
            script.onload = function() {
                cleanup();
                const raw = window[varName];
                if (raw && typeof raw === 'string') {
                    const parts = raw.split('~');
                    const nav = parseFloat(parts[5]) || 0;
                    const rate = parseFloat(parts[7]) || 0;
                    const date = parts[8] || '';
                    let name = parts[1] || '';
                    if (!isValidName(name)) name = code;
                    if (nav > 0 && date) {
                        resolve({ nav, rate, date, name });
                    } else {
                        resolve(null);
                    }
                } else {
                    resolve(null);
                }
            };
            script.onerror = function() { cleanup();
                resolve(null); };
            document.head.appendChild(script);
        });
    }

    // ===== 统一数据获取 =====
    async function fetchFundDataOnly(code) {
        const today = new Date().toISOString().substring(0, 10);
        const d = cache[code] || {};

        const cachedNav = parseFloat(d.actualNav);
        if (cachedNav > 0 && d.actualDate === today) {
            return {
                name: getValidName(d.name, code),
                nav: cachedNav,
                changePercent: d.actualRate !== undefined ? parseFloat(d.actualRate) : 0,
                navDate: today,
                gsz: cachedNav,
                gszzl: d.actualRate !== undefined ? parseFloat(d.actualRate) : 0,
                source: d.source || 'cache'
            };
        }

        const txData = await fetchTencentNav(code);
        if (txData && txData.nav > 0 && txData.date === today) {
            const name = getValidName(txData.name, code);
            return {
                name: name,
                nav: txData.nav,
                changePercent: txData.rate,
                navDate: txData.date,
                gsz: txData.nav,
                gszzl: txData.rate,
                source: 'tencent'
            };
        }

        const ttData = await fetchTTFund(code);
        if (ttData) {
            let name = ttData.name || code;
            if (!isValidName(name)) name = code;
            return {
                name: name,
                gsz: parseFloat(ttData.gsz) || 0,
                gszzl: parseFloat(ttData.gszzl) || 0,
                nav: parseFloat(ttData.dwjz) || 0,
                changePercent: parseFloat(ttData.gszzl) || 0,
                navDate: ttData.jzrq || '',
                source: 'tt'
            };
        }

        return null;
    }

    // ===== 更新单只基金 =====
    async function updateFund(code) {
        const old = cache[code] || {};
        const data = await fetchFundDataOnly(code);

        if (data) {
            const name = getValidName(data.name, code);
            const today = new Date().toISOString().substring(0, 10);

            const hasExistingNav = old.actualDate === today && parseFloat(old.actualNav) > 0;
            if (hasExistingNav) {
                cache[code] = {
                    name: name,
                    gsz: data.gsz || old.gsz || 0,
                    gszzl: data.gszzl !== undefined ? data.gszzl : old.gszzl || 0,
                    actualNav: old.actualNav,
                    actualRate: old.actualRate,
                    actualDate: old.actualDate,
                    source: old.source || 'tencent'
                };
            } else {
                cache[code] = {
                    name: name,
                    gsz: data.gsz || 0,
                    gszzl: data.gszzl !== undefined ? data.gszzl : 0,
                    actualNav: data.nav ? String(data.nav) : old.actualNav,
                    actualRate: data.changePercent !== undefined ? data.changePercent : old.actualRate,
                    actualDate: data.navDate || old.actualDate || '',
                    source: data.source || old.source || 'tt'
                };
            }
        } else {
            if (!old.name) {
                cache[code] = { name: code, gsz: 0, gszzl: 0, actualNav: '0', actualRate: 0, actualDate: '', source: 'none' };
            }
        }
        saveAll();
        return cache[code];
    }

    // ===== 并行更新 =====
    async function silentUpdate() {
        try {
            const codes = Object.keys(holdings);
            if (codes.length) {
                await Promise.all(codes.map(code => updateFund(code)));
                renderAll();
            }
        } catch (e) {
            console.warn('后台更新失败，数据保持不变', e);
        }
    }

    async function refreshWithCache() {
        if (isUpdating) return;
        isUpdating = true;

        showUpdating(true);
        setTimeout(() => {
            showUpdating(false);
            isUpdating = false;
        }, 200);

        renderAll();
        silentUpdate().then(() => {
            if (isTradingTime()) { stopAutoRefresh();
                startAutoRefresh(); }
        });
    }

    // ===== 盘中自动刷新 =====
    let autoTimer = null;

    function startAutoRefresh() {
        stopAutoRefresh();
        if (!isTradingDay()) return;
        if (isTradingTime()) refreshWithCache();
        autoTimer = setInterval(() => {
            if (isTradingTime()) refreshWithCache();
            else stopAutoRefresh();
        }, 60000);
    }

    function stopAutoRefresh() {
        if (autoTimer) { clearInterval(autoTimer);
            autoTimer = null; }
    }

    // ===== 显示逻辑 =====
    function getDisplay(code) {
        const d = cache[code] || {};
        const today = new Date().toISOString().slice(0, 10);

        if (d.actualDate === today) {
            const nav = parseFloat(d.actualNav);
            if (!isNaN(nav) && nav > 0) {
                let rate = parseFloat(d.actualRate);
                if (isNaN(rate) || rate === 0) {
                    rate = parseFloat(d.gszzl) || 0;
                }
                return { nav: nav, rate: rate, source: 'actual' };
            }
        }

        if (isTradingDay()) {
            const nav2 = parseFloat(d.gsz);
            if (!isNaN(nav2) && nav2 > 0) {
                return { nav: nav2, rate: parseFloat(d.gszzl) || 0, source: 'estimate' };
            }
        }

        const h = holdings[code] || {};
        const cost = parseFloat(h.cost) || 0;
        if (cost > 0) {
            return { nav: cost, rate: 0, source: 'cost' };
        }

        return { nav: null, rate: null, source: 'none' };
    }

    function computeSummary() {
        const codes = Object.keys(holdings);
        if (!codes.length) return { totalAsset: 0, todayProfit: 0, totalProfit: 0, totalYield: 0 };
        let totalCost = 0,
            totalMV = 0,
            todayProfit = 0;
        codes.forEach(function(code) {
            const h = holdings[code];
            const cost = parseFloat(h.cost) || 0;
            const shares = parseFloat(h.shares) || 0;
            totalCost += cost * shares;
            const display = getDisplay(code);
            const nav = display.nav || cost;
            const rate = display.rate || 0;
            const prev = rate !== 0 ? nav / (1 + rate / 100) : nav;
            const mv = nav * shares;
            totalMV += mv;
            todayProfit += (nav - prev) * shares;
        });
        const totalProfit = totalMV - totalCost;
        const totalYield = totalCost > 0 ? (totalProfit / totalCost * 100) : 0;
        return { totalAsset: totalMV, todayProfit, totalProfit, totalYield };
    }

    function allFundsUpdated() {
        const codes = Object.keys(holdings);
        if (!codes.length) return false;
        const today = new Date().toISOString().slice(0, 10);
        return codes.every(code => {
            const d = cache[code] || {};
            return d.actualDate === today && parseFloat(d.actualNav) > 0;
        });
    }

    // ===== 隐私模式 =====
    function applyPrivacyMode() {
        const todayEl = document.getElementById('todayProfitBig');
        const totalAssetsEl = document.getElementById('totalAssets');
        const totalProfitEl = document.getElementById('totalProfit');
        const totalReturnEl = document.getElementById('totalReturn');

        if (privacyMode) {
            todayEl.classList.add('privacy');
            todayEl.textContent = '***';
            totalAssetsEl.classList.add('privacy');
            totalAssetsEl.textContent = '***';
            totalProfitEl.classList.add('privacy');
            totalProfitEl.textContent = '***';
            totalReturnEl.classList.add('privacy');
            totalReturnEl.textContent = '***';
        } else {
            todayEl.classList.remove('privacy');
            totalAssetsEl.classList.remove('privacy');
            totalProfitEl.classList.remove('privacy');
            totalReturnEl.classList.remove('privacy');
            renderAll();
        }
    }

    let clickCount = 0;
    let clickTimer = null;

    function setupPrivacyEasterEgg() {
        const card = document.getElementById('summaryCard');
        card.addEventListener('click', function(e) {
            if (e.target.closest('button')) return;
            clearTimeout(clickTimer);
            clickCount++;
            clickTimer = setTimeout(function() {
                if (clickCount >= 3) {
                    privacyMode = !privacyMode;
                    applyPrivacyMode();
                }
                clickCount = 0;
            }, 400);
        });
    }

    // ===== 渲染 =====
    function renderSummary() {
        if (privacyMode) return;

        const s = computeSummary();
        const codes = Object.keys(holdings);
        const isAllUpdated = allFundsUpdated();

        const todayEl = document.getElementById('todayProfitBig');
        if (codes.length === 0) {
            todayEl.textContent = '+0.00';
            todayEl.className = 'today-value neutral';
            document.getElementById('todayLabel').innerHTML = `
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                </svg>
                今日预估盈亏
            `;
        } else {
            const val = s.todayProfit;
            todayEl.textContent = (val >= 0 ? '+' : '') + val.toFixed(2);
            todayEl.className = 'today-value ' + (val > 0 ? 'positive' : val < 0 ? 'negative' : 'neutral');

            const label = document.getElementById('todayLabel');
            const icon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
            </svg>`;
            label.innerHTML = icon + (isAllUpdated ? '今日实际盈亏' : '今日预估盈亏');
        }

        const setStat = (id, val, isPct) => {
            const el = document.getElementById(id);
            if (codes.length === 0) {
                el.textContent = isPct ? '0.00%' : '0.00';
                el.className = 'stat-number neutral';
                return;
            }
            if (isPct && val === 0) {
                el.textContent = '--';
                el.className = 'stat-number neutral';
                return;
            }
            const prefix = !isPct && val >= 0 ? '+' : '';
            el.textContent = prefix + val.toFixed(2) + (isPct ? '%' : '');
            const cls = val > 0 ? 'positive' : val < 0 ? 'negative' : 'neutral';
            el.className = 'stat-number ' + cls;
        };

        setStat('totalAssets', s.totalAsset, false);
        setStat('totalProfit', s.totalProfit, false);
        setStat('totalReturn', s.totalYield, true);
    }

    function renderFundList() {
        const container = document.getElementById('fundList');
        const codes = Object.keys(holdings);
        if (codes.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <p>还没有持仓基金</p>
                    <div class="sub">点击右上角 <i class="fas fa-plus-circle"></i> 添加</div>
                </div>
            `;
            return;
        }

        const sorted = codes.slice().sort((a, b) => {
            const hA = holdings[a],
                hB = holdings[b];
            const dA = getDisplay(a),
                dB = getDisplay(b);
            const mvA = (dA.nav || parseFloat(hA.cost) || 0) * (parseFloat(hA.shares) || 0);
            const mvB = (dB.nav || parseFloat(hB.cost) || 0) * (parseFloat(hB.shares) || 0);
            return mvB - mvA;
        });

        let html = '';
        sorted.forEach(code => {
            const h = holdings[code];
            const d = cache[code] || {};
            const display = getDisplay(code);
            const cost = parseFloat(h.cost) || 0;
            const shares = parseFloat(h.shares) || 0;
            const currentNav = display.nav || cost;
            const rate = display.rate || 0;
            const prevNav = rate !== 0 ? currentNav / (1 + rate / 100) : currentNav;
            const marketValue = currentNav * shares;
            const todayProfit = (currentNav - prevNav) * shares;
            const todayProfitRate = prevNav !== 0 ? (todayProfit / (prevNav * shares)) * 100 : 0;

            let name = getValidName(d.name, code);
            if (!isValidName(name) && isValidName(h.name)) {
                name = h.name;
            }
            if (!isValidName(name)) {
                name = code;
            }

            const isActual = display.source === 'actual';
            const decorClass = isActual ? 'decor-actual' : 'decor-estimate';
            const sign = todayProfit >= 0 ? '+' : '';

            const profitDisplay = isNaN(todayProfit) ? '0.00' : sign + todayProfit.toFixed(2);
            const returnDisplay = isNaN(todayProfitRate) ? '0.00%' : sign + todayProfitRate.toFixed(2) + '%';

            let pClass = 'neutral';
            if (!isNaN(todayProfit) && todayProfit > 0) pClass = 'positive';
            else if (!isNaN(todayProfit) && todayProfit < 0) pClass = 'negative';

            let rClass = 'neutral';
            if (!isNaN(todayProfitRate) && todayProfitRate > 0) rClass = 'positive';
            else if (!isNaN(todayProfitRate) && todayProfitRate < 0) rClass = 'negative';

            html += `
                <div class="fund-card ${decorClass}" data-code="${code}">
                    <div class="fund-content">
                        <div class="fund-row fund-row-top">
                            <div class="fund-name-wrap">
                                <span class="fund-name">${name}</span>
                                <span class="fund-code">${code}</span>
                            </div>
                            <div class="fund-actions">
                                <button class="edit-btn" onclick="editFund('${code}')"><i class="fas fa-pen"></i></button>
                                <button onclick="deleteFund('${code}')"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                        <div class="fund-row fund-row-mid">
                            <span class="fund-profit ${pClass}"><span class="label-sm">今日盈亏</span> ${profitDisplay}</span>
                            <span class="fund-return ${rClass}"><span class="label-sm">收益率</span> ${returnDisplay}</span>
                        </div>
                        <div class="fund-row fund-row-bot">
                            <div class="fund-details-left">
                                <span class="detail-item"><i class="fas fa-layer-group"></i> 份额：${shares.toFixed(2)}</span>
                                <span class="detail-item"><i class="fas fa-tag"></i> 成本：${cost.toFixed(4)}</span>
                            </div>
                            <div class="fund-details-right">
                                <i class="fas fa-coins"></i> ¥${marketValue.toFixed(2)}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function renderAll() {
        renderSummary();
        renderFundList();
    }

    // ===== 刷新状态 =====
    function showUpdating(show) {
        const tip = document.getElementById('updatingTip');
        const btn = document.getElementById('refreshBtn');
        const icon = btn.querySelector('i');
        if (show) {
            tip.classList.add('show');
            btn.classList.add('refresh-loading');
            icon.className = 'fas fa-spinner';
        } else {
            tip.classList.remove('show');
            btn.classList.remove('refresh-loading');
            icon.className = 'fas fa-sync-alt';
        }
    }

    // ===== CRUD =====
    async function deleteFund(code) {
        const confirmed = await showConfirm('确定要删除这只基金吗？');
        if (!confirmed) return;
        delete holdings[code];
        delete cache[code];
        saveAll();
        renderAll();
    }

    function editFund(code) {
        const fund = holdings[code];
        if (!fund) return;
        document.getElementById('fundCodeInput').value = code;
        document.getElementById('fundCostInput').value = fund.cost;
        document.getElementById('fundSharesInput').value = fund.shares;
        const confirmBtn = document.getElementById('confirmAddBtn');
        confirmBtn.dataset.editCode = code;
        confirmBtn.textContent = '更新基金';
        confirmBtn.disabled = true;
        document.getElementById('modalOverlay').classList.add('active');
        autoFillFromCode(code);
    }

    // ===== 模态框工具 =====
    const promptOverlay = document.getElementById('promptModalOverlay');
    const promptTitle = document.getElementById('promptTitle');
    const promptMessage = document.getElementById('promptMessage');
    const promptActions = document.getElementById('promptActions');

    function showPrompt(title, message, buttons) {
        return new Promise((resolve) => {
            promptTitle.textContent = title || '提示';
            promptMessage.textContent = message || '';
            promptActions.innerHTML = '';
            buttons.forEach((btn) => {
                const el = document.createElement('button');
                el.textContent = btn.text;
                el.className = btn.className || 'btn-confirm';
                el.addEventListener('click', () => {
                    closePrompt();
                    resolve(btn.value);
                });
                promptActions.appendChild(el);
            });
            promptOverlay.classList.add('active');
        });
    }

    function closePrompt() { promptOverlay.classList.remove('active'); }

    function showAlert(message, title = '提示') {
        return showPrompt(title, message, [{ text: '确定', className: 'btn-confirm', value: true }]);
    }

    function showConfirm(message, title = '确认操作') {
        return showPrompt(title, message, [
            { text: '取消', className: 'btn-cancel', value: false },
            { text: '确定', className: 'btn-danger', value: true }
        ]);
    }

    promptOverlay.addEventListener('click', (e) => {
        if (e.target === promptOverlay && promptActions.children.length === 1) {
            const btn = promptActions.querySelector('.btn-confirm');
            if (btn) btn.click();
        }
    });

    let currentFetchName = '';

    // ===== 添加基金：只获取名称 =====
    async function autoFillFromCode(code) {
        const infoBox = document.getElementById('autoFillInfo');
        const infoText = document.getElementById('autoFillText');
        const confirmBtn = document.getElementById('confirmAddBtn');
        if (code.length !== 6 || isNaN(code)) {
            infoBox.classList.remove('show');
            confirmBtn.disabled = true;
            currentFetchName = '';
            return;
        }
        try {
            const data = await fetchTTFund(code);
            if (data && data.name) {
                currentFetchName = data.name;
                infoText.textContent = `已识别：${data.name}`;
                infoBox.style.borderColor = 'rgba(255,255,255,0.2)';
                infoBox.classList.add('show');
                confirmBtn.disabled = false;
            } else {
                infoBox.classList.remove('show');
                confirmBtn.disabled = true;
                currentFetchName = '';
            }
        } catch (e) {
            infoBox.classList.remove('show');
            confirmBtn.disabled = true;
            currentFetchName = '';
        }
    }

    function setupModal() {
        const overlay = document.getElementById('modalOverlay');
        const closeBtn = document.getElementById('closeModalBtn');
        const confirmBtn = document.getElementById('confirmAddBtn');
        const openBtn = document.getElementById('openAddModalBtn');
        const codeInput = document.getElementById('fundCodeInput');
        const costInput = document.getElementById('fundCostInput');
        const sharesInput = document.getElementById('fundSharesInput');

        openBtn.addEventListener('click', () => {
            confirmBtn.dataset.editCode = '';
            confirmBtn.textContent = '确认添加';
            confirmBtn.disabled = true;
            codeInput.value = '';
            costInput.value = '';
            sharesInput.value = '';
            document.getElementById('autoFillInfo').classList.remove('show');
            currentFetchName = '';
            overlay.classList.add('active');
            setTimeout(() => codeInput.focus(), 300);
        });

        closeBtn.addEventListener('click', () => overlay.classList.remove('active'));
        overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('active'); });

        codeInput.addEventListener('input', function() {
            const code = this.value.trim();
            if (code.length === 6 && !isNaN(code)) {
                autoFillFromCode(code);
            } else {
                document.getElementById('autoFillInfo').classList.remove('show');
                confirmBtn.disabled = true;
                currentFetchName = '';
            }
        });

        confirmBtn.addEventListener('click', async () => {
            const code = codeInput.value.trim();
            const cost = parseFloat(costInput.value);
            const shares = parseFloat(sharesInput.value);
            if (code.length !== 6) { await showAlert('请输入6位基金代码'); return; }
            if (isNaN(cost) || cost <= 0) { await showAlert('请输入有效的成本价'); return; }
            if (isNaN(shares) || shares <= 0) { await showAlert('请输入有效的持有份额'); return; }
            let name = currentFetchName;
            if (!name) {
                try {
                    const data = await fetchTTFund(code);
                    if (data && data.name) name = data.name;
                } catch (_) {}
            }
            if (!name) {
                await showAlert('未能识别基金代码，请确认正确后重试');
                return;
            }
            const editCode = confirmBtn.dataset.editCode;
            if (editCode) {
                if (editCode !== code) {
                    delete holdings[editCode];
                    delete cache[editCode];
                }
                holdings[code] = { cost, shares, name };
            } else {
                if (holdings[code]) {
                    const overwrite = await showConfirm(`已存在 ${name}(${code})，是否覆盖？`);
                    if (!overwrite) return;
                }
                holdings[code] = { cost, shares, name };
            }
            saveAll();
            overlay.classList.remove('active');
            await updateFund(code);
            renderAll();
        });
    }

    // ===== 数据管理 =====
    function setupBackup() {
        const overlay = document.getElementById('backupModalOverlay');
        const openBtn = document.getElementById('openBackupModalBtn');
        const closeBtn = document.getElementById('closeBackupModalBtn');
        const exportBtn = document.getElementById('exportBtn');
        const importInput = document.getElementById('importFileInput');
        const clearCacheBtn = document.getElementById('clearCacheBtn');

        openBtn.addEventListener('click', (e) => { e.stopPropagation();
            overlay.classList.add('active'); });
        closeBtn.addEventListener('click', () => overlay.classList.remove('active'));
        overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('active'); });

        exportBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            const data = JSON.stringify({ holdings, cache }, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `持仓配置_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        importInput.addEventListener('change', async function(e) {
            e.stopPropagation();
            const file = this.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (data.holdings && typeof data.holdings === 'object') {
                        const confirmed = await showConfirm(`将导入 ${Object.keys(data.holdings).length} 只基金配置，覆盖当前所有数据，确定吗？`);
                        if (confirmed) {
                            holdings = data.holdings || {};
                            cache = data.cache || {};
                            saveAll();
                            overlay.classList.remove('active');
                            await refreshWithCache();
                        }
                    } else {
                        await showAlert('配置格式无效，请检查文件');
                    }
                } catch (_) {
                    await showAlert('文件解析失败，请确保是有效的 JSON 文件');
                }
            };
            reader.readAsText(file);
            this.value = '';
        });

        clearCacheBtn.addEventListener('click', async function(e) {
            e.stopPropagation();
            const confirmed = await showConfirm('确定要清除所有缓存数据吗？\n（持仓配置不会被删除）', '清除缓存');
            if (confirmed) {
                cache = {};
                localStorage.setItem(STORAGE_C, JSON.stringify(cache));
                overlay.classList.remove('active');
                renderAll();
                await showAlert('✅ 缓存已清除');
            }
        });
    }

    function registerSW() {
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('✅ Service Worker 注册成功'))
                .catch((err) => console.log('❌ Service Worker 注册失败', err));
        }
    }

    // ============================================================
    //  🚀 启动
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        loadData();
        setupPrivacyEasterEgg();

        document.getElementById('refreshBtn').addEventListener('click', function() {
            refreshWithCache();
        });

        renderAll();

        if (Object.keys(holdings).length > 0) {
            const hasCache = Object.keys(cache).length > 0;
            if (!hasCache) {
                refreshWithCache().then(() => {
                    if (isTradingTime()) startAutoRefresh();
                });
            } else {
                silentUpdate().then(() => {
                    if (isTradingTime()) startAutoRefresh();
                });
            }
        }

        setupModal();
        setupBackup();

        setInterval(() => {
            if (isTradingTime() && !autoTimer) startAutoRefresh();
            if (!isTradingTime() && autoTimer) stopAutoRefresh();
        }, 30000);
        registerSW();
    });
</script>
</body>
</html>
