<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>💶持仓跟踪</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="持仓跟踪" />
    <link rel="apple-touch-icon" href="icon-1024.png" />
    <meta name="theme-color" content="#0b1a33" />

    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        html, body {
            width: 100%;
            min-height: 100vh;
            background: #f2f5fa;
            display: flex;
            justify-content: center;
            padding: 8px;
            overflow-x: hidden;
        }
        .app-container {
            max-width: 480px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            padding: 14px 16px 20px;
            min-height: 95vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== 顶部导航 ===== */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .app-header h1 {
            font-size: 18px;
            font-weight: 700;
            color: #0b1a33;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .app-header h1 svg {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }
        .header-actions {
            display: flex;
            gap: 4px;
        }
        .header-actions button {
            background: #f0f4fe;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 14px;
            color: #1a4f8b;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-actions button:active {
            transform: scale(0.92);
            background: #dce6f5;
        }

        /* ===== 顶部汇总卡片 ===== */
        .summary-card {
            background: linear-gradient(145deg, #0b1a33, #132b4a);
            border-radius: 16px;
            padding: 12px 16px;
            color: white;
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .summary-left .label {
            font-size: 11px;
            font-weight: 500;
            opacity: 0.6;
        }
        .summary-left .total-value {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .summary-left .total-value .currency {
            font-size: 14px;
            font-weight: 500;
            opacity: 0.7;
            margin-right: 2px;
        }
        .summary-right {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
        }
        .summary-stat {
            text-align: right;
        }
        .summary-stat .stat-label {
            font-size: 9px;
            opacity: 0.5;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .summary-stat .stat-number {
            font-size: 14px;
            font-weight: 600;
        }
        .stat-number.positive { color: #E63946; }
        .stat-number.negative { color: #2A9D8F; }
        .stat-number.neutral { color: #94a3b8; }
        .stat-number.hidden { color: rgba(255,255,255,0.25); }

        /* ===== 今日盈亏条（独立） ===== */
        .today-bar {
            background: #f8faff;
            border-radius: 12px;
            padding: 6px 14px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #2a7de1;
            flex-shrink: 0;
        }
        .today-bar .label {
            font-size: 12px;
            font-weight: 500;
            color: #1a3a5a;
        }
        .today-bar .label i {
            margin-right: 4px;
        }
        .today-bar .value {
            font-size: 18px;
            font-weight: 700;
        }
        .today-bar .value.positive { color: #E63946; }
        .today-bar .value.negative { color: #2A9D8F; }
        .today-bar .value.neutral { color: #94a3b8; }

        /* ===== 基金列表 ===== */
        .fund-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* ===== 基金卡片 ===== */
        .fund-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 4px 12px 4px 14px;
            border: 1px solid #eef2f8;
            height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .fund-card:active {
            background: #fafcff;
        }
        .fund-row {
            display: flex;
            align-items: center;
            line-height: 1.3;
            gap: 1px;
        }
        .fund-row-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 30px;
        }
        .fund-row-mid {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 28px;
        }
        .fund-row-bot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 28px;
        }

        .fund-name-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .status-dot.updated {
            background: #14b8a6;
        }
        .status-dot.estimate {
            background: #f97316;
        }

        .fund-name {
            font-size: 14px;
            font-weight: 600;
            color: #0b1a33;
        }
        .fund-code {
            font-weight: 400;
            font-size: 10px;
            color: #6b7d98;
            background: #f0f4fc;
            padding: 0 8px;
            border-radius: 30px;
            line-height: 18px;
            margin-left: 4px;
        }

        .fund-actions {
            display: flex;
            gap: 0px;
        }
        .fund-actions button {
            background: transparent;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            color: #8a9bb5;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.1s;
        }
        .fund-actions button:active {
            background: #f0f0f0;
        }
        .fund-actions button.edit-btn:active {
            background: #eef4fe;
            color: #2a7de1;
        }

        .fund-profit {
            font-size: 13px;
            font-weight: 600;
        }
        .fund-profit .label-sm {
            font-weight: 400;
            font-size: 9px;
            color: #7b8da8;
        }
        .fund-profit.positive { color: #E63946; }
        .fund-profit.negative { color: #2A9D8F; }
        .fund-profit.neutral { color: #94a3b8; }
        .fund-profit.hidden { color: #d5dde8; }

        .fund-return {
            font-size: 12px;
            font-weight: 600;
        }
        .fund-return .label-sm {
            font-weight: 400;
            font-size: 9px;
            color: #7b8da8;
        }
        .fund-return.positive { color: #E63946; }
        .fund-return.negative { color: #2A9D8F; }
        .fund-return.neutral { color: #94a3b8; }
        .fund-return.hidden { color: #d5dde8; }

        .fund-details-left {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 11px;
            color: #5a6e8a;
        }
        .fund-details-left span i {
            margin-right: 3px;
            opacity: 0.5;
            width: 12px;
        }
        .fund-details-right {
            font-size: 12px;
            font-weight: 600;
            color: #0b1a33;
        }
        .fund-details-right .label-sm {
            font-weight: 400;
            font-size: 9px;
            color: #7b8da8;
        }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #7b8da8;
        }
        .empty-state i {
            font-size: 36px;
            color: #d5dde8;
            margin-bottom: 6px;
        }
        .empty-state p {
            font-size: 14px;
            font-weight: 500;
        }
        .empty-state .sub {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 2px;
        }

        /* ===== 模态框 - 无卡片背景 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }

        .add-modal .add-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 360px;
        }
        .add-modal .add-content h2 {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .add-modal .add-content .sub {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            margin-bottom: 16px;
        }
        .add-modal .add-content .input-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }
        .add-modal .add-content .input-group label {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            text-align: left;
            margin-bottom: -4px;
        }
        .add-modal .add-content .input-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(4px);
            font-size: 16px;
            color: #ffffff;
            outline: none;
            transition: 0.15s;
            -webkit-appearance: none;
        }
        .add-modal .add-content .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }
        .add-modal .add-content .input-group input:focus {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.2);
        }
        .add-modal .add-content .auto-fill-info {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
            margin-top: -4px;
            margin-bottom: 4px;
            text-align: center;
        }
        .add-modal .add-content .auto-fill-info.show {
            display: block;
        }
        .add-modal .add-content .auto-fill-info i {
            margin-right: 6px;
        }
        .add-modal .add-content .modal-actions {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
        }
        .add-modal .add-content .modal-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.15s;
        }
        .add-modal .add-content .modal-actions .btn-cancel {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .add-modal .add-content .modal-actions .btn-cancel:active {
            background: rgba(255, 255, 255, 0.25);
        }
        .add-modal .add-content .modal-actions .btn-confirm {
            background: #ffffff;
            color: #0b1a33;
        }
        .add-modal .add-content .modal-actions .btn-confirm:active {
            background: #e8edf5;
        }
        .add-modal .add-content .modal-actions .btn-confirm:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .backup-modal .backup-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 360px;
        }
        .backup-modal .backup-content h2 {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .backup-modal .backup-content .sub {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            margin-bottom: 20px;
        }
        .backup-modal .backup-actions {
            display: flex;
            gap: 12px;
            flex-direction: column;
            width: 100%;
        }
        .backup-modal .backup-actions button {
            padding: 14px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .backup-modal .backup-actions button:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.25);
        }
        .backup-modal .backup-actions button.primary {
            background: #ffffff;
            color: #0b1a33;
        }
        .backup-modal .backup-actions button.primary:active {
            background: #e8edf5;
        }
        .backup-modal .file-input-wrap {
            position: relative;
            overflow: hidden;
            width: 100%;
        }
        .backup-modal .file-input-wrap input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .backup-modal .backup-close {
            margin-top: 16px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            cursor: pointer;
            padding: 8px 16px;
        }
        .backup-modal .backup-close:active {
            color: rgba(255, 255, 255, 0.7);
        }

        .prompt-modal .prompt-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 340px;
        }
        .prompt-modal .prompt-content h2 {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
        }
        .prompt-modal .prompt-content .prompt-message {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.5;
            margin-bottom: 18px;
        }
        .prompt-modal .prompt-content .modal-actions {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
        }
        .prompt-modal .prompt-content .modal-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.15s;
            max-width: 140px;
        }
        .prompt-modal .prompt-content .modal-actions .btn-cancel {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .prompt-modal .prompt-content .modal-actions .btn-cancel:active {
            background: rgba(255, 255, 255, 0.25);
        }
        .prompt-modal .prompt-content .modal-actions .btn-confirm {
            background: #ffffff;
            color: #0b1a33;
        }
        .prompt-modal .prompt-content .modal-actions .btn-confirm:active {
            background: #e8edf5;
        }
        .prompt-modal .prompt-content .modal-actions .btn-danger {
            background: #E63946;
            color: #ffffff;
        }
        .prompt-modal .prompt-content .modal-actions .btn-danger:active {
            background: #c92a3a;
        }

        .fund-list::-webkit-scrollbar {
            width: 3px;
        }
        .fund-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .fund-list::-webkit-scrollbar-thumb {
            background: #d5dde8;
            border-radius: 10px;
        }

        @media (max-width: 420px) {
            .app-container { padding: 10px 12px 16px; }
            .summary-left .total-value { font-size: 19px; }
            .summary-right { gap: 12px; }
            .summary-stat .stat-number { font-size: 12px; }
            .today-bar .value { font-size: 16px; }
            .fund-card { height: 92px; padding: 3px 10px; }
            .fund-name { font-size: 13px; }
            .fund-details-left { font-size: 10px; gap: 6px; }
            .fund-details-right { font-size: 11px; }
            .fund-profit { font-size: 12px; }
            .fund-return { font-size: 11px; }
            .header-actions button { width: 32px; height: 32px; font-size: 13px; }
            .app-header h1 { font-size: 16px; }
            .app-header h1 svg { width: 20px; height: 20px; }
            .fund-row-top { height: 28px; }
            .fund-row-mid { height: 26px; }
            .fund-row-bot { height: 26px; }
            .add-modal .add-content { padding: 16px; }
            .add-modal .add-content .input-group input { font-size: 15px; padding: 10px 14px; }
            .backup-modal .backup-content { padding: 16px; }
        }
    </style>
</head>
<body>
<div class="app-container" id="app">

    <header class="app-header">
        <h1>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4.97883 9.68508C2.99294 8.89073 2 8.49355 2 8C2 7.50645 2.99294 7.10927 4.97883 6.31492L7.7873 5.19153C9.77318 4.39718 10.7661 4 12 4C13.2339 4 14.2268 4.39718 16.2127 5.19153L19.0212 6.31492C21.0071 7.10927 22 7.50645 22 8C22 8.49355 21.0071 8.89073 19.0212 9.68508L16.2127 10.8085C14.2268 11.6028 13.2339 12 12 12C10.7661 12 9.77318 11.6028 7.7873 10.8085L4.97883 9.68508Z" fill="#1C274C"/>
                <path fill-rule="evenodd" clip-rule="evenodd" d="M2 8C2 8.49355 2.99294 8.89073 4.97883 9.68508L7.7873 10.8085C9.77318 11.6028 10.7661 12 12 12C13.2339 12 14.2268 11.6028 16.2127 10.8085L19.0212 9.68508C21.0071 8.89073 22 8.49355 22 8C22 7.50645 21.0071 7.10927 19.0212 6.31492L16.2127 5.19153C14.2268 4.39718 13.2339 4 12 4C10.7661 4 9.77318 4.39718 7.7873 5.19153L4.97883 6.31492C2.99294 7.10927 2 7.50645 2 8Z" fill="#1C274C"/>
                <path opacity="0.7" d="M5.76613 10L4.97883 10.3149C2.99294 11.1093 2 11.5065 2 12C2 12.4935 2.99294 12.8907 4.97883 13.6851L7.7873 14.8085C9.77318 15.6028 10.7661 16 12 16C13.2339 16 14.2268 15.6028 16.2127 14.8085L19.0212 13.6851C21.0071 12.8907 22 12.4935 22 12C22 11.5065 21.0071 11.1093 19.0212 10.3149L18.2339 10L16.2127 10.8085C14.2268 11.6028 13.2339 12 12 12C10.7661 12 9.77318 11.6028 7.7873 10.8085L5.76613 10Z" fill="#1C274C"/>
                <path opacity="0.4" d="M5.76613 14L4.97883 14.3149C2.99294 15.1093 2 15.5065 2 16C2 16.4935 2.99294 16.8907 4.97883 17.6851L7.7873 18.8085C9.77318 19.6028 10.7661 20 12 20C13.2339 20 14.2268 19.6028 16.2127 18.8085L19.0212 17.6851C21.0071 16.8907 22 16.4935 22 16C22 15.5065 21.0071 15.1093 19.0212 14.3149L18.2339 14L16.2127 14.8085C14.2268 15.6028 13.2339 16 12 16C10.7661 16 9.77318 15.6028 7.7873 14.8085L5.76613 14Z" fill="#1C274C"/>
            </svg>
            持仓跟踪
        </h1>
        <div class="header-actions">
            <button id="refreshBtn" title="刷新"><i class="fas fa-sync-alt"></i></button>
            <button id="openAddModalBtn" title="添加基金"><i class="fas fa-plus-circle"></i></button>
            <button id="openBackupModalBtn" title="配置备份"><i class="fas fa-cloud-upload-alt"></i></button>
        </div>
    </header>

    <section class="summary-card">
        <div class="summary-left">
            <div class="label"><i class="fas fa-wallet"></i> 总资产</div>
            <div class="total-value"><span class="currency">¥</span><span id="totalAssets">0.00</span></div>
        </div>
        <div class="summary-right">
            <div class="summary-stat">
                <div class="stat-label">持有收益</div>
                <div class="stat-number" id="totalProfit">+0.00</div>
            </div>
            <div class="summary-stat">
                <div class="stat-label">总收益率</div>
                <div class="stat-number" id="totalReturn">0.00%</div>
            </div>
        </div>
    </section>

    <div class="today-bar" id="todayBar">
        <span class="label" id="todayLabel"><i class="far fa-clock"></i> 今日预估盈亏</span>
        <span class="value" id="todayProfit">+0.00</span>
    </div>

    <div class="fund-list" id="fundList">
        <div class="empty-state">
            <i class="fas fa-inbox"></i>
            <p>还没有持仓基金</p>
            <div class="sub">点击右上角 <i class="fas fa-plus-circle"></i> 添加</div>
        </div>
    </div>
</div>

<!-- ===== 添加基金 Modal ===== -->

<div class="modal-overlay prompt-modal" id="promptModalOverlay">
    <div class="prompt-content">
        <h2 id="promptTitle">提示</h2>
        <div class="prompt-message" id="promptMessage">消息内容</div>
        <div class="modal-actions" id="promptActions"></div>
    </div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

<script>
    // ============================================================
    //  通用提示模态框
    // ============================================================
    let promptResolve = null;
    const promptOverlay = document.getElementById('promptModalOverlay');
    const promptTitle = document.getElementById('promptTitle');
    const promptMessage = document.getElementById('promptMessage');
    const promptActions = document.getElementById('promptActions');

    function showPrompt(title, message, buttons) {
        return new Promise((resolve) => {
            promptTitle.textContent = title || '提示';
            promptMessage.textContent = message || '';
            promptActions.innerHTML = '';
            buttons.forEach((btn) => {
                const buttonEl = document.createElement('button');
                buttonEl.textContent = btn.text;
                buttonEl.className = btn.className || 'btn-confirm';
                buttonEl.addEventListener('click', () => {
                    closePrompt();
                    resolve(btn.value);
                });
                promptActions.appendChild(buttonEl);
            });
            promptOverlay.classList.add('active');
        });
    }

    function closePrompt() {
        promptOverlay.classList.remove('active');
    }

    function showAlert(message, title = '提示') {
        return showPrompt(title, message, [
            { text: '确定', className: 'btn-confirm', value: true }
        ]);
    }

    function showConfirm(message, title = '确认操作') {
        return showPrompt(title, message, [
            { text: '取消', className: 'btn-cancel', value: false },
            { text: '确定', className: 'btn-danger', value: true }
        ]);
    }

    promptOverlay.addEventListener('click', (e) => {
        if (e.target === promptOverlay && promptActions.children.length === 1) {
            const btn = promptActions.querySelector('.btn-confirm');
            if (btn) btn.click();
        }
    });

    // ============================================================
    //  JSONP 工具
    // ============================================================
    function jsonpRequest(url, callbackName) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = url;
            const timeout = setTimeout(() => { cleanup(); reject(new Error('超时')); }, 10000);
            function cleanup() {
                if (script.parentNode) script.parentNode.removeChild(script);
                clearTimeout(timeout);
                try { delete window[callbackName]; } catch (_) {}
            }
            window[callbackName] = function(data) { cleanup(); resolve(data); };
            script.onerror = function() { cleanup(); reject(new Error('网络错误')); };
            document.head.appendChild(script);
        });
    }

    function jsonpRequestTencent(code) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = `https://qt.gtimg.cn/q=jj${code}`;
            const timeout = setTimeout(() => { cleanup(); reject(new Error('超时')); }, 10000);
            const varName = `v_jj${code}`;
            function cleanup() {
                if (script.parentNode) script.parentNode.removeChild(script);
                clearTimeout(timeout);
            }
            script.onload = function() {
                cleanup();
                const raw = window[varName];
                if (raw && typeof raw === 'string') {
                    const parts = raw.split('~');
                    resolve({
                        name: parts[1] || '',
                        nav: parseFloat(parts[5]) || 0,
                        totalNav: parseFloat(parts[6]) || 0,
                        changePercent: parseFloat(parts[2]) || 0,
                        estimateChange: parseFloat(parts[7]) || 0,
                        date: parts[8] || '',
                    });
                } else { reject(new Error('格式错误')); }
            };
            script.onerror = function() { cleanup(); reject(new Error('网络错误')); };
            document.head.appendChild(script);
        });
    }

    // ============================================================
    //  数据层
    // ============================================================
    const STORAGE_KEY = 'fund_holding_smart_v15';
    const YESTERDAY_KEY = 'fund_yesterday_data_v1';
    let funds = [];
    let realtimeData = {};
    let yesterdayData = {};
    let autoTimer = null;

    function loadData() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
            try {
                const parsed = JSON.parse(raw);
                if (Array.isArray(parsed) && parsed.length > 0) { funds = parsed; return; }
            } catch (_) {}
        }
        funds = [];
        saveData();

        const rawY = localStorage.getItem(YESTERDAY_KEY);
        if (rawY) {
            try {
                yesterdayData = JSON.parse(rawY);
            } catch (_) { yesterdayData = {}; }
        } else {
            yesterdayData = {};
        }
    }

    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(funds)); }

    function saveYesterdayData() {
        if (funds.length === 0) return;
        const today = new Date().toISOString().slice(0,10);
        if (yesterdayData._date === today) return;

        let totalYesterdayProfit = 0;
        const map = {};
        let totalShares = 0;
        funds.forEach(f => {
            const rt = realtimeData[f.code] || {};
            const stats = calcFundStats(f, rt);
            map[f.code] = {
                yesterdayProfit: stats.todayProfit,
                yesterdayProfitRate: stats.todayProfitRate
            };
            totalYesterdayProfit += stats.todayProfit;
        });
        map._date = today;
        map._total = totalYesterdayProfit;
        yesterdayData = map;
        localStorage.setItem(YESTERDAY_KEY, JSON.stringify(map));
    }

    // ============================================================
    //  交易时段判断
    // ============================================================
    function isTradingDay() {
        const now = new Date();
        const day = now.getDay();
        if (day === 0 || day === 6) return false;
        const m = now.getMonth(), d = now.getDate();
        if (m === 0 && d === 1) return false;
        if (m === 0 && d >= 28 && d <= 31) return false;
        if (m === 1 && d <= 4) return false;
        if (m === 3 && d >= 4 && d <= 6) return false;
        if (m === 4 && d >= 1 && d <= 5) return false;
        if (m === 5 && d >= 31) return false;
        if (m === 6 && d <= 2) return false;
        if (m === 9 && d >= 1 && d <= 7) return false;
        if (m === 9 && d === 6) return false;
        return true;
    }

    function isTradingTime() {
        if (!isTradingDay()) return false;
        const now = new Date();
        const h = now.getHours(), m = now.getMinutes();
        const total = h * 60 + m;
        return total >= 555 && total < 915;
    }

    // ============================================================
    //  API 调用
    // ============================================================
    async function fetchTTFund(code) {
        try {
            const data = await jsonpRequest(`https://fundgz.1234567.com.cn/js/${code}.js`, 'jsonpgz');
            return {
                name: data.name,
                dwjz: parseFloat(data.dwjz) || 0,
                gsz: parseFloat(data.gsz) || 0,
                gszzl: parseFloat(data.gszzl) || 0,
                jzrq: data.jzrq || '',
            };
        } catch (e) { return null; }
    }

    async function fetchTencentFund(code) {
        try { return await jsonpRequestTencent(code); } catch (e) { return null; }
    }

    async function fetchFundDataOnly(code) {
        const [ttData, txData] = await Promise.all([
            fetchTTFund(code),
            fetchTencentFund(code).catch(() => null)
        ]);
        let name = '', dwjz = 0, gsz = 0, gszzl = 0, nav = 0, changePercent = 0, estimateChange = 0, navDate = '';
        if (ttData) {
            name = ttData.name;
            dwjz = ttData.dwjz;
            gsz = ttData.gsz;
            gszzl = ttData.gszzl;
            navDate = ttData.jzrq;
        }
        if (txData && txData.nav > 0) {
            nav = txData.nav;
            changePercent = txData.changePercent || 0;
            estimateChange = txData.estimateChange || 0;
            if (txData.date) navDate = txData.date;
            if (!name) name = txData.name;
        }
        return { name, dwjz, gsz, gszzl, nav, changePercent, estimateChange, navDate };
    }

    async function fetchEstimateOnly(code) {
        try {
            const data = await fetchTTFund(code);
            return data ? { gsz: data.gsz, gszzl: data.gszzl } : null;
        } catch (e) { return null; }
    }

    async function fetchFundForAdd(code) {
        const [ttData, txData] = await Promise.all([
            fetchTTFund(code),
            fetchTencentFund(code).catch(() => null)
        ]);
        let name = '', displayNav = 0;
        if (txData && txData.nav > 0) {
            name = txData.name || '';
            displayNav = txData.nav;
        } else if (ttData && ttData.name) {
            name = ttData.name;
            displayNav = ttData.gsz || ttData.dwjz || 0;
        }
        if (name) {
            return { name, displayNav };
        }
        return null;
    }

    // ============================================================
    //  核心计算
    // ============================================================
    function calcFundStats(fund, realtime) {
        const { cost, shares } = fund;
        const costValue = cost * shares;

        const now = new Date();
        const h = now.getHours(), m = now.getMinutes();
        const totalMinutes = h * 60 + m;
        const isBeforeTrading = totalMinutes < 555;

        // 开盘前：优先使用缓存的逐只数据
        if (isBeforeTrading) {
            const cached = yesterdayData[fund.code];
            if (cached) {
                // 使用当前净值计算市值和持有收益
                const nav = realtime?.nav || cost;
                const marketValue = nav * shares;
                const profit = marketValue - costValue;
                const profitRate = costValue !== 0 ? (profit / costValue) * 100 : 0;
                return {
                    costValue,
                    marketValue,
                    profit,
                    profitRate,
                    todayProfit: cached.yesterdayProfit || 0,
                    todayProfitRate: cached.yesterdayProfitRate || 0,
                    currentNav: nav,
                    prevNav: nav,
                    isEstimate: false,
                    navDate: realtime?.navDate || '',
                };
            }
            // 没有逐只缓存，先返回0，将在renderFundList中按比例分配
            const nav = realtime?.nav || cost;
            const marketValue = nav * shares;
            const profit = marketValue - costValue;
            const profitRate = costValue !== 0 ? (profit / costValue) * 100 : 0;
            return {
                costValue,
                marketValue,
                profit,
                profitRate,
                todayProfit: 0,
                todayProfitRate: 0,
                currentNav: nav,
                prevNav: nav,
                isEstimate: false,
                navDate: realtime?.navDate || '',
            };
        }

        // 盘中或盘后：正常计算
        let currentNav = 0;
        let rate = 0;
        let isEstimate = false;
        let prevNav = 0;

        const isTrading = isTradingTime();

        if (isTrading && realtime?.gsz && realtime.gsz > 0) {
            currentNav = realtime.gsz;
            rate = realtime.gszzl || 0;
            isEstimate = true;
        } else if (realtime?.nav && realtime.nav > 0) {
            currentNav = realtime.nav;
            rate = realtime.changePercent || 0;
            isEstimate = false;
        } else {
            currentNav = cost;
            rate = 0;
            isEstimate = false;
        }

        if (rate !== 0) {
            prevNav = currentNav / (1 + rate / 100);
        } else {
            prevNav = currentNav;
        }

        const marketValue = currentNav * shares;
        const profit = marketValue - costValue;
        const profitRate = costValue !== 0 ? (profit / costValue) * 100 : 0;

        const todayProfit = (currentNav - prevNav) * shares;
        const todayProfitRate = prevNav !== 0 ? (todayProfit / (prevNav * shares)) * 100 : 0;

        return {
            costValue,
            marketValue,
            profit,
            profitRate,
            todayProfit,
            todayProfitRate,
            currentNav,
            prevNav,
            isEstimate,
            navDate: realtime?.navDate || '',
        };
    }

    // ============================================================
    //  渲染
    // ============================================================
    async function refreshData() {
        if (funds.length === 0) { renderAll(); return; }
        const codes = funds.map(f => f.code);
        const results = await Promise.all(codes.map(code => fetchFundDataOnly(code)));
        realtimeData = {};
        funds.forEach((f, idx) => {
            const data = results[idx] || {};
            realtimeData[f.code] = {
                gsz: data.gsz || 0,
                gszzl: data.gszzl || 0,
                nav: data.nav || 0,
                changePercent: data.changePercent || 0,
                navDate: data.navDate || '',
                nameFromApi: data.name || '',
            };
        });
        saveData();
        renderAll();
        const btn = document.getElementById('refreshBtn');
        btn.style.transform = 'rotate(360deg)';
        setTimeout(() => btn.style.transform = '', 300);
    }

    async function refreshEstimateOnly() {
        if (funds.length === 0 || !isTradingTime()) return;
        const codes = funds.map(f => f.code);
        const results = await Promise.all(codes.map(code => fetchEstimateOnly(code)));
        results.forEach((data, idx) => {
            if (data) {
                const code = codes[idx];
                if (realtimeData[code]) {
                    realtimeData[code].gsz = data.gsz || realtimeData[code].gsz;
                    realtimeData[code].gszzl = data.gszzl || realtimeData[code].gszzl;
                }
            }
        });
        renderAll();
    }

    function renderAll() {
        const now = new Date();
        const h = now.getHours(), m = now.getMinutes();
        const total = h * 60 + m;
        if (total >= 915 && isTradingDay()) {
            saveYesterdayData();
        }
        renderSummary();
        renderTodayProfit();
        renderFundList();
    }

    function renderSummary() {
        if (funds.length === 0) {
            document.getElementById('totalAssets').textContent = '0.00';
            const pe = document.getElementById('totalProfit');
            pe.textContent = '+0.00'; pe.className = 'stat-number neutral';
            const re = document.getElementById('totalReturn');
            re.textContent = '0.00%'; re.className = 'stat-number neutral';
            return;
        }
        let totalMarket = 0, totalCost = 0, totalProfit = 0;
        funds.forEach(f => {
            const rt = realtimeData[f.code] || {};
            const stats = calcFundStats(f, rt);
            totalMarket += stats.marketValue;
            totalCost += stats.costValue;
            totalProfit += stats.profit;
        });
        const totalRate = totalCost !== 0 ? (totalProfit / totalCost) * 100 : 0;
        document.getElementById('totalAssets').textContent = totalMarket.toFixed(2);
        const pe = document.getElementById('totalProfit');
        pe.textContent = (totalProfit >= 0 ? '+' : '') + totalProfit.toFixed(2);
        pe.className = 'stat-number ' + (totalProfit > 0 ? 'positive' : totalProfit < 0 ? 'negative' : 'neutral');
        const re = document.getElementById('totalReturn');
        const isTrading = isTradingTime();
        if (isTrading) {
            re.textContent = '--';
            re.className = 'stat-number hidden';
        } else {
            re.textContent = (totalRate >= 0 ? '+' : '') + totalRate.toFixed(2) + '%';
            re.className = 'stat-number ' + (totalRate > 0 ? 'positive' : totalRate < 0 ? 'negative' : 'neutral');
        }
    }

    function renderTodayProfit() {
        if (funds.length === 0) {
            document.getElementById('todayProfit').textContent = '+0.00';
            document.getElementById('todayProfit').className = 'value neutral';
            document.getElementById('todayLabel').innerHTML = '<i class="far fa-clock"></i> 今日预估盈亏';
            return;
        }

        const now = new Date();
        const h = now.getHours(), m = now.getMinutes();
        const totalMinutes = h * 60 + m;
        const isBeforeTrading = totalMinutes < 555;

        if (isBeforeTrading && yesterdayData._total !== undefined) {
            const total = yesterdayData._total || 0;
            const sign = total >= 0 ? '+' : '';
            const el = document.getElementById('todayProfit');
            el.textContent = sign + total.toFixed(2);
            el.className = 'value ' + (total > 0 ? 'positive' : (total < 0 ? 'negative' : 'neutral'));
            document.getElementById('todayLabel').innerHTML = '<i class="fas fa-history"></i> 昨日实际盈亏';
            return;
        }

        let totalToday = 0;
        funds.forEach(f => {
            const rt = realtimeData[f.code] || {};
            const stats = calcFundStats(f, rt);
            totalToday += stats.todayProfit;
        });
        const sign = totalToday >= 0 ? '+' : '';
        const el = document.getElementById('todayProfit');
        el.textContent = sign + totalToday.toFixed(2);
        el.className = 'value ' + (totalToday > 0 ? 'positive' : totalToday < 0 ? 'negative' : 'neutral');
        const label = document.getElementById('todayLabel');
        if (isTradingTime()) {
            label.innerHTML = '<i class="far fa-sun"></i> 今日预估盈亏';
        } else {
            label.innerHTML = '<i class="fas fa-moon"></i> 今日实际盈亏';
        }
    }

    function renderFundList() {
        const container = document.getElementById('fundList');
        if (funds.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <p>还没有持仓基金</p>
                    <div class="sub">点击右上角 <i class="fas fa-plus-circle"></i> 添加</div>
                </div>
            `;
            return;
        }

        const now = new Date();
        const h = now.getHours(), m = now.getMinutes();
        const totalMinutes = h * 60 + m;
        const isBeforeTrading = totalMinutes < 555;
        const isTrading = isTradingTime();

        let html = '';
        // 如果开盘前且有缓存总数据，但没有逐只缓存，则按份额比例分配
        const hasTotalCache = (yesterdayData._total !== undefined);
        let totalShares = 0;
        if (isBeforeTrading && hasTotalCache) {
            // 计算总份额
            funds.forEach(f => { totalShares += f.shares; });
        }

        funds.forEach((f, index) => {
            const rt = realtimeData[f.code] || {};
            const stats = calcFundStats(f, rt);
            let today = stats.todayProfit;
            let rate = stats.todayProfitRate;

            // 如果是开盘前且没有逐只缓存，但有总缓存，则按比例分配
            if (isBeforeTrading && hasTotalCache && !yesterdayData[f.code]) {
                const shareRatio = totalShares > 0 ? f.shares / totalShares : 0;
                today = (yesterdayData._total || 0) * shareRatio;
                // 计算收益率：用分配后的盈亏除以（份额 * 昨净），这里昨净用成本近似
                const prevNav = stats.prevNav || f.cost;
                rate = (prevNav * f.shares) !== 0 ? (today / (prevNav * f.shares)) * 100 : 0;
            }

            const dotClass = stats.isEstimate ? 'estimate' : 'updated';
            const sign = today >= 0 ? '+' : '';
            const profitClass = today > 0 ? 'positive' : (today < 0 ? 'negative' : 'neutral');
            const displayPrev = stats.prevNav || f.cost;

            let profitDisplay, profitClassDisplay, returnDisplay, returnClassDisplay;
            if (isBeforeTrading) {
                profitDisplay = sign + today.toFixed(2);
                profitClassDisplay = profitClass;
                returnDisplay = sign + rate.toFixed(2) + '%';
                returnClassDisplay = profitClass;
            } else if (isTrading) {
                profitDisplay = '--';
                profitClassDisplay = 'hidden';
                returnDisplay = '--';
                returnClassDisplay = 'hidden';
            } else {
                profitDisplay = sign + today.toFixed(2);
                profitClassDisplay = profitClass;
                returnDisplay = sign + rate.toFixed(2) + '%';
                returnClassDisplay = profitClass;
            }

            html += `
                <div class="fund-card" data-id="${f.id}">
                    <div class="fund-row fund-row-top">
                        <div class="fund-name-wrap">
                            <span class="status-dot ${dotClass}"></span>
                            <span class="fund-name">${f.name || f.code}</span>
                            <span class="fund-code">${f.code}</span>
                        </div>
                        <div class="fund-actions">
                            <button class="edit-btn" onclick="editFund('${f.id}')"><i class="fas fa-pen"></i></button>
                            <button onclick="deleteFund('${f.id}')"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                    <div class="fund-row fund-row-mid">
                        <span class="fund-profit ${profitClassDisplay}">
                            <span class="label-sm">今日盈亏</span> ${profitDisplay}
                        </span>
                        <span class="fund-return ${returnClassDisplay}">
                            <span class="label-sm">收益率</span> ${returnDisplay}
                        </span>
                    </div>
                    <div class="fund-row fund-row-bot">
                        <div class="fund-details-left">
                            <span><i class="fas fa-layer-group"></i> ${f.shares.toFixed(2)}份</span>
                            <span><i class="fas fa-tag"></i> 成本 ${f.cost.toFixed(4)}</span>
                            <span><i class="fas fa-calendar-alt"></i> 昨净 ${displayPrev.toFixed(4)}</span>
                        </div>
                        <div class="fund-details-right">
                            <span class="label-sm">市值</span> ¥${stats.marketValue.toFixed(2)}
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    // ============================================================
    //  自动定时器
    // ============================================================
    function startAutoRefresh() {
        stopAutoRefresh();
        if (!isTradingDay()) return;
        if (isTradingTime()) refreshEstimateOnly();
        autoTimer = setInterval(() => {
            if (isTradingTime()) {
                refreshEstimateOnly();
            } else {
                stopAutoRefresh();
            }
        }, 60000);
    }

    function stopAutoRefresh() {
        if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
    }

    // ============================================================
    //  CRUD
    // ============================================================
    async function deleteFund(id) {
        const confirmed = await showConfirm('确定要删除这只基金吗？');
        if (!confirmed) return;
        funds = funds.filter(f => f.id !== id);
        saveData();
        funds.forEach(f => delete realtimeData[f.code]);
        renderAll();
    }

    function editFund(id) {
        const fund = funds.find(f => f.id === id);
        if (!fund) return;
        document.getElementById('fundCodeInput').value = fund.code;
        document.getElementById('fundCostInput').value = fund.cost;
        document.getElementById('fundSharesInput').value = fund.shares;
        const confirmBtn = document.getElementById('confirmAddBtn');
        confirmBtn.dataset.editId = id;
        confirmBtn.textContent = '更新基金';
        confirmBtn.disabled = true;
        document.getElementById('modalOverlay').classList.add('active');
        autoFillFromCode(fund.code);
    }

    async function autoFillFromCode(code) {
        const infoBox = document.getElementById('autoFillInfo');
        const infoText = document.getElementById('autoFillText');
        const confirmBtn = document.getElementById('confirmAddBtn');
        if (code.length !== 6 || isNaN(code)) {
            infoBox.classList.remove('show');
            confirmBtn.disabled = true;
            return;
        }
        try {
            const data = await fetchFundForAdd(code);
            if (data && data.name) {
                currentFetchName = data.name;
                const navDisplay = data.displayNav || 0;
                infoText.textContent = `已识别：${data.name}（净值 ${navDisplay.toFixed(4)}）`;
                infoBox.style.borderColor = 'rgba(255,255,255,0.2)';
                infoBox.classList.add('show');
                confirmBtn.disabled = false;
            } else {
                infoBox.classList.remove('show');
                confirmBtn.disabled = true;
                currentFetchName = '';
            }
        } catch (e) {
            infoBox.classList.remove('show');
            confirmBtn.disabled = true;
            currentFetchName = '';
        }
    }

    // ============================================================
    //  Modal 逻辑
    // ============================================================
    let currentFetchName = '';

    function setupModal() {
        const overlay = document.getElementById('modalOverlay');
        const closeBtn = document.getElementById('closeModalBtn');
        const confirmBtn = document.getElementById('confirmAddBtn');
        const openBtn = document.getElementById('openAddModalBtn');
        const codeInput = document.getElementById('fundCodeInput');
        const costInput = document.getElementById('fundCostInput');
        const sharesInput = document.getElementById('fundSharesInput');

        openBtn.addEventListener('click', () => {
            confirmBtn.dataset.editId = '';
            confirmBtn.textContent = '确认添加';
            confirmBtn.disabled = true;
            codeInput.value = '';
            costInput.value = '';
            sharesInput.value = '';
            document.getElementById('autoFillInfo').classList.remove('show');
            currentFetchName = '';
            overlay.classList.add('active');
            setTimeout(() => codeInput.focus(), 300);
        });

        function closeModal() { overlay.classList.remove('active'); }
        closeBtn.addEventListener('click', closeModal);
        overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

        codeInput.addEventListener('input', function() {
            const code = this.value.trim();
            if (code.length === 6 && !isNaN(code)) {
                autoFillFromCode(code);
            } else {
                document.getElementById('autoFillInfo').classList.remove('show');
                confirmBtn.disabled = true;
                currentFetchName = '';
            }
        });

        confirmBtn.addEventListener('click', async () => {
            const code = codeInput.value.trim();
            const cost = parseFloat(costInput.value);
            const shares = parseFloat(sharesInput.value);
            if (code.length !== 6) {
                await showAlert('请输入6位基金代码');
                return;
            }
            if (isNaN(cost) || cost <= 0) {
                await showAlert('请输入有效的成本价');
                return;
            }
            if (isNaN(shares) || shares <= 0) {
                await showAlert('请输入有效的持有份额');
                return;
            }
            let name = currentFetchName;
            if (!name) {
                try {
                    const data = await fetchFundForAdd(code);
                    if (data && data.name) name = data.name;
                } catch (_) {}
            }
            if (!name) {
                await showAlert('未能识别基金代码，请确认正确后重试');
                return;
            }
            const editId = confirmBtn.dataset.editId;
            if (editId) {
                const idx = funds.findIndex(f => f.id === editId);
                if (idx !== -1) funds[idx] = { ...funds[idx], code, name, cost, shares };
            } else {
                const exist = funds.find(f => f.code === code);
                if (exist) {
                    const overwrite = await showConfirm(`已存在 ${exist.name}(${code})，是否覆盖？`);
                    if (!overwrite) return;
                    exist.cost = cost; exist.shares = shares; exist.name = name;
                } else {
                    funds.push({ id: String(Date.now() + Math.random() * 1000), code, name, cost, shares });
                }
            }
            saveData();
            closeModal();
            realtimeData = {};
            await refreshData();
            renderAll();
        });
    }

    // ============================================================
    //  配置备份
    // ============================================================
    function setupBackup() {
        const overlay = document.getElementById('backupModalOverlay');
        const openBtn = document.getElementById('openBackupModalBtn');
        const closeBtn = document.getElementById('closeBackupModalBtn');
        const exportBtn = document.getElementById('exportBtn');
        const importInput = document.getElementById('importFileInput');

        openBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            overlay.classList.add('active');
        });

        function closeBackup() { overlay.classList.remove('active'); }
        closeBtn.addEventListener('click', closeBackup);
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeBackup();
        });

        exportBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            const data = JSON.stringify(funds, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `持仓配置_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        importInput.addEventListener('change', async function(e) {
            e.stopPropagation();
            const file = this.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (Array.isArray(data) && data.length > 0) {
                        const confirmed = await showConfirm(`将导入 ${data.length} 只基金配置，覆盖当前所有数据，确定吗？`);
                        if (confirmed) {
                            funds = data;
                            saveData();
                            realtimeData = {};
                            overlay.classList.remove('active');
                            refreshData();
                        }
                    } else {
                        await showAlert('配置格式无效，请检查文件');
                    }
                } catch (_) {
                    await showAlert('文件解析失败，请确保是有效的 JSON 文件');
                }
            };
            reader.readAsText(file);
            this.value = '';
        });
    }

    // ============================================================
    //  Service Worker 注册
    // ============================================================
    function registerSW() {
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(function(reg) {
                    console.log('✅ Service Worker 注册成功');
                })
                .catch(function(err) {
                    console.log('❌ Service Worker 注册失败', err);
                });
        }
    }

    // ============================================================
    //  启动
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        loadData();
        if (funds.length > 0) {
            refreshData().then(() => {
                if (isTradingTime()) startAutoRefresh();
            });
        } else {
            renderAll();
        }
        setupModal();
        setupBackup();
        document.getElementById('refreshBtn').addEventListener('click', function() {
            refreshData();
            if (isTradingTime()) { stopAutoRefresh(); startAutoRefresh(); }
        });
        setInterval(() => {
            if (isTradingTime() && !autoTimer) startAutoRefresh();
            if (!isTradingTime() && autoTimer) stopAutoRefresh();
        }, 30000);
        registerSW();
    });
</script>
</body>
</html>
