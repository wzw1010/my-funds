<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>持仓跟踪 · 真完整版</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="持仓跟踪" />
    <link rel="apple-touch-icon" href="icon-1024.png" />
    <meta name="theme-color" content="#f2f5fa" />
    <style>
        /* ===== 完整样式（与之前一致，不再重复） ===== */
        :root {
            --radius-md: 20px;
            --radius-sm: 12px;
            --radius-full: 50%;
            --color-bg: #f2f5fc;
            --color-card-bg: #ffffff;
            --color-primary: #0b1a33;
            --color-primary-light: #132b4a;
            --color-text: #0b1a33;
            --color-text-secondary: #6b7d98;
            --color-text-light: #94a3b8;
            --color-border: #eef2f8;
            --color-positive: #E63946;
            --color-negative: #2A9D8F;
            --color-neutral: #94a3b8;
            --color-edit-border: #d0d8e0;
            --color-edit-bg: #f8fafc;
            --shadow-card: 0 4px 16px rgba(0,0,0,0.08);
            --shadow-summary: 0 6px 24px rgba(0,0,0,0.12);
            --decor-actual: #0b1a33;
            --decor-estimate: #8aabb8;
            --decor-final-estimate: #e8a87c;
            --decor-empty: transparent;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
        html,body { width:100%; min-height:100vh; background:var(--color-bg); display:flex; justify-content:center; padding:4px; overflow-x:hidden; }
        .app-container { max-width:480px; width:100%; background:#ffffff; border-radius:var(--radius-md); box-shadow:0 8px 32px rgba(0,0,0,0.05); padding:14px 14px 20px; display:flex; flex-direction:column; align-self:flex-start; gap:14px; }
        .summary-card { background:linear-gradient(145deg,var(--color-primary),var(--color-primary-light)); border-radius:var(--radius-md); padding:14px 20px 12px 20px; color:white; flex-shrink:0; box-shadow:var(--shadow-summary); }
        .summary-today { display:flex; flex-direction:column; align-items:center; margin-bottom:10px; }
        .summary-today .today-label { font-size:13px; font-weight:500; opacity:0.7; letter-spacing:0.3px; display:flex; align-items:center; gap:6px; }
        .summary-today .today-label svg { width:16px; height:16px; stroke:rgba(255,255,255,0.7); stroke-width:2; fill:none; }
        .summary-today .today-value { font-size:30px; font-weight:700; letter-spacing:-0.5px; line-height:1.2; margin-top:0px; }
        .summary-today .today-value.positive { color:var(--color-positive); }
        .summary-today .today-value.negative { color:var(--color-negative); }
        .summary-today .today-value.neutral { color:var(--color-text-light); }
        .summary-today .today-value.privacy { color:var(--color-text-light); letter-spacing:4px; }
        .summary-divider { border:none; border-top:1px solid rgba(255,255,255,0.10); margin:0 0 10px 0; }
        .summary-stats { display:flex; justify-content:space-between; align-items:center; }
        .summary-stat-item { display:flex; flex-direction:column; align-items:center; flex:1; position:relative; gap:2px; }
        .summary-stat-item:not(:last-child)::after { content:''; position:absolute; right:0; top:15%; height:70%; width:1px; background:rgba(255,255,255,0.12); }
        .summary-stat-item .stat-label-wrap { display:flex; align-items:center; gap:4px; }
        .summary-stat-item .stat-label { font-size:10px; opacity:0.5; font-weight:500; text-transform:uppercase; letter-spacing:0.5px; white-space:nowrap; }
        .summary-stat-item .stat-number { font-size:17px; font-weight:600; line-height:1.3; }
        .summary-stat-item .stat-number.privacy { letter-spacing:3px; color:var(--color-text-light) !important; }
        .stat-number.positive { color:var(--color-positive); }
        .stat-number.negative { color:var(--color-negative); }
        .stat-number.neutral { color:var(--color-text-light); }
        .data-timestamp { font-size:10px; opacity:0.5; text-align:center; margin-top:6px; letter-spacing:0.3px; }
        .fund-list { display:flex; flex-direction:column; gap:10px; flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
        .fund-list::-webkit-scrollbar { width:3px; }
        .fund-list::-webkit-scrollbar-track { background:transparent; }
        .fund-list::-webkit-scrollbar-thumb { background:#d5dde8; border-radius:10px; }
        .fund-card { background:var(--color-card-bg); border-radius:var(--radius-md); padding:10px 14px 12px 14px; border:1px solid var(--color-border); box-shadow:var(--shadow-card); display:flex; flex-direction:column; gap:8px; flex-shrink:0; transition:box-shadow 0.2s,border-color 0.3s; position:relative; overflow:hidden; }
        .fund-card:active { box-shadow:0 2px 8px rgba(0,0,0,0.04); background:#fafcff; }
        .fund-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; border-radius:0; transition:background 0.4s ease,opacity 0.3s; }
        .fund-card.decor-actual::before { background:var(--decor-actual); }
        .fund-card.decor-estimate::before { background:var(--decor-estimate); }
        .fund-card.decor-final-estimate::before { background:var(--decor-final-estimate); }
        .fund-card.decor-empty::before { background:var(--decor-empty); border-left:2px dashed #ccc; opacity:0.4; }
        .fund-card.flash-update { animation:flashCard 0.6s ease; }
        @keyframes flashCard { 0% { background:#f0f7ff; } 50% { background:#e0edf9; } 100% { background:var(--color-card-bg); } }
        .fund-row-top { display:flex; justify-content:space-between; align-items:center; height:30px; padding-left:10px; }
        .fund-name-wrap { display:flex; align-items:center; flex:0 1 auto; min-width:0; margin-right:8px; }
        .fund-name { font-size:14px; font-weight:600; color:var(--color-text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:160px; }
        .fund-code-standalone { font-weight:400; font-size:10px; color:var(--color-text-secondary); background:#f0f4fc; padding:0 8px; border-radius:var(--radius-md); line-height:18px; flex-shrink:0; margin-right:auto; }
        .fund-right-actions { display:flex; align-items:center; gap:6px; flex-shrink:0; }
        .fund-market-value { font-size:14px; font-weight:600; color:var(--color-text); white-space:nowrap; display:flex; align-items:center; gap:3px; }
        .fund-market-value .coin-icon { font-size:12px; color:var(--color-text-secondary); opacity:0.7; }
        .fund-row-metrics { display:flex; align-items:stretch; padding-left:10px; height:40px; position:relative; }
        .edit-mode .fund-row-metrics { display:none; }
        .metric-item { flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:2px 0; position:relative; min-width:0; }
        .metric-item:not(:last-child)::after { content:''; position:absolute; right:0; top:10%; height:80%; width:1px; background:#e0e5ed; }
        .metric-item .metric-label { font-size:9px; font-weight:500; color:var(--color-text-light); letter-spacing:0.2px; text-transform:uppercase; line-height:1.2; }
        .metric-item .metric-value { font-size:13px; font-weight:600; line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .metric-item .metric-value.positive { color:var(--color-positive); }
        .metric-item .metric-value.negative { color:var(--color-negative); }
        .metric-item .metric-value.neutral { color:var(--color-text-light); }
        .delay-warning { font-size:10px; color:#b8860b; background:#fff8e7; border-radius:20px; padding:2px 10px; display:inline-block; margin-top:2px; }
        .fund-edit-area { display:none; padding:8px 0 2px 10px; border-top:1px dashed var(--color-border); flex-direction:column; gap:6px; }
        .fund-edit-area.active { display:flex; }
        .edit-row { display:flex; gap:8px; align-items:center; width:100%; flex-wrap:nowrap; }
        .edit-row .edit-input { flex:1; min-width:0; height:38px; padding:6px 10px; font-size:13px; font-family:inherit; border-radius:var(--radius-sm); border:1px solid var(--color-edit-border); background:var(--color-edit-bg); color:var(--color-text); outline:none; transition:border 0.2s ease; -webkit-appearance:none; }
        .edit-row .edit-input:focus { border-color:var(--color-primary); box-shadow:0 0 0 2px rgba(11,26,51,0.08); }
        .edit-row .edit-input::placeholder { color:var(--color-text-light); opacity:0.6; }
        .edit-row .edit-delete-btn { flex:0 0 auto; height:38px; padding:0 14px; font-size:12px; font-weight:600; font-family:inherit; border:none; border-radius:var(--radius-sm); background:var(--color-positive); color:#fff; cursor:pointer; transition:opacity 0.2s ease; white-space:nowrap; }
        .edit-row .edit-delete-btn:active { opacity:0.6; transform:scale(0.96); }
        .edit-hint { font-size:11px; color:var(--color-text-light); display:flex; justify-content:space-between; align-items:center; padding:0 2px; }
        .edit-hint .current-cost { font-weight:500; color:var(--color-text-secondary); }
        .empty-state { text-align:center; padding:40px 20px; color:var(--color-text-secondary); }
        .empty-state i { font-size:36px; color:#d5dde8; margin-bottom:6px; }
        .empty-state p { font-size:14px; font-weight:500; }
        .empty-state .sub { font-size:12px; opacity:0.6; margin-top:2px; }
        .bottom-action-card { background:linear-gradient(145deg,var(--color-primary),var(--color-primary-light)); border-radius:var(--radius-md); padding:10px 6px; border:1px solid rgba(255,255,255,0.15); box-shadow:0 8px 32px rgba(0,0,0,0.12); display:flex; align-items:stretch; position:relative; overflow:hidden; flex-shrink:0; margin-top:2px; transition:all 0.3s ease; justify-content:center; min-height:72px; }
        .bottom-action-card::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.08) 0%, transparent 60%); pointer-events:none; }
        .action-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; padding:6px 4px; cursor:pointer; transition:background 0.2s ease; border:none; background:transparent; color:#ffffff; position:relative; border-radius:var(--radius-md); min-height:52px; -webkit-tap-highlight-color:transparent; touch-action:manipulation; user-select:none; }
        .action-btn:not(:last-child)::after { content:''; position:absolute; right:0; top:15%; height:70%; width:1px; background:rgba(255,255,255,0.12); }
        .action-btn:active { background:rgba(255,255,255,0.06); transform:scale(0.96); }
        .action-btn .icon-wrap { width:28px; height:28px; border-radius:var(--radius-full); background:rgba(255,255,255,0.12); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; font-size:14px; color:#ffffff; flex-shrink:0; border:1px solid rgba(255,255,255,0.08); transition:background 0.2s; will-change:transform; pointer-events:none; }
        @keyframes iconPop { 0% { transform:scale(1); } 35% { transform:scale(1.3); } 60% { transform:scale(0.92); } 100% { transform:scale(1); } }
        .action-btn .icon-wrap.pop { animation:iconPop 0.4s cubic-bezier(0.34,1.56,0.64,1); }
        .action-btn .label { font-size:10px; font-weight:500; color:rgba(255,255,255,0.75); letter-spacing:0.2px; white-space:nowrap; pointer-events:none; }
        .bottom-action-card.edit-mode .action-btn { display:none !important; }
        .bottom-action-card.edit-mode .action-btn.edit-highlight { display:flex !important; flex:0 0 auto; padding:8px 28px; background:transparent !important; border-radius:var(--radius-md); }
        .bottom-action-card.edit-mode .action-btn.edit-highlight .icon-wrap { background:rgba(255,255,255,0.12); border-color:rgba(255,255,255,0.08); }
        .bottom-action-card.edit-mode .action-btn.edit-highlight .label { color:rgba(255,255,255,0.75); }
        .bottom-action-card.edit-mode .action-btn::after { display:none !important; }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.25); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); justify-content:center; align-items:center; z-index:999; padding:0; }
        .modal-overlay.active { display:flex; }
        .add-modal .add-content, .backup-modal .backup-content { display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:32px 24px; width:100%; height:100%; max-width:100%; max-height:100%; background:rgba(255,255,255,0.06); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); border-radius:0; border:none; box-shadow:none; position:relative; }
        .add-modal .add-content h2, .backup-modal .backup-content h2 { font-size:22px; font-weight:700; color:#0b1a33; display:flex; align-items:center; gap:8px; margin-bottom:0px; }
        .add-modal .add-content h2 i, .backup-modal .backup-content h2 i { color:#0b1a33; }
        .sub-placeholder { height:24px; flex-shrink:0; }
        .add-modal .add-content .input-group { width:100%; display:flex; flex-direction:column; gap:12px; margin-bottom:16px; }
        .add-modal .add-content .input-group input { width:100%; padding:12px 16px; border-radius:var(--radius-md); border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.12); backdrop-filter:blur(4px); font-size:15px; color:#ffffff; outline:none; transition:0.15s; -webkit-appearance:none; }
        .add-modal .add-content .input-group input::placeholder { color:rgba(255,255,255,0.4); font-weight:400; font-size:14px; }
        .add-modal .add-content .input-group input:focus { border-color:rgba(255,255,255,0.5); background:rgba(255,255,255,0.2); }
        .add-modal .add-content .auto-fill-info { width:100%; background:rgba(255,255,255,0.1); border-radius:var(--radius-md); padding:8px 14px; font-size:13px; color:rgba(255,255,255,0.85); border:1px solid rgba(255,255,255,0.1); display:none; margin-top:-6px; margin-bottom:2px; text-align:center; }
        .add-modal .add-content .auto-fill-info.show { display:block; }
        .add-modal .add-content .modal-actions { display:flex; gap:12px; width:100%; justify-content:center; margin-top:12px; }
        .add-modal .add-content .modal-actions button { flex:1; padding:12px 16px; border-radius:var(--radius-md); font-size:15px; font-weight:600; border:1px solid rgba(255,255,255,0.1); cursor:pointer; transition:0.15s; background:rgba(255,255,255,0.15); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); color:#ffffff; }
        .add-modal .add-content .modal-actions button:active { background:rgba(255,255,255,0.25); transform:scale(0.96); }
        .add-modal .add-content .modal-actions .btn-cancel { background:rgba(255,255,255,0.15); color:#ffffff; border:1px solid rgba(255,255,255,0.1); }
        .add-modal .add-content .modal-actions .btn-confirm:disabled { opacity:0.4; cursor:not-allowed; }
        .backup-modal .backup-actions { display:flex; flex-direction:column; gap:10px; width:100%; }
        .backup-modal .backup-actions button, .backup-modal .backup-actions .file-input-wrap { width:100%; border-radius:var(--radius-md); border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.15); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; gap:6px; text-align:center; line-height:1.3; transition:0.15s; cursor:pointer; padding:14px 16px; font-size:16px; font-weight:600; color:#ffffff; }
        .backup-modal .backup-actions .file-input-wrap { padding:0; position:relative; overflow:hidden; }
        .backup-modal .backup-actions .file-input-wrap button { width:100%; height:100%; padding:14px 16px; font-size:16px; font-weight:600; color:#ffffff; background:transparent; border:none; backdrop-filter:none; display:flex; align-items:center; justify-content:center; gap:6px; cursor:pointer; }
        .backup-modal .backup-actions .file-input-wrap input[type="file"] { position:absolute; left:0; top:0; opacity:0; width:100%; height:100%; cursor:pointer; }
        .backup-modal .backup-actions button:active, .backup-modal .backup-actions .file-input-wrap:active { background:rgba(255,255,255,0.25); transform:scale(0.96); }
        .modal-close-btn { position:absolute; bottom:48px; left:50%; transform:translateX(-50%); width:48px; height:48px; border-radius:var(--radius-full); background:rgba(255,255,255,0.15); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:0.2s; color:rgba(255,255,255,0.7); font-size:18px; z-index:10; }
        .modal-close-btn:active { transform:translateX(-50%) scale(0.88); background:rgba(255,255,255,0.25); }
        .modal-close-btn svg { width:24px; height:24px; stroke:rgba(255,255,255,0.7); stroke-width:2; fill:none; }
        .prompt-modal .prompt-content { display:flex; flex-direction:column; align-items:center; text-align:center; padding:24px; width:100%; max-width:340px; background:rgba(255,255,255,0.08); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-radius:var(--radius-md); border:none; }
        .prompt-modal .prompt-content h2 { font-size:18px; font-weight:700; color:#ffffff; margin-bottom:6px; }
        .prompt-modal .prompt-content .prompt-message { font-size:15px; color:rgba(255,255,255,0.85); line-height:1.5; margin-bottom:18px; }
        .prompt-modal .prompt-content .modal-actions { display:flex; gap:10px; width:100%; justify-content:center; }
        .prompt-modal .prompt-content .modal-actions button { flex:1; padding:12px; border-radius:var(--radius-md); font-size:15px; font-weight:600; border:none; cursor:pointer; transition:0.15s; max-width:140px; }
        .prompt-modal .prompt-content .modal-actions .btn-cancel { background:rgba(255,255,255,0.15); color:#ffffff; border:1px solid rgba(255,255,255,0.1); }
        .prompt-modal .prompt-content .modal-actions .btn-cancel:active { background:rgba(255,255,255,0.25); }
        .prompt-modal .prompt-content .modal-actions .btn-confirm { background:#ffffff; color:#0b1a33; }
        .prompt-modal .prompt-content .modal-actions .btn-confirm:active { background:#e8edf5; }
        .prompt-modal .prompt-content .modal-actions .btn-danger { background:var(--color-positive); color:#ffffff; }
        .prompt-modal .prompt-content .modal-actions .btn-danger:active { background:#c92a3a; }
        .refresh-loading { pointer-events:none; opacity:0.6; }
        .refresh-loading i { animation:spin 1s infinite linear; }
        @keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
        .updating-tip { text-align:center; font-size:12px; color:var(--color-text-secondary); padding:4px 0 8px 0; display:none; }
        .updating-tip.show { display:block; }
        .updating-tip i { margin-right:4px; }
        .check-pop { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%) scale(0); width:80px; height:80px; background:linear-gradient(145deg,#0b1a33,#132b4a); border-radius:50%; display:flex; align-items:center; justify-content:center; transition:transform 0.35s ease-out; z-index:200; pointer-events:none; box-shadow:0 6px 24px rgba(11,26,51,0.3); }
        .check-pop.show { transform:translate(-50%, -50%) scale(1); }
        .check-pop svg { width:44px; height:44px; stroke:white; stroke-width:3; fill:none; }
        @media (max-width:420px) {
            .app-container { padding:10px 12px 16px; }
            .summary-card { padding:12px 14px 10px 14px; }
            .summary-today .today-value { font-size:26px; }
            .summary-today .today-label { font-size:12px; }
            .summary-stat-item .stat-number { font-size:15px; }
            .summary-stat-item .stat-label { font-size:9px; }
            .fund-card { padding:8px 10px 10px 10px; gap:6px; }
            .fund-row-top { height:26px; padding-left:6px; }
            .fund-name { font-size:13px; max-width:130px; }
            .fund-code-standalone { font-size:9px; line-height:16px; padding:0 6px; }
            .fund-market-value { font-size:12px; }
            .fund-market-value .coin-icon { font-size:11px; }
            .fund-row-metrics { padding-left:6px; height:36px; }
            .metric-item .metric-label { font-size:8px; }
            .metric-item .metric-value { font-size:11px; }
            .fund-edit-area { padding:6px 0 2px 6px; }
            .edit-row .edit-input { height:34px; font-size:12px; padding:4px 8px; border-radius:var(--radius-sm); }
            .edit-row .edit-delete-btn { height:34px; padding:0 10px; font-size:11px; border-radius:var(--radius-sm); }
            .edit-hint { font-size:10px; }
            .bottom-action-card { padding:8px 4px; min-height:62px; }
            .action-btn { min-height:46px; padding:4px 2px; gap:1px; }
            .action-btn .icon-wrap { width:24px; height:24px; font-size:12px; }
            .action-btn .label { font-size:9px; }
            .bottom-action-card.edit-mode .action-btn.edit-highlight { padding:6px 20px; }
            .add-modal .add-content, .backup-modal .backup-content { padding:24px 16px; }
            .add-modal .add-content .input-group input { font-size:14px; padding:10px 14px; }
            .add-modal .add-content .input-group input::placeholder { font-size:13px; }
            .add-modal .add-content .modal-actions button { font-size:14px; padding:10px 14px; }
            .backup-modal .backup-actions button, .backup-modal .backup-actions .file-input-wrap button { font-size:14px; padding:12px 14px; }
            .modal-close-btn { width:40px; height:40px; bottom:40px; font-size:16px; }
            .modal-close-btn svg { width:20px; height:20px; }
            .data-timestamp { font-size:9px; }
        }
        @media (max-width:360px) {
            .metric-item .metric-value { font-size:10px; }
            .fund-market-value { font-size:11px; }
            .fund-name { font-size:12px; max-width:110px; }
            .fund-code-standalone { font-size:8px; padding:0 4px; }
            .edit-row .edit-input { font-size:11px; padding:4px 6px; border-radius:var(--radius-sm); }
            .edit-row .edit-delete-btn { font-size:10px; padding:0 8px; border-radius:var(--radius-sm); }
            .action-btn .label { font-size:8px; }
            .action-btn .icon-wrap { width:20px; height:20px; font-size:11px; }
            .bottom-action-card { min-height:54px; padding:6px 3px; }
            .action-btn { min-height:40px; }
            .bottom-action-card.edit-mode .action-btn.edit-highlight { padding:6px 14px; }
        }
    </style>
</head>
<body>
    <div class="app-container" id="app">
        <section class="summary-card" id="summaryCard">
            <div class="summary-today">
                <span class="today-label" id="todayLabel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></svg> 今日盈亏</span>
                <span class="today-value" id="todayProfitBig">+0.00</span>
            </div>
            <hr class="summary-divider" />
            <div class="summary-stats">
                <div class="summary-stat-item"><div class="stat-label-wrap"><span class="stat-label">总资产</span></div><div class="stat-number neutral" id="totalAssets">0.00</div></div>
                <div class="summary-stat-item"><div class="stat-label-wrap"><span class="stat-label">持有收益</span></div><div class="stat-number neutral" id="totalProfit">+0.00</div></div>

        <div class="bottom-action-card" id="bottomActions">

            <div class="action-btn" id="batchEditBtn"><div class="icon-wrap"><i class="fas fa-pen"></i></div><span class="label">批量编辑</span></div>

    <!-- 添加基金 -->

                <div class="auto-fill-info" id="autoFillInfo"><i class="fas fa-check-circle"></i> <span id="autoFillText">已识别：易方达蓝筹精选</span></div>

            <button class="modal-close-btn" id="closeModalBtnCircle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg></button>

    <!-- 数据管理 -->
    <div class="modal-overlay backup-modal" id="backupModalOverlay">
        <div class="backup-content">
            <h2><i class="fas fa-database"></i> 数据管理</h2>
            <div class="sub-placeholder"></div>
            <div class="backup-actions">
                <button id="exportBtn"><i class="fas fa-download"></i> 导出配置</button>
                <div class="file-input-wrap"><button class="primary"><i class="fas fa-upload"></i> 导入配置</button><input type="file" id="importFileInput" accept=".json" /></div>
                <button id="clearCacheBtn"><i class="fas fa-trash-alt"></i> 清除缓存</button>
                <button id="hardResetBtn" style="background:rgba(255,50,50,0.3);border:1px solid rgba(255,50,50,0.2);"><i class="fas fa-power-off"></i> 硬重置</button>
            </div>
            <button class="modal-close-btn" id="closeBackupModalBtnCircle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg></button>
        </div>
    </div>
    <!-- 通用提示 -->
    <div class="modal-overlay prompt-modal" id="promptModalOverlay">
        <div class="prompt-content"><h2 id="promptTitle">提示</h2><div class="prompt-message" id="promptMessage">消息内容</div><div class="modal-actions" id="promptActions"></div></div>
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <div class="check-pop" id="checkPop"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
    <script>
        // ================================================================
        //  持仓跟踪 · 真完整版（完全使用完整版请求逻辑）
        // ================================================================

        // ---------- 数据存储 ----------
        var STORAGE_W = 'fund_watchlist_v2';
        var STORAGE_H = 'fund_holdings';
        var STORAGE_C = 'fund_data_cache';
        var STORAGE_A = 'account_profit_history';
        var STORAGE_T = 'custom_tags';
        var STORAGE_SORT = 'fundholder_sort_mode';
        var STORAGE_HSORT = 'fundholder_hold_sort_mode';

        var watchlist = [];
        var holdings = {};
        var fundDataCache = {};
        var accountProfitHistory = [];
        var customTags = {};
        var sortMode = 'default';
        var holdSortMode = 'market-desc';
        var editMode = false;
        var privacyMode = false;
        var isUpdating = false;

        // ---------- 交易日历 ----------
        var HOLIDAYS = new Set([
            '2026-01-01','2026-01-02','2026-01-03',
            '2026-02-15','2026-02-16','2026-02-17','2026-02-18','2026-02-19',
            '2026-02-20','2026-02-21','2026-02-22','2026-02-23',
            '2026-04-04','2026-04-05','2026-04-06',
            '2026-05-01','2026-05-02','2026-05-03','2026-05-04','2026-05-05',
            '2026-06-19','2026-06-20','2026-06-21',
            '2026-09-25','2026-09-26','2026-09-27',
            '2026-10-01','2026-10-02','2026-10-03','2026-10-04',
            '2026-10-05','2026-10-06','2026-10-07'
        ]);

        function isTradingDay(d) { d = d || new Date(); var ds = d.toISOString().slice(0,10); if (d.getDay()===0 || d.getDay()===6) return false; return !HOLIDAYS.has(ds); }

        function getMarketPhase() {
            var now = new Date();
            if (!isTradingDay(now)) return 'CLOSED';
            var h = now.getHours(), m = now.getMinutes();
            var totalMin = h*60+m;
            if (totalMin>=555 && totalMin<570) return 'AUCTION';
            if (totalMin>=570 && totalMin<690) return 'OPENING';
            if (totalMin>=690 && totalMin<780) return 'LUNCH';
            if (totalMin>=780 && totalMin<900) return 'OPENING';
            return 'SETTLEMENT';
        }

        function isVoidPeriod() {
            var now = new Date();
            if (!isTradingDay(now)) return false;
            var totalMin = now.getHours()*60 + now.getMinutes();
            return totalMin>=540 && totalMin<555;
        }

        function getLatestTradeDate() {
            var d = new Date();
            while (!isTradingDay(d)) d.setDate(d.getDate()-1);
            return d.toISOString().slice(0,10);
        }

        // ---------- 加载/保存 ----------
        function loadData() {
            try { watchlist = JSON.parse(localStorage.getItem(STORAGE_W)) || []; } catch(e){ watchlist=[]; }
            try { holdings = JSON.parse(localStorage.getItem(STORAGE_H)) || {}; } catch(e){ holdings={}; }
            try { fundDataCache = JSON.parse(localStorage.getItem(STORAGE_C)) || {}; } catch(e){ fundDataCache={}; }
            try { accountProfitHistory = JSON.parse(localStorage.getItem(STORAGE_A)) || []; } catch(e){ accountProfitHistory=[]; }
            try { customTags = JSON.parse(localStorage.getItem(STORAGE_T)) || {}; } catch(e){ customTags={}; }
            try { sortMode = localStorage.getItem(STORAGE_SORT) || 'default'; } catch(e){ sortMode='default'; }
            try { holdSortMode = localStorage.getItem(STORAGE_HSORT) || 'market-desc'; } catch(e){ holdSortMode='market-desc'; }
        }

        function saveAll() {
            localStorage.setItem(STORAGE_W, JSON.stringify(watchlist));
            localStorage.setItem(STORAGE_H, JSON.stringify(holdings));
            localStorage.setItem(STORAGE_C, JSON.stringify(fundDataCache));
            localStorage.setItem(STORAGE_A, JSON.stringify(accountProfitHistory));
            localStorage.setItem(STORAGE_T, JSON.stringify(customTags));
            localStorage.setItem(STORAGE_SORT, sortMode);
            localStorage.setItem(STORAGE_HSORT, holdSortMode);
        }
        loadData();

        // ---------- 完整版请求函数（使用 jsonpgz） ----------
        var jsonpCounter = 0;
        var jsonpRequests = {};

        function fetchSingle(code, retries) {
            if (retries === undefined) retries = 2;
            return new Promise(function(resolve, reject) {
                var reqId = 'r-' + code + '-' + (jsonpCounter++) + '-' + Date.now();
                if (jsonpRequests[reqId]) { jsonpRequests[reqId].cleanup(); delete jsonpRequests[reqId]; }
                var attempt = function(rem) {
                    var sid = 'jp-' + reqId;
                    var s = document.getElementById(sid);
                    if (s) s.remove();
                    var s2 = document.createElement('script');
                    s2.id = sid;
                    s2.src = 'https://fundgz.1234567.com.cn/js/' + code + '.js?rt=' + Date.now();
                    var tid = setTimeout(function() {
                        cleanup();
                        if (rem > 0) attempt(rem - 1);
                        else reject(new Error('超时'));
                    }, 8000);
                    // 使用全局 jsonpgz 回调
                    window._jsonpCB = window._jsonpCB || {};
                    window._jsonpCB[reqId] = function(data) { cleanup(); resolve(data); };
                    function cleanup() {
                        clearTimeout(tid);
                        if (s2.parentNode) s2.remove();
                        delete window._jsonpCB[reqId];
                        delete jsonpRequests[reqId];
                    }
                    s2.onerror = function() {
                        cleanup();
                        if (rem > 0) attempt(rem - 1);
                        else reject(new Error('网络错误'));
                    };
                    jsonpRequests[reqId] = { cleanup: cleanup };
                    document.head.appendChild(s2);
                };
                attempt(retries);
            });
        }

        // 全局 jsonpgz 回调（由天天基金接口调用）
        window.jsonpgz = function(d) {
            if (d && d.fundcode && window._jsonpCB) {
                for (var k in window._jsonpCB) {
                    if (k.indexOf(d.fundcode) !== -1) {
                        window._jsonpCB[k](d);
                        break;
                    }
                }
            }
        };

        function fetchTencentNav(code) {
            return new Promise(function(resolve) {
                var script = document.createElement('script');
                var timer = setTimeout(function(){ cleanup(); resolve(null); }, 6000);
                var varName = 'v_jj' + code;
                function cleanup() { clearTimeout(timer); if (script.parentNode) script.remove(); }
                script.src = 'https://qt.gtimg.cn/q=jj' + code;
                script.onload = function() {
                    cleanup();
                    var raw = window[varName];
                    if (raw && typeof raw === 'string') {
                        var parts = raw.split('~');
                        var nav = parseFloat(parts[5]) || 0;
                        var rate = parseFloat(parts[7]) || 0;
                        var date = parts[8] || '';
                        var name = parts[1] || '';
                        if (nav > 0 && date) resolve({ nav: nav, rate: rate, date: date, name: name });
                        else resolve(null);
                    } else resolve(null);
                };
                script.onerror = function(){ cleanup(); resolve(null); };
                document.head.appendChild(script);
            });
        }

        function getValidName(name, code) { if (name && typeof name === 'string' && name.trim().length >= 2) return name.trim(); return code; }

        // ---------- 核心获取数据（完整版逻辑） ----------
        async function fetchFundDataOnly(code) {
            var today = new Date().toISOString().slice(0,10);
            var d = fundDataCache[code] || {};
            var phase = getMarketPhase();

            // 盘中
            if (phase === 'AUCTION' || phase === 'OPENING' || phase === 'LUNCH') {
                try {
                    var ttData = await fetchSingle(code);
                    if (ttData && ttData.gsz !== undefined && ttData.gsz !== null) {
                        var name = getValidName(ttData.name, code);
                        fundDataCache[code] = {
                            name: name,
                            gsz: parseFloat(ttData.gsz) || 0,
                            gszzl: parseFloat(ttData.gszzl) || 0,
                            actualNav: d.actualNav || '',
                            actualRate: d.actualRate || '',
                            actualDate: d.actualDate || '',
                            updateDate: today,
                            isFinalEstimate: false
                        };
                        saveAll();
                        return {
                            name: name,
                            gsz: parseFloat(ttData.gsz),
                            gszzl: parseFloat(ttData.gszzl),
                            nav: parseFloat(ttData.dwjz) || 0,
                            changePercent: parseFloat(ttData.gszzl) || 0,
                            navDate: ttData.jzrq || '',
                            source: 'estimate',
                            isFinal: false
                        };
                    }
                } catch(e) { console.warn('fetchSingle失败:', code, e); }
                // 兜底：今天的缓存
                if (d.updateDate === today && parseFloat(d.gsz) > 0) {
                    return {
                        name: getValidName(d.name, code),
                        gsz: parseFloat(d.gsz),
                        gszzl: parseFloat(d.gszzl) || 0,
                        nav: parseFloat(d.actualNav) || 0,
                        changePercent: parseFloat(d.gszzl) || 0,
                        navDate: d.actualDate || '',
                        source: 'cached_estimate',
                        isFinal: false
                    };
                }
                return null;
            }

            // 盘后
            if (phase === 'SETTLEMENT' || phase === 'CLOSED') {
                // 腾讯净值
                var txData = await fetchTencentNav(code);
                if (txData && txData.nav > 0 && txData.date === today) {
                    var name2 = getValidName(txData.name, code);
                    fundDataCache[code] = {
                        name: name2,
                        gsz: txData.nav,
                        gszzl: txData.rate,
                        actualNav: String(txData.nav),
                        actualRate: txData.rate,
                        actualDate: txData.date,
                        updateDate: today,
                        isFinalEstimate: false
                    };
                    saveAll();
                    return {
                        name: name2,
                        nav: txData.nav,
                        changePercent: txData.rate,
                        navDate: txData.date,
                        gsz: txData.nav,
                        gszzl: txData.rate,
                        source: 'actual',
                        isFinal: true
                    };
                }
                // 天天估值兜底
                try {
                    var ttFinal = await fetchSingle(code);
                    if (ttFinal && ttFinal.gsz !== undefined && ttFinal.gsz !== null) {
                        var name3 = getValidName(ttFinal.name, code);
                        fundDataCache[code] = {
                            name: name3,
                            gsz: parseFloat(ttFinal.gsz) || 0,
                            gszzl: parseFloat(ttFinal.gszzl) || 0,
                            actualNav: d.actualNav || '',
                            actualRate: d.actualRate || '',
                            actualDate: d.actualDate || '',
                            updateDate: today,
                            isFinalEstimate: true
                        };
                        saveAll();
                        return {
                            name: name3,
                            gsz: parseFloat(ttFinal.gsz),
                            gszzl: parseFloat(ttFinal.gszzl),
                            nav: parseFloat(ttFinal.dwjz) || 0,
                            changePercent: parseFloat(ttFinal.gszzl) || 0,
                            navDate: ttFinal.jzrq || '',
                            source: 'final_estimate',
                            isFinal: false,
                            isFinalEstimate: true
                        };
                    }
                } catch(e) { console.warn('盘后fetchSingle失败:', code, e); }
                // 今天缓存估值
                if (d.updateDate === today && d.isFinalEstimate && parseFloat(d.gsz) > 0) {
                    return {
                        name: getValidName(d.name, code),
                        gsz: parseFloat(d.gsz),
                        gszzl: parseFloat(d.gszzl) || 0,
                        nav: parseFloat(d.actualNav) || 0,
                        changePercent: parseFloat(d.gszzl) || 0,
                        navDate: d.actualDate || '',
                        source: 'final_estimate',
                        isFinal: false,
                        isFinalEstimate: true
                    };
                }
                // 昨日净值（非交易日）
                var todayIsTrading = isTradingDay(new Date());
                if (!todayIsTrading) {
                    var latestTrade = getLatestTradeDate();
                    if (d.updateDate === latestTrade && parseFloat(d.actualNav) > 0) {
                        return {
                            name: getValidName(d.name, code),
                            nav: parseFloat(d.actualNav),
                            changePercent: parseFloat(d.actualRate) || 0,
                            navDate: d.actualDate || '',
                            gsz: parseFloat(d.gsz) || 0,
                            gszzl: parseFloat(d.gszzl) || 0,
                            source: 'cached_actual',
                            isFinal: true
                        };
                    }
                }
                return null;
            }
            return null;
        }

        // ---------- 更新基金 ----------
        async function updateFund(code) {
            var data = await fetchFundDataOnly(code);
            if (!data) { return fundDataCache[code] || null; }
            var d = fundDataCache[code] || {};
            var today = new Date().toISOString().slice(0,10);
            if (data.source === 'actual' || data.source === 'cached_actual') {
                d.actualNav = String(data.nav);
                d.actualRate = data.changePercent;
                d.actualDate = data.navDate || today;
                d.gsz = data.gsz || data.nav;
                d.gszzl = data.changePercent;
                d.source = 'actual';
            } else {
                d.gsz = data.gsz || data.nav;
                d.gszzl = data.changePercent;
                d.source = 'estimate';
                if (data.isFinalEstimate) d.isFinalEstimate = true;
            }
            d.name = data.name || d.name || code;
            d.updateDate = today;
            fundDataCache[code] = d;
            saveAll();
            return d;
        }

        async function batchUpdate(codes) {
            if (!codes.length) return;
            await Promise.allSettled(codes.map(function(code){ return updateFund(code); }));
            renderAll();
        }

        // ---------- 显示逻辑 ----------
        function getDisplayData(code) {
            var d = fundDataCache[code] || {};
            var h = holdings[code] || {};
            var cost = parseFloat(h.cost) || 0;
            var phase = getMarketPhase();
            var today = new Date().toISOString().slice(0,10);

            if (isVoidPeriod()) return { nav: null, rate: 0, source: 'empty', display: '--' };

            if (phase === 'AUCTION' || phase === 'OPENING' || phase === 'LUNCH') {
                if (d.updateDate === today && parseFloat(d.gsz) > 0) {
                    return { nav: parseFloat(d.gsz), rate: parseFloat(d.gszzl) || 0, source: 'estimate' };
                }
                return { nav: 0, rate: 0, source: 'zero', display: '0.00' };
            }

            if (phase === 'SETTLEMENT' || phase === 'CLOSED') {
                if (d.actualDate === today && parseFloat(d.actualNav) > 0) {
                    return { nav: parseFloat(d.actualNav), rate: parseFloat(d.actualRate) || 0, source: 'actual' };
                }
                if (d.updateDate === today && d.isFinalEstimate && parseFloat(d.gsz) > 0) {
                    return { nav: parseFloat(d.gsz), rate: parseFloat(d.gszzl) || 0, source: 'final_estimate' };
                }
                if (d.updateDate === today && parseFloat(d.gsz) > 0) {
                    return { nav: parseFloat(d.gsz), rate: parseFloat(d.gszzl) || 0, source: 'estimate' };
                }
                var todayIsTrading = isTradingDay(new Date());
                if (!todayIsTrading) {
                    var latestTrade = getLatestTradeDate();
                    if (d.updateDate === latestTrade && parseFloat(d.actualNav) > 0) {
                        return { nav: parseFloat(d.actualNav), rate: parseFloat(d.actualRate) || 0, source: 'cached_actual' };
                    }
                }
                return { nav: 0, rate: 0, source: 'zero', display: '0.00' };
            }
            return { nav: 0, rate: 0, source: 'zero', display: '0.00' };
        }

        // ---------- 计算摘要 ----------
        function computeSummary() {
            var codes = Object.keys(holdings);
            if (!codes.length) return { totalAsset: 0, todayProfit: 0, totalProfit: 0, totalYield: 0, allActual: false };
            var totalCost = 0, totalMV = 0, todayProfit = 0, allActual = true;
            codes.forEach(function(code){
                var h = holdings[code];
                var cost = parseFloat(h.cost) || 0;
                var shares = parseFloat(h.shares) || 0;
                totalCost += cost * shares;
                var display = getDisplayData(code);
                var nav = display.nav || cost;
                var rate = display.rate || 0;
                var prev = rate !== 0 ? nav / (1 + rate/100) : nav;
                totalMV += nav * shares;
                todayProfit += (nav - prev) * shares;
                if (display.source !== 'actual') allActual = false;
            });
            var totalProfit = totalMV - totalCost;
            var totalYield = totalCost > 0 ? (totalProfit/totalCost*100) : 0;
            return { totalAsset: totalMV, todayProfit: todayProfit, totalProfit: totalProfit, totalYield: totalYield, allActual: allActual };
        }

        // ---------- 渲染 ----------
        function renderSummary() {
            if (privacyMode) return;
            var codes = Object.keys(holdings);
            var s = computeSummary();
            var todayEl = document.getElementById('todayProfitBig');
            var labelEl = document.getElementById('todayLabel');
            var tsEl = document.getElementById('dataTimestamp');

            if (!codes.length) {
                todayEl.textContent = '+0.00'; todayEl.className = 'today-value neutral';
                labelEl.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></svg> 今日盈亏';
                document.getElementById('totalAssets').textContent = '0.00'; document.getElementById('totalAssets').className = 'stat-number neutral';
                document.getElementById('totalProfit').textContent = '+0.00'; document.getElementById('totalProfit').className = 'stat-number neutral';
                document.getElementById('totalReturn').textContent = '0.00%'; document.getElementById('totalReturn').className = 'stat-number neutral';
                tsEl.textContent = '数据时间：--';
                return;
            }

            var val = s.todayProfit;
            todayEl.textContent = (val >= 0 ? '+' : '') + val.toFixed(2);
            todayEl.className = 'today-value ' + (val > 0 ? 'positive' : val < 0 ? 'negative' : 'neutral');
            var labelText = s.allActual ? '今日实际盈亏' : '今日预估盈亏';
            labelEl.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></svg> ' + labelText;

            var latest = '--';
            codes.forEach(function(c){ var d=fundDataCache[c]||{}; if (d.updateDate && d.updateDate > latest) latest = d.updateDate; });
            if (latest !== '--') {
                var now = new Date();
                var todayStr = now.toISOString().slice(0,10);
                if (latest === todayStr) { var hh = now.getHours(), mm = now.getMinutes(); tsEl.textContent = '数据时间：今天 ' + String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0'); }
                else { tsEl.textContent = '数据时间：' + latest; }
            } else { tsEl.textContent = '数据时间：--'; }

            function setStat(id,val,isPct) { var el = document.getElementById(id); if (isPct && val === 0) { el.textContent = '0.00%'; el.className='stat-number neutral'; return; } var prefix = !isPct && val >= 0 ? '+' : ''; el.textContent = prefix + val.toFixed(2) + (isPct ? '%' : ''); var cls = val > 0 ? 'positive' : val < 0 ? 'negative' : 'neutral'; el.className = 'stat-number ' + cls; }
            setStat('totalAssets', s.totalAsset, false);
            setStat('totalProfit', s.totalProfit, false);
            setStat('totalReturn', s.totalYield, true);
        }

        function renderFundList() {
            var container = document.getElementById('fundList');
            var codes = Object.keys(holdings);
            if (!codes.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>还没有持仓基金</p><div class="sub">点击底部「添加持仓」</div></div>'; return; }
            var sorted = codes.slice().sort(function(a,b){ var hA=holdings[a], hB=holdings[b]; var dA=getDisplayData(a), dB=getDisplayData(b); var mvA = (dA.nav || parseFloat(hA.cost)||0) * (parseFloat(hA.shares)||0); var mvB = (dB.nav || parseFloat(hB.cost)||0) * (parseFloat(hB.shares)||0); return mvB - mvA; });

            var html = '';
            sorted.forEach(function(code) {
                var h = holdings[code];
                var d = fundDataCache[code] || {};
                var display = getDisplayData(code);
                var cost = parseFloat(h.cost) || 0;
                var shares = parseFloat(h.shares) || 0;
                var currentNav = display.nav || cost;
                var rate = display.rate || 0;
                var prevNav = rate !== 0 ? currentNav / (1 + rate/100) : currentNav;
                var marketValue = currentNav * shares;
                var todayProfit = (currentNav - prevNav) * shares;
                var todayProfitRate = prevNav !== 0 ? (todayProfit / (prevNav * shares)) * 100 : 0;
                var holdReturn = cost > 0 ? ((currentNav - cost)/cost)*100 : 0;
                var holdProfit = (currentNav - cost) * shares;
                var name = getValidName(d.name, code);
                if (!name || name === code) name = h.name || code;
                var displayName = name.length > 11 ? name.slice(0,11) + '…' : name;

                var decorClass = '';
                if (display.source === 'actual') decorClass = 'decor-actual';
                else if (display.source === 'final_estimate') decorClass = 'decor-final-estimate';
                else if (display.source === 'estimate') decorClass = 'decor-estimate';
                else decorClass = 'decor-empty';

                var metrics = [
                    { label: '日收益率', value: todayProfitRate, pct: true },
                    { label: '日盈亏', value: todayProfit, pct: false },
                    { label: '持有收益率', value: holdReturn, pct: true },
                    { label: '持有盈亏', value: holdProfit, pct: false }
                ];
                var metricHtml = metrics.map(function(m){ var val = m.value; var sign = val >= 0 ? '+' : ''; var displayVal = isNaN(val) ? '0.00' : sign + val.toFixed(2); if (m.pct) displayVal += '%'; var cls = val > 0 ? 'positive' : val < 0 ? 'negative' : 'neutral'; return '<div class="metric-item"><span class="metric-label">' + m.label + '</span><span class="metric-value ' + cls + '">' + displayVal + '</span></div>'; }).join('');

                var editAreaClass = 'fund-edit-area' + (editMode ? ' active' : '');
                var editHtml = '<div class="' + editAreaClass + '" data-code="' + code + '"><div class="edit-row"><input type="number" class="edit-input" id="editCost_' + code + '" value="' + cost.toFixed(4) + '" step="any" inputmode="decimal" placeholder="成本" /><input type="number" class="edit-input" id="editShares_' + code + '" value="' + shares.toFixed(2) + '" step="any" inputmode="decimal" placeholder="份额" /><button class="edit-delete-btn" onclick="deleteFund(\'' + code + '\')">删除</button></div><div class="edit-hint"><span class="current-cost">当前成本: ' + cost.toFixed(4) + '</span><span class="hint-tip">💡 修改后持有收益将重新计算</span></div></div>';

                html += '<div class="fund-card ' + decorClass + (editMode ? ' edit-mode' : '') + '" data-code="' + code + '"><div class="fund-content"><div class="fund-row fund-row-top"><div class="fund-name-wrap"><span class="fund-name" title="' + name + '">' + displayName + '</span></div><span class="fund-code-standalone">' + code + '</span><div class="fund-right-actions"><span class="fund-market-value"><i class="fas fa-coins coin-icon"></i> ¥' + marketValue.toFixed(2) + '</span></div></div><div class="fund-row-metrics">' + metricHtml + '</div>' + editHtml + '</div></div>';
            });
            container.innerHTML = html;
            if (editMode) { var first = container.querySelector('.edit-input'); if (first) setTimeout(function(){ first.focus(); }, 100); }
        }

        function renderAll() { renderSummary(); renderFundList(); updateBottomBar(); }

        // ---------- 刷新 ----------
        function showCheck() { var el = document.getElementById('checkPop'); if (!el) return; el.classList.remove('show'); void el.offsetWidth; el.classList.add('show'); setTimeout(function(){ el.classList.remove('show'); }, 600); }

        async function refreshData() {
            if (isUpdating) return;
            showCheck();
            isUpdating = true;
            var timeoutId = setTimeout(function() { if (isUpdating) { isUpdating = false; console.log('刷新超时，已解锁'); } }, 10000);
            try {
                var codes = Object.keys(holdings);
                if (codes.length) { await batchUpdate(codes); }
                renderAll();
            } catch(e) { console.warn('刷新失败', e); }
            finally { clearTimeout(timeoutId); isUpdating = false; }
        }

        // ---------- 编辑 ----------
        function enterEditMode() { if (!Object.keys(holdings).length) { showAlert('暂无持仓'); return; } editMode = true; renderAll(); }
        function exitEditMode() { var codes = Object.keys(holdings); var changed = false; codes.forEach(function(code){ var ci = document.getElementById('editCost_' + code); var si = document.getElementById('editShares_' + code); if (ci && si) { var nc = parseFloat(ci.value), ns = parseFloat(si.value); if (!isNaN(nc) && nc > 0 && !isNaN(ns) && ns > 0) { if (holdings[code].cost !== nc || holdings[code].shares !== ns) { holdings[code].cost = nc; holdings[code].shares = ns; changed = true; } } } }); if (changed) { saveAll(); refreshData(); } editMode = false; renderAll(); }
        function deleteFund(code) { showConfirm('确定删除 ' + code + ' 吗？').then(function(ok){ if (!ok) return; delete holdings[code]; delete fundDataCache[code]; saveAll(); renderAll(); }); }

        // ---------- 模态框 ----------
        var promptOverlay = document.getElementById('promptModalOverlay');
        var promptTitle = document.getElementById('promptTitle');
        var promptMessage = document.getElementById('promptMessage');
        var promptActions = document.getElementById('promptActions');
        function showPrompt(title, msg, btns) { return new Promise(function(resolve){ promptTitle.textContent = title || '提示'; promptMessage.textContent = msg || ''; promptActions.innerHTML = ''; btns.forEach(function(b){ var el = document.createElement('button'); el.textContent = b.text; el.className = b.cls || 'btn-confirm'; el.onclick = function(){ promptOverlay.classList.remove('active'); resolve(b.value); }; promptActions.appendChild(el); }); promptOverlay.classList.add('active'); }); }
        function showAlert(msg) { return showPrompt('提示', msg, [{ text: '确定', cls: 'btn-confirm', value: true }]); }
        function showConfirm(msg) { return showPrompt('确认', msg, [{ text: '取消', cls: 'btn-cancel', value: false }, { text: '确定', cls: 'btn-danger', value: true }]); }

        // ---------- 设置 ----------
        function setupModal() {
            var overlay = document.getElementById('modalOverlay');
            var closeBtn = document.getElementById('closeModalBtn');
            var confirmBtn = document.getElementById('confirmAddBtn');
            var openBtn = document.getElementById('openAddModalBtn');
            var codeInput = document.getElementById('fundCodeInput');
            var costInput = document.getElementById('fundCostInput');
            var sharesInput = document.getElementById('fundSharesInput');
            var closeCircle = document.getElementById('closeModalBtnCircle');
            var infoBox = document.getElementById('autoFillInfo');
            var infoText = document.getElementById('autoFillText');
            var fetchName = '';

            function openAddHandler(e) {
                e.preventDefault();
                if (editMode) return;
                var icon = openBtn.querySelector('.icon-wrap');
                if (icon) { icon.classList.remove('pop'); void icon.offsetWidth; icon.classList.add('pop'); }
                confirmBtn.disabled = true;
                codeInput.value = ''; costInput.value = ''; sharesInput.value = '';
                infoBox.classList.remove('show'); fetchName = '';
                overlay.classList.add('active');
                setTimeout(function(){ codeInput.focus(); }, 300);
            }
            openBtn.addEventListener('touchstart', openAddHandler, { passive: false });
            openBtn.addEventListener('click', openAddHandler);

            closeBtn.onclick = function(){ overlay.classList.remove('active'); };
            closeCircle.onclick = function(){ overlay.classList.remove('active'); };
            overlay.onclick = function(e){ var content = this.querySelector('.add-content'); if (content && !content.contains(e.target) && e.target !== overlay) { overlay.classList.remove('active'); } };

            codeInput.oninput = function() { var code = this.value.trim(); if (code.length === 6 && !isNaN(code)) { fetchSingle(code, 1).then(function(data){ if (data && data.name) { fetchName = data.name; infoText.textContent = '已识别：' + data.name; infoBox.classList.add('show'); confirmBtn.disabled = false; } else { infoBox.classList.remove('show'); confirmBtn.disabled = true; fetchName = ''; } }).catch(function(){ infoBox.classList.remove('show'); confirmBtn.disabled = true; }); } else { infoBox.classList.remove('show'); confirmBtn.disabled = true; fetchName = ''; } };

            confirmBtn.onclick = async function() { var code = codeInput.value.trim(); var cost = parseFloat(costInput.value); var shares = parseFloat(sharesInput.value); if (code.length !== 6) { await showAlert('请输入6位代码'); return; } if (isNaN(cost) || cost <= 0) { await showAlert('请输入有效成本价'); return; } if (isNaN(shares) || shares <= 0) { await showAlert('请输入有效份额'); return; } var name = fetchName; if (!name) { try { var d = await fetchSingle(code, 1); if (d && d.name) name = d.name; } catch(e){} } if (!name) { await showAlert('未能识别基金代码'); return; } if (holdings[code]) { var overwrite = await showConfirm('已存在 ' + name + '，是否覆盖？'); if (!overwrite) return; } holdings[code] = { cost: cost, shares: shares, name: name }; saveAll(); overlay.classList.remove('active'); await updateFund(code); renderAll(); };
        }

        function setupBackup() {
            var overlay = document.getElementById('backupModalOverlay');
            var openBtn = document.getElementById('openBackupModalBtn');
            var exportBtn = document.getElementById('exportBtn');
            var importInput = document.getElementById('importFileInput');
            var clearCacheBtn = document.getElementById('clearCacheBtn');
            var hardResetBtn = document.getElementById('hardResetBtn');
            var closeCircle = document.getElementById('closeBackupModalBtnCircle');

            function openBackupHandler(e) {
                e.preventDefault();
                if (editMode) { showAlert('请先完成编辑'); return; }
                var icon = openBtn.querySelector('.icon-wrap');
                if (icon) { icon.classList.remove('pop'); void icon.offsetWidth; icon.classList.add('pop'); }
                overlay.classList.add('active');
            }
            openBtn.addEventListener('touchstart', openBackupHandler, { passive: false });
            openBtn.addEventListener('click', openBackupHandler);

            closeCircle.onclick = function(){ overlay.classList.remove('active'); };
            overlay.onclick = function(e){ var content = this.querySelector('.backup-content'); if (content && !content.contains(e.target) && e.target !== overlay) { overlay.classList.remove('active'); } };

            exportBtn.onclick = function(e) {
                e.stopPropagation();
                var data = JSON.stringify({ watchlist: watchlist, holdings: holdings, fundDataCache: fundDataCache, accountProfitHistory: accountProfitHistory, customTags: customTags }, null, 2);
                var blob = new Blob([data], { type: 'application/json' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = '持仓配置_' + new Date().toISOString().slice(0,10) + '.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            importInput.onchange = async function(e) { e.stopPropagation(); var file = this.files[0]; if (!file) return; var reader = new FileReader(); reader.onload = async function(ev) { try { var data = JSON.parse(ev.target.result); if (data.holdings && typeof data.holdings === 'object') { var ok = await showConfirm('将导入 ' + Object.keys(data.holdings).length + ' 只基金，覆盖当前数据？'); if (ok) { holdings = data.holdings || {}; fundDataCache = data.fundDataCache || {}; saveAll(); overlay.classList.remove('active'); await refreshData(); } } else { await showAlert('配置格式无效'); } } catch(_){ await showAlert('文件解析失败'); } }; reader.readAsText(file); this.value = ''; };

            clearCacheBtn.onclick = async function(e) { e.stopPropagation(); var ok = await showConfirm('清除所有缓存数据？（持仓配置保留）'); if (ok) { fundDataCache = {}; localStorage.setItem(STORAGE_C, JSON.stringify(fundDataCache)); overlay.classList.remove('active'); await refreshData(); await showAlert('缓存已清除'); } };

            hardResetBtn.onclick = async function(e) { e.stopPropagation(); var ok = await showConfirm('⚠️ 硬重置将清除所有数据并重新加载页面，确定吗？'); if (ok) { localStorage.clear(); location.reload(true); } };
        }

        function updateBottomBar() {
            var bar = document.getElementById('bottomActions');
            var addBtn = document.getElementById('openAddModalBtn');
            var batchBtn = document.getElementById('batchEditBtn');
            var dataBtn = document.getElementById('openBackupModalBtn');
            var refreshBtn = document.getElementById('refreshBtn');

            if (editMode) {
                bar.classList.add('edit-mode');
                addBtn.style.display = 'none'; dataBtn.style.display = 'none'; refreshBtn.style.display = 'none';
                batchBtn.innerHTML = '<div class="icon-wrap"><i class="fas fa-check"></i></div><span class="label">完成编辑</span>';
                batchBtn.className = 'action-btn edit-highlight'; batchBtn.style.display = 'flex';
                batchBtn.onclick = function(){ exitEditMode(); };
            } else {
                bar.classList.remove('edit-mode');
                addBtn.style.display = 'flex'; dataBtn.style.display = 'flex'; refreshBtn.style.display = 'flex'; batchBtn.style.display = 'flex';
                addBtn.innerHTML = '<div class="icon-wrap"><i class="fas fa-plus-circle"></i></div><span class="label">添加持仓</span>'; addBtn.className = 'action-btn';
                batchBtn.innerHTML = '<div class="icon-wrap"><i class="fas fa-pen"></i></div><span class="label">批量编辑</span>'; batchBtn.className = 'action-btn'; batchBtn.onclick = function(){ enterEditMode(); };
                dataBtn.innerHTML = '<div class="icon-wrap"><i class="fas fa-database"></i></div><span class="label">数据管理</span>'; dataBtn.className = 'action-btn';
                refreshBtn.onclick = function(e) {
                    e.preventDefault();
                    var icon = this.querySelector('.icon-wrap');
                    if (icon) { icon.classList.remove('pop'); void icon.offsetWidth; icon.classList.add('pop'); }
                    refreshData();
                };
            }
        }

        // ---------- 隐私彩蛋 ----------
        var clickCount = 0, clickTimer = null;
        function setupPrivacy() {
            document.getElementById('summaryCard').addEventListener('click', function(e) {
                if (e.target.closest('button')) return;
                clearTimeout(clickTimer);
                clickCount++;
                clickTimer = setTimeout(function() {
                    if (clickCount >= 3) {
                        privacyMode = !privacyMode;
                        var els = ['todayProfitBig','totalAssets','totalProfit','totalReturn'];
                        els.forEach(function(id){ var el = document.getElementById(id); if (privacyMode) { el.classList.add('privacy'); el.textContent = '***'; } else { el.classList.remove('privacy'); } });
                        if (!privacyMode) renderAll();
                        clickCount = 0;
                    }
                }, 400);
            });
        }

        // ---------- 启动 ----------
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            setupPrivacy();
            renderAll();
            if (Object.keys(holdings).length) refreshData();
            setupModal();
            setupBackup();

            setInterval(function(){ var p = getMarketPhase(); if (p === 'OPENING' || p === 'AUCTION' || p === 'LUNCH') refreshData(); }, 60000);

            console.log('✅ 真完整版已启动（使用 jsonpgz 回调）');
        });
    </script>
</body>
</html>
