<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>持仓跟踪</title>

    <!-- ===== PWA 配置 ===== -->
    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="持仓跟踪" />
    <link rel="apple-touch-icon" href="icon-1024.png" />
    <meta name="theme-color" content="#f2f5fa" />

    <style>
        /* ===== CSS 变量 ===== */
        :root {
            --radius-md: 20px;
            --radius-sm: 12px;
            --radius-full: 50%;
            --color-bg: #f2f5fc;
            --color-card-bg: #ffffff;
            --color-primary: #0b1a33;
            --color-primary-light: #132b4a;
            --color-text: #0b1a33;
            --color-text-secondary: #6b7d98;
            --color-text-light: #94a3b8;
            --color-border: #eef2f8;
            --color-positive: #E63946;
            --color-negative: #2A9D8F;
            --color-neutral: #94a3b8;
            --color-edit-border: #d0d8e0;
            --color-edit-bg: #f8fafc;
            --shadow-card: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-summary: 0 6px 24px rgba(0, 0, 0, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        html,
        body {
            width: 100%;
            min-height: 100vh;
            background: var(--color-bg);
            display: flex;
            justify-content: center;
            padding: 4px;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 480px;
            width: 100%;
            background: #ffffff;
            border-radius: var(--radius-md);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            padding: 14px 14px 20px;
            display: flex;
            flex-direction: column;
            align-self: flex-start;
            gap: 14px;
        }

        /* ===== 摘要卡片 ===== */
        .summary-card {
            background: linear-gradient(145deg, var(--color-primary), var(--color-primary-light));
            border-radius: var(--radius-md);
            padding: 14px 20px 12px 20px;
            color: white;
            flex-shrink: 0;
            cursor: default;
            user-select: none;
            -webkit-user-select: none;
            box-shadow: var(--shadow-summary);
        }

        .summary-today {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
        }

        .summary-today .today-label {
            font-size: 13px;
            font-weight: 500;
            opacity: 0.7;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .summary-today .today-label svg {
            width: 16px;
            height: 16px;
            stroke: rgba(255, 255, 255, 0.7);
            stroke-width: 2;
            fill: none;
        }

        .summary-today .today-value {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.2;
            margin-top: 0px;
        }

        .summary-today .today-value.positive {
            color: var(--color-positive);
        }
        .summary-today .today-value.negative {
            color: var(--color-negative);
        }
        .summary-today .today-value.neutral {
            color: var(--color-text-light);
        }
        .summary-today .today-value.privacy {
            color: var(--color-text-light);
            letter-spacing: 4px;
        }

        .summary-divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.10);
            margin: 0 0 10px 0;
        }

        .summary-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .summary-stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            position: relative;
            gap: 2px;
        }

        .summary-stat-item:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 15%;
            height: 70%;
            width: 1px;
            background: rgba(255, 255, 255, 0.12);
        }

        .summary-stat-item .stat-label-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .summary-stat-item .stat-label {
            font-size: 10px;
            opacity: 0.5;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .summary-stat-item .stat-number {
            font-size: 17px;
            font-weight: 600;
            line-height: 1.3;
        }

        .summary-stat-item .stat-number.privacy {
            letter-spacing: 3px;
            color: var(--color-text-light) !important;
        }

        .stat-number.positive {
            color: var(--color-positive);
        }
        .stat-number.negative {
            color: var(--color-negative);
        }
        .stat-number.neutral {
            color: var(--color-text-light);
        }

        /* ===== 基金列表 ===== */
        .fund-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .fund-list::-webkit-scrollbar {
            width: 3px;
        }
        .fund-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .fund-list::-webkit-scrollbar-thumb {
            background: #d5dde8;
            border-radius: 10px;
        }

        /* ===== 基金卡片 ===== */
        .fund-card {
            background: var(--color-card-bg);
            border-radius: var(--radius-md);
            padding: 10px 14px 12px 14px;
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-card);
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
            transition: box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .fund-card:active {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            background: #fafcff;
        }

        .fund-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            border-radius: 0;
            transition: background 0.3s;
        }
        .fund-card.decor-actual::before {
            background: var(--color-primary);
        }
        .fund-card.decor-estimate::before {
            background: #8aabb8;
        }

        /* 第一行：名称 | 代码（中间偏右） | 市值 */
        .fund-row-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 30px;
            padding-left: 10px;
        }

        .fund-name-wrap {
            display: flex;
            align-items: center;
            flex: 0 1 auto;
            min-width: 0;
            margin-right: 8px;
        }

        .fund-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .fund-code-standalone {
            font-weight: 400;
            font-size: 10px;
            color: var(--color-text-secondary);
            background: #f0f4fc;
            padding: 0 8px;
            border-radius: var(--radius-md);
            line-height: 18px;
            flex-shrink: 0;
            margin-right: auto;
        }

        .fund-right-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .fund-market-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .fund-market-value .coin-icon {
            font-size: 12px;
            color: var(--color-text-secondary);
            opacity: 0.7;
        }

        /* 指标区域：编辑模式下隐藏 */
        .fund-row-metrics {
            display: flex;
            align-items: stretch;
            padding-left: 10px;
            height: 40px;
            position: relative;
        }

        .edit-mode .fund-row-metrics {
            display: none;
        }

        .metric-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2px 0;
            position: relative;
            min-width: 0;
        }

        .metric-item:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 10%;
            height: 80%;
            width: 1px;
            background: #e0e5ed;
        }

        .metric-item .metric-label {
            font-size: 9px;
            font-weight: 500;
            color: var(--color-text-light);
            letter-spacing: 0.2px;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .metric-item .metric-value {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .metric-item .metric-value.positive {
            color: var(--color-positive);
        }
        .metric-item .metric-value.negative {
            color: var(--color-negative);
        }
        .metric-item .metric-value.neutral {
            color: var(--color-text-light);
        }

        /* ===== 批量编辑区域 ===== */
        .fund-edit-area {
            display: none;
            padding: 8px 0 2px 10px;
            border-top: 1px dashed var(--color-border);
            flex-direction: column;
            gap: 6px;
        }

        .fund-edit-area.active {
            display: flex;
        }

        .edit-row {
            display: flex;
            gap: 8px;
            align-items: center;
            width: 100%;
            flex-wrap: nowrap;
        }

        .edit-row .edit-input {
            flex: 1;
            min-width: 0;
            height: 38px;
            padding: 6px 10px;
            font-size: 13px;
            font-family: inherit;
            border-radius: var(--radius-sm);
            border: 1px solid var(--color-edit-border);
            background: var(--color-edit-bg);
            color: var(--color-text);
            outline: none;
            transition: border 0.2s ease;
            -webkit-appearance: none;
        }

        .edit-row .edit-input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 2px rgba(11, 26, 51, 0.08);
        }

        .edit-row .edit-input::placeholder {
            color: var(--color-text-light);
            opacity: 0.6;
        }

        .edit-row .edit-delete-btn {
            flex: 0 0 auto;
            height: 38px;
            padding: 0 14px;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: var(--radius-sm);
            background: var(--color-positive);
            color: #fff;
            cursor: pointer;
            transition: opacity 0.2s ease;
            white-space: nowrap;
        }

        .edit-row .edit-delete-btn:active {
            opacity: 0.6;
            transform: scale(0.96);
        }

        .edit-hint {
            font-size: 11px;
            color: var(--color-text-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2px;
        }

        .edit-hint .current-cost {
            font-weight: 500;
            color: var(--color-text-secondary);
        }

        .edit-hint .hint-tip {
            font-size: 10px;
            color: var(--color-text-light);
            opacity: 0.7;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--color-text-secondary);
        }

        .empty-state i {
            font-size: 36px;
            color: #d5dde8;
            margin-bottom: 6px;
        }

        .empty-state p {
            font-size: 14px;
            font-weight: 500;
        }

        .empty-state .sub {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 2px;
        }

        /* ===== 底部操作栏（加高） ===== */
        .bottom-action-card {
            background: linear-gradient(145deg, var(--color-primary), var(--color-primary-light));
            border-radius: var(--radius-md);
            padding: 10px 6px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            display: flex;
            align-items: stretch;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            margin-top: 2px;
            transition: all 0.3s ease;
            justify-content: center;
            min-height: 72px;
        }

        .bottom-action-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 255, 255, 0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        .action-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 6px 4px;
            cursor: pointer;
            transition: background 0.2s ease;
            border: none;
            background: transparent;
            color: #ffffff;
            position: relative;
            border-radius: var(--radius-md);
            min-height: 52px;
        }

        .action-btn:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 15%;
            height: 70%;
            width: 1px;
            background: rgba(255, 255, 255, 0.12);
        }

        .action-btn:active {
            background: rgba(255, 255, 255, 0.06);
        }

        .action-btn .icon-wrap {
            width: 28px;
            height: 28px;
            border-radius: var(--radius-full);
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #ffffff;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: background 0.2s;
            will-change: transform;
        }

        @keyframes iconPop {
            0% {
                transform: scale(1);
            }
            35% {
                transform: scale(1.3);
            }
            60% {
                transform: scale(0.92);
            }
            100% {
                transform: scale(1);
            }
        }

        .action-btn .icon-wrap.pop {
            animation: iconPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .action-btn .label {
            font-size: 10px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.75);
            letter-spacing: 0.2px;
            white-space: nowrap;
        }

        /* 编辑模式：只显示一个"完成编辑"按钮 */
        .bottom-action-card.edit-mode .action-btn {
            display: none !important;
        }
        .bottom-action-card.edit-mode .action-btn.edit-highlight {
            display: flex !important;
            flex: 0 0 auto;
            padding: 8px 28px;
            background: transparent !important;
            border-radius: var(--radius-md);
        }
        .bottom-action-card.edit-mode .action-btn.edit-highlight .icon-wrap {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.08);
        }
        .bottom-action-card.edit-mode .action-btn.edit-highlight .label {
            color: rgba(255, 255, 255, 0.75);
        }
        .bottom-action-card.edit-mode .action-btn::after {
            display: none !important;
        }

        /* ===== 模态框 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 0;
        }
        .modal-overlay.active {
            display: flex;
        }

        .add-modal .add-content,
        .backup-modal .backup-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 32px 24px;
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 0;
            border: none;
            box-shadow: none;
            position: relative;
        }

        .add-modal .add-content h2,
        .backup-modal .backup-content h2 {
            font-size: 22px;
            font-weight: 700;
            color: #0b1a33;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 0px;
        }
        .add-modal .add-content h2 i,
        .backup-modal .backup-content h2 i {
            color: #0b1a33;
        }

        .sub-placeholder {
            height: 24px;
            flex-shrink: 0;
        }

        .add-modal .add-content .input-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }
        .add-modal .add-content .input-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(4px);
            font-size: 15px;
            color: #ffffff;
            outline: none;
            transition: 0.15s;
            -webkit-appearance: none;
        }
        .add-modal .add-content .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
            font-size: 14px;
        }
        .add-modal .add-content .input-group input:focus {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.2);
        }

        .add-modal .add-content .auto-fill-info {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-md);
            padding: 8px 14px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
            margin-top: -6px;
            margin-bottom: 2px;
            text-align: center;
        }
        .add-modal .add-content .auto-fill-info.show {
            display: block;
        }

        .add-modal .add-content .modal-actions {
            display: flex;
            gap: 12px;
            width: 100%;
            justify-content: center;
            margin-top: 12px;
        }
        .add-modal .add-content .modal-actions button {
            flex: 1;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: 0.15s;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            color: #ffffff;
        }
        .add-modal .add-content .modal-actions button:active {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0.96);
        }
        .add-modal .add-content .modal-actions .btn-cancel {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .add-modal .add-content .modal-actions .btn-confirm:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .backup-modal .backup-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }
        .backup-modal .backup-actions button,
        .backup-modal .backup-actions .file-input-wrap {
            width: 100%;
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-align: center;
            line-height: 1.3;
            transition: 0.15s;
            cursor: pointer;
            padding: 14px 16px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
        }
        .backup-modal .backup-actions .file-input-wrap {
            padding: 0;
            position: relative;
            overflow: hidden;
        }
        .backup-modal .backup-actions .file-input-wrap button {
            width: 100%;
            height: 100%;
            padding: 14px 16px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            background: transparent;
            border: none;
            backdrop-filter: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
        }
        .backup-modal .backup-actions .file-input-wrap input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .backup-modal .backup-actions button:active,
        .backup-modal .backup-actions .file-input-wrap:active {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0.96);
        }

        .modal-close-btn {
            position: absolute;
            bottom: 48px;
            left: 50%;
            transform: translateX(-50%);
            width: 48px;
            height: 48px;
            border-radius: var(--radius-full);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            z-index: 10;
        }
        .modal-close-btn:active {
            transform: translateX(-50%) scale(0.88);
            background: rgba(255, 255, 255, 0.25);
        }
        .modal-close-btn svg {
            width: 24px;
            height: 24px;
            stroke: rgba(255, 255, 255, 0.7);
            stroke-width: 2;
            fill: none;
        }

        .prompt-modal .prompt-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 24px;
            width: 100%;
            max-width: 340px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--radius-md);
            border: none;
        }
        .prompt-modal .prompt-content h2 {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;

        .prompt-modal .prompt-content .modal-actions .btn-cancel:active {

    <!-- ===== 通用提示 模态框 ===== -->
    <div class="modal-overlay prompt-modal" id="promptModalOverlay">
        <div class="prompt-content">
            <h2 id="promptTitle">提示</h2>
            <div class="prompt-message" id="promptMessage">消息内容</div>
            <div class="modal-actions" id="promptActions"></div>
        </div>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <script>
        // ================================================================
        //  Fund Holder · 精简版（刷新优化版）
        //  超时6秒，重试3次，全部并发
        // ================================================================

        var STORAGE_H = 'capsule_holdings';
        var STORAGE_C = 'capsule_cache';

        var holdings = {};
        var cache = {};
        var isUpdating = false;
        var privacyMode = false;
        var editMode = false;

        function loadData() {
            try { holdings = JSON.parse(localStorage.getItem(STORAGE_H)) || {}; } catch (e) { holdings = {}; }
            try { cache = JSON.parse(localStorage.getItem(STORAGE_C)) || {}; } catch (e) { cache = {}; }
        }

        function saveAll() {
            localStorage.setItem(STORAGE_H, JSON.stringify(holdings));
            localStorage.setItem(STORAGE_C, JSON.stringify(cache));
        }
        loadData();

        var HOLIDAYS = new Set([
            '2026-01-01', '2026-01-02', '2026-01-03',
            '2026-02-15', '2026-02-16', '2026-02-17', '2026-02-18', '2026-02-19',
            '2026-02-20', '2026-02-21', '2026-02-22', '2026-02-23',
            '2026-04-04', '2026-04-05', '2026-04-06',
            '2026-05-01', '2026-05-02', '2026-05-03', '2026-05-04', '2026-05-05',
            '2026-06-19', '2026-06-20', '2026-06-21',
            '2026-09-25', '2026-09-26', '2026-09-27',
            '2026-10-01', '2026-10-02', '2026-10-03', '2026-10-04',
            '2026-10-05', '2026-10-06', '2026-10-07'
        ]);

        function isTradingDay() {
            var d = new Date();
            var ds = d.toISOString().slice(0, 10);
            if (d.getDay() === 0 || d.getDay() === 6) return false;
            return !HOLIDAYS.has(ds);
        }

        function getMinutes() {
            var now = new Date();
            return now.getHours() * 60 + now.getMinutes();
        }

        function isTradingTime() {
            if (!isTradingDay()) return false;
            var m = getMinutes();
            return m >= 555 && m < 915;
        }

        function isValidName(name) {
            if (!name || typeof name !== 'string') return false;
            var trimmed = name.trim();
            if (trimmed.length < 2) return false;
            if (/^[\d\s]+$/.test(trimmed)) return false;
            if (/^[．·\-_]+$/.test(trimmed)) return false;
            return true;
        }

        function getValidName(name, code) {
            return isValidName(name) ? name.trim() : code;
        }

        function truncateName(name) {
            if (!name) return '';
            var trimmed = name.trim();
            if (trimmed.length <= 11) return trimmed;
            return trimmed.slice(0, 11) + '…';
        }

        // ===== 天天基金：超时6秒，重试3次 =====
        function fetchTTFund(code, retries) {
            if (retries === undefined) retries = 3;
            return new Promise(function(resolve) {
                var attempt = function(remain) {
                    var script = document.createElement('script');
                    var timer = setTimeout(function() { cleanup();
                        if (remain > 0) attempt(remain - 1);
                        else resolve(null); }, 6000);
                    window.jsonpgz = function(data) {
                        if (data && data.fundcode === code) {
                            cleanup();
                            resolve(data);
                        }
                    };

                    function cleanup() {
                        clearTimeout(timer);
                        if (script.parentNode) script.remove();
                        delete window.jsonpgz;
                    }
                    script.src = 'https://fundgz.1234567.com.cn/js/' + code + '.js?rt=' + Date.now();
                    script.onerror = function() { cleanup();
                        if (remain > 0) attempt(remain - 1);
                        else resolve(null); };
                    document.head.appendChild(script);
                };
                attempt(retries);
            });
        }

        // ===== 腾讯证券：超时6秒 =====
        function fetchTencentNav(code) {
            return new Promise(function(resolve) {
                var script = document.createElement('script');
                var timer = setTimeout(function() { cleanup();
                    resolve(null); }, 6000);
                var varName = 'v_jj' + code;

                function cleanup() {
                    clearTimeout(timer);
                    if (script.parentNode) script.remove();
                }

                script.src = 'https://qt.gtimg.cn/q=jj' + code;
                script.onload = function() {
                    cleanup();
                    var raw = window[varName];
                    if (raw && typeof raw === 'string') {
                        var parts = raw.split('~');
                        var nav = parseFloat(parts[5]) || 0;
                        var rate = parseFloat(parts[7]) || 0;
                        var date = parts[8] || '';
                        var name = parts[1] || '';
                        if (!isValidName(name)) name = code;
                        if (nav > 0 && date) {
                            resolve({ nav: nav, rate: rate, date: date, name: name });
                        } else {
                            resolve(null);
                        }
                    } else {
                        resolve(null);
                    }
                };
                script.onerror = function() { cleanup();
                    resolve(null); };
                document.head.appendChild(script);
            });
        }

        // ===== 核心：获取数据（skipCache 控制是否跳过缓存） =====
        async function fetchFundDataOnly(code, skipCache) {
            var today = new Date().toISOString().substring(0, 10);
            var d = cache[code] || {};

            if (!skipCache && d.actualDate === today && parseFloat(d.actualNav) > 0) {
                return {
                    name: getValidName(d.name, code),
                    nav: parseFloat(d.actualNav),
                    changePercent: parseFloat(d.actualRate) || 0,
                    navDate: today,
                    gsz: parseFloat(d.gsz) || 0,
                    gszzl: parseFloat(d.gszzl) || 0,
                    source: 'cache'
                };
            }

            var isTrading = isTradingTime();

            if (isTrading) {
                var ttData = await fetchTTFund(code, 3);
                if (ttData && ttData.gsz) {
                    var name = getValidName(ttData.name, code);
                    return {
                        name: name,
                        gsz: parseFloat(ttData.gsz) || 0,
                        gszzl: parseFloat(ttData.gszzl) || 0,
                        nav: parseFloat(ttData.dwjz) || 0,
                        changePercent: parseFloat(ttData.gszzl) || 0,
                        navDate: ttData.jzrq || '',
                        source: 'tt'
                    };
                }
                if (!skipCache && d.gsz && parseFloat(d.gsz) > 0) {
                    return {
                        name: getValidName(d.name, code),
                        gsz: parseFloat(d.gsz) || 0,
                        gszzl: parseFloat(d.gszzl) || 0,
                        nav: parseFloat(d.actualNav) || 0,
                        changePercent: parseFloat(d.gszzl) || 0,
                        navDate: d.actualDate || '',
                        source: 'cache_est'
                    };
                }
                return null;
            }

            var txData = await fetchTencentNav(code);
            if (txData && txData.nav > 0) {
                var name = getValidName(txData.name, code);
                return {
                    name: name,
                    nav: txData.nav,
                    changePercent: txData.rate,
                    navDate: txData.date,
                    gsz: txData.nav,
                    gszzl: txData.rate,
                    source: 'tencent'
                };
            }

            if (!skipCache && d.actualNav && parseFloat(d.actualNav) > 0) {
                return {
                    name: getValidName(d.name, code),
                    nav: parseFloat(d.actualNav),
                    changePercent: parseFloat(d.actualRate) || 0,
                    navDate: d.actualDate || '',
                    gsz: parseFloat(d.gsz) || 0,
                    gszzl: parseFloat(d.gszzl) || 0,
                    source: 'cached_nav'
                };
            }

            if (!skipCache && d.gsz && parseFloat(d.gsz) > 0) {
                return {
                    name: getValidName(d.name, code),
                    gsz: parseFloat(d.gsz) || 0,
                    gszzl: parseFloat(d.gszzl) || 0,
                    nav: parseFloat(d.actualNav) || 0,
                    changePercent: parseFloat(d.gszzl) || 0,
                    navDate: d.actualDate || '',
                    source: 'cache_est'
                };
            }

            return null;
        }

        // ===== 更新单只基金（only tencent/cached_nav 写入 actualNav） =====
        async function updateFund(code, skipCache) {
            var old = cache[code] || {};
            var data = await fetchFundDataOnly(code, skipCache);
            if (!data) {
                if (!old.name) {
                    cache[code] = { name: code, gsz: 0, gszzl: 0, actualNav: '0', actualRate: 0, actualDate: '',
                    source: 'none' };
                }
                saveAll();
                return cache[code];
            }

            var name = getValidName(data.name, code);
            var hasExistingNav = old.actualNav && parseFloat(old.actualNav) > 0;
            var isNewNav = data.source === 'tencent' || data.source === 'cached_nav';

            var newEntry = {
                name: name,
                gsz: data.gsz || old.gsz || 0,
                gszzl: data.gszzl !== undefined ? data.gszzl : old.gszzl || 0,
                actualNav: old.actualNav,
                actualRate: old.actualRate,
                actualDate: old.actualDate,
                source: old.source || 'tt'
            };

            if (isNewNav && data.nav > 0) {
                newEntry.actualNav = String(data.nav);
                newEntry.actualRate = data.changePercent !== undefined ? data.changePercent : old.actualRate;
                newEntry.actualDate = data.navDate || old.actualDate || '';
                newEntry.source = data.source || 'tencent';
            }

            cache[code] = newEntry;
            saveAll();
            return cache[code];
        }

        // ===== 批量更新：全部并发 =====
        async function batchUpdate(codes, skipCache) {
            if (!codes.length) return;
            // 全部同时请求
            await Promise.allSettled(codes.map(function(code) {
                return updateFund(code, skipCache);
            }));
            renderAll();
        }

        async function silentUpdate() {
            try {
                var codes = Object.keys(holdings);
                if (codes.length) {
                    await batchUpdate(codes, false);
                }
            } catch (e) {
                console.warn('后台更新失败', e);
            }
        }

        async function forceUpdate() {
            try {
                var codes = Object.keys(holdings);
                if (codes.length) {
                    await batchUpdate(codes, true);
                }
            } catch (e) {
                console.warn('强制更新失败', e);
            }
        }

        async function refreshWithCache(force) {
            if (isUpdating) return;
            isUpdating = true;
            showUpdating(true);

            if (force) {
                await forceUpdate();
            } else {
                renderAll();
                await silentUpdate();
            }

            showUpdating(false);
            isUpdating = false;
            scheduleAutoRefresh();
        }

        var autoTimer = null;

        function startAutoRefresh() {
            stopAutoRefresh();
            if (!isTradingDay()) return;
            if (isTradingTime()) refreshWithCache(false);
            autoTimer = setInterval(function() {
                if (isTradingTime()) refreshWithCache(false);
                else stopAutoRefresh();
            }, 60000);
        }

        function stopAutoRefresh() {
            if (autoTimer) { clearInterval(autoTimer);
                autoTimer = null; }
        }

        function scheduleAutoRefresh() {}

        function getDisplay(code) {
            var d = cache[code] || {};
            var nav = parseFloat(d.actualNav);
            if (!isNaN(nav) && nav > 0) {
                var rate = parseFloat(d.actualRate);
                if (isNaN(rate) || rate === 0) {
                    rate = parseFloat(d.gszzl) || 0;
                }
                return { nav: nav, rate: rate, source: 'actual' };
            }
            var estNav = parseFloat(d.gsz);
            if (!isNaN(estNav) && estNav > 0) {
                return { nav: estNav, rate: parseFloat(d.gszzl) || 0, source: 'estimate' };
            }
            var h = holdings[code] || {};
            var cost = parseFloat(h.cost) || 0;
            if (cost > 0) {
                return { nav: cost, rate: 0, source: 'cost' };
            }
            return { nav: null, rate: null, source: 'none' };
        }

        function computeSummary() {
            var codes = Object.keys(holdings);
            if (!codes.length) return { totalAsset: 0, todayProfit: 0, totalProfit: 0, totalYield: 0 };
            var totalCost = 0,
                totalMV = 0,
                todayProfit = 0;
            codes.forEach(function(code) {
                var h = holdings[code];
                var cost = parseFloat(h.cost) || 0;
                var shares = parseFloat(h.shares) || 0;
                totalCost += cost * shares;
                var display = getDisplay(code);
                var nav = display.nav || cost;
                var rate = display.rate || 0;
                var prev = rate !== 0 ? nav / (1 + rate / 100) : nav;
                var mv = nav * shares;
                totalMV += mv;
                todayProfit += (nav - prev) * shares;
            });
            var totalProfit = totalMV - totalCost;
            var totalYield = totalCost > 0 ? (totalProfit / totalCost * 100) : 0;
            return { totalAsset: totalMV, todayProfit: todayProfit, totalProfit: totalProfit, totalYield: totalYield };
        }

        function allFundsUpdated() {
            var codes = Object.keys(holdings);
            if (!codes.length) return false;
            return codes.every(function(code) {
                var d = cache[code] || {};
                return parseFloat(d.actualNav) > 0;
            });
        }

        function applyPrivacyMode() {
            var todayEl = document.getElementById('todayProfitBig');
            var totalAssetsEl = document.getElementById('totalAssets');
            var totalProfitEl = document.getElementById('totalProfit');
            var totalReturnEl = document.getElementById('totalReturn');
            if (privacyMode) {
                todayEl.classList.add('privacy');
                todayEl.textContent = '***';
                totalAssetsEl.classList.add('privacy');
                totalAssetsEl.textContent = '***';
                totalProfitEl.classList.add('privacy');
                totalProfitEl.textContent = '***';
                totalReturnEl.classList.add('privacy');
                totalReturnEl.textContent = '***';
            } else {
                todayEl.classList.remove('privacy');
                totalAssetsEl.classList.remove('privacy');
                totalProfitEl.classList.remove('privacy');
                totalReturnEl.classList.remove('privacy');
                renderAll();
            }
        }

        var clickCount = 0;
        var clickTimer = null;

        function setupPrivacyEasterEgg() {
            var card = document.getElementById('summaryCard');
            card.addEventListener('click', function(e) {
                if (e.target.closest('button')) return;
                clearTimeout(clickTimer);
                clickCount++;
                clickTimer = setTimeout(function() {
                    if (clickCount >= 3) {
                        privacyMode = !privacyMode;
                        applyPrivacyMode();
                    }
                    clickCount = 0;
                }, 400);
            });
        }

        function renderSummary() {
            if (privacyMode) return;
            var s = computeSummary();
            var codes = Object.keys(holdings);
            var isAllUpdated = allFundsUpdated();
            var todayEl = document.getElementById('todayProfitBig');
            if (codes.length === 0) {
                todayEl.textContent = '+0.00';
                todayEl.className = 'today-value neutral';
                document.getElementById('todayLabel').innerHTML =
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></svg> 今日预估盈亏';
            } else {
                var val = s.todayProfit;
                todayEl.textContent = (val >= 0 ? '+' : '') + val.toFixed(2);
                todayEl.className = 'today-value ' + (val > 0 ? 'positive' : val < 0 ? 'negative' : 'neutral');
                var label = document.getElementById('todayLabel');
                var icon =
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></svg>';
                label.innerHTML = icon + (isAllUpdated ? '今日实际盈亏' : '今日预估盈亏');
            }
            var setStat = function(id, val, isPct) {
                var el = document.getElementById(id);
                if (codes.length === 0) {
                    el.textContent = isPct ? '0.00%' : '0.00';
                    el.className = 'stat-number neutral';
                    return;
                }
                if (isPct && val === 0) {
                    el.textContent = '--';
                    el.className = 'stat-number neutral';
                    return;
                }
                var prefix = !isPct && val >= 0 ? '+' : '';
                el.textContent = prefix + val.toFixed(2) + (isPct ? '%' : '');
                var cls = val > 0 ? 'positive' : val < 0 ? 'negative' : 'neutral';
                el.className = 'stat-number ' + cls;
            };
            setStat('totalAssets', s.totalAsset, false);
            setStat('totalProfit', s.totalProfit, false);
            setStat('totalReturn', s.totalYield, true);
        }

        function renderFundList() {
            var container = document.getElementById('fundList');
            var codes = Object.keys(holdings);
            if (codes.length === 0) {
                container.innerHTML =
                    '<div class="empty-state"><i class="fas fa-inbox"></i><p>还没有持仓基金</p><div class="sub">点击底部「添加持仓」</div></div>';
                return;
            }
            var sorted = codes.slice().sort(function(a, b) {
                var hA = holdings[a],
                    hB = holdings[b];
                var dA = getDisplay(a),
                    dB = getDisplay(b);
                var mvA = (dA.nav || parseFloat(hA.cost) || 0) * (parseFloat(hA.shares) || 0);
                var mvB = (dB.nav || parseFloat(hB.cost) || 0) * (parseFloat(hB.shares) || 0);
                return mvB - mvA;
            });
            var html = '';
            sorted.forEach(function(code) {
                var h = holdings[code];
                var d = cache[code] || {};
                var display = getDisplay(code);
                var cost = parseFloat(h.cost) || 0;
                var shares = parseFloat(h.shares) || 0;
                var currentNav = display.nav || cost;
                var rate = display.rate || 0;
                var prevNav = rate !== 0 ? currentNav / (1 + rate / 100) : currentNav;
                var marketValue = currentNav * shares;
                var todayProfit = (currentNav - prevNav) * shares;
                var todayProfitRate = prevNav !== 0 ? (todayProfit / (prevNav * shares)) * 100 : 0;
                var holdReturn = cost > 0 ? ((currentNav - cost) / cost) * 100 : 0;
                var holdProfit = (currentNav - cost) * shares;
                var name = getValidName(d.name, code);
                if (!isValidName(name) && isValidName(h.name)) name = h.name;
                if (!isValidName(name)) name = code;
                var displayName = truncateName(name);
                var isActual = display.source === 'actual';
                var decorClass = isActual ? 'decor-actual' : 'decor-estimate';
                var metrics = [
                    { label: '日收益率', value: todayProfitRate, pct: true },
                    { label: '日盈亏', value: todayProfit, pct: false },
                    { label: '持有收益率', value: holdReturn, pct: true },
                    { label: '持有盈亏', value: holdProfit, pct: false }
                ];
                var metricHtml = metrics.map(function(m) {
                    var val = m.value;
                    var sign = val >= 0 ? '+' : '';
                    var displayVal = isNaN(val) ? '0.00' : sign + val.toFixed(2);
                    if (m.pct) displayVal += '%';
                    var cls = val > 0 ? 'positive' : val < 0 ? 'negative' : 'neutral';
                    return '<div class="metric-item"><span class="metric-label">' + m.label +
                        '</span><span class="metric-value ' + cls + '">' + displayVal + '</span></div>';
                }).join('');
                var editAreaClass = 'fund-edit-area' + (editMode ? ' active' : '');
                var editHtml =
                    '<div class="' + editAreaClass + '" data-code="' + code + '">' +
                    '<div class="edit-row">' +
                    '<input type="number" class="edit-input" id="editCost_' + code + '" value="' + cost.toFixed(4) +
                    '" step="any" inputmode="decimal" placeholder="成本" />' +
                    '<input type="number" class="edit-input" id="editShares_' + code + '" value="' + shares.toFixed(2) +
                    '" step="any" inputmode="decimal" placeholder="份额" />' +
                    '<button class="edit-delete-btn" onclick="deleteFund(\'' + code + '\')">删除</button>' +
                    '</div>' +
                    '<div class="edit-hint">' +
                    '<span class="current-cost">当前成本: ' + cost.toFixed(4) + '</span>' +
                    '<span class="hint-tip">💡 修改后持有收益将重新计算</span>' +
                    '</div>' +
                    '</div>';
                var cardClass = 'fund-card ' + decorClass + (editMode ? ' edit-mode' : '');
                html +=
                    '<div class="' + cardClass + '" data-code="' + code + '">' +
                    '<div class="fund-content">' +
                    '<div class="fund-row fund-row-top">' +
                    '<div class="fund-name-wrap">' +
                    '<span class="fund-name" title="' + name + '">' + displayName + '</span>' +
                    '</div>' +
                    '<span class="fund-code-standalone">' + code + '</span>' +
                    '<div class="fund-right-actions">' +
                    '<span class="fund-market-value">' +
                    '<i class="fas fa-coins coin-icon"></i> ¥' + marketValue.toFixed(2) +
                    '</span>' +
                    '</div>' +
                    '</div>' +
                    '<div class="fund-row-metrics">' + metricHtml + '</div>' +
                    editHtml +
                    '</div>' +
                    '</div>';
            });
            container.innerHTML = html;
            if (editMode) {
                var firstInput = container.querySelector('.edit-input');
                if (firstInput) setTimeout(function() { firstInput.focus(); }, 100);
            }
        }

        function renderAll() {
            renderSummary();
            renderFundList();
            updateBottomBar();
        }

        function updateBottomBar() {
            var bottomBar = document.getElementById('bottomActions');
            var addBtn = document.getElementById('openAddModalBtn');
            var batchBtn = document.getElementById('batchEditBtn');
            var dataBtn = document.getElementById('openBackupModalBtn');
            var refreshBtn = document.getElementById('refreshBtn');

            if (editMode) {
                bottomBar.classList.add('edit-mode');
                addBtn.style.display = 'none';
                dataBtn.style.display = 'none';
                refreshBtn.style.display = 'none';
                batchBtn.innerHTML =
                    '<div class="icon-wrap"><i class="fas fa-check"></i></div><span class="label">完成编辑</span>';
                batchBtn.className = 'action-btn edit-highlight';
                batchBtn.style.display = 'flex';
                batchBtn.onclick = function() { exitEditMode(); };
            } else {
                bottomBar.classList.remove('edit-mode');
                addBtn.style.display = 'flex';
                dataBtn.style.display = 'flex';
                refreshBtn.style.display = 'flex';
                batchBtn.style.display = 'flex';
                addBtn.innerHTML =
                    '<div class="icon-wrap"><i class="fas fa-plus-circle"></i></div><span class="label">添加持仓</span>';
                addBtn.className = 'action-btn';
                addBtn.onclick = function() { document.getElementById('openAddModalBtn').click(); };
                batchBtn.innerHTML =
                    '<div class="icon-wrap"><i class="fas fa-pen"></i></div><span class="label">批量编辑</span>';
                batchBtn.className = 'action-btn';
                batchBtn.onclick = function() { enterEditMode(); };
                dataBtn.innerHTML =
                    '<div class="icon-wrap"><i class="fas fa-database"></i></div><span class="label">数据管理</span>';
                dataBtn.className = 'action-btn';
                dataBtn.onclick = function() { document.getElementById('openBackupModalBtn').click(); };
                refreshBtn.onclick = function() {
                    var icon = this.querySelector('.icon-wrap');
                    if (icon) {
                        icon.classList.remove('pop');
                        void icon.offsetWidth;
                        icon.classList.add('pop');
                    }
                    refreshWithCache(true);
                };
            }
        }

        function enterEditMode() {
            if (Object.keys(holdings).length === 0) {
                showAlert('暂无持仓，请先添加基金');
                return;
            }
            editMode = true;
            renderAll();
        }

        function exitEditMode() {
            var codes = Object.keys(holdings);
            var hasChanges = false;
            codes.forEach(function(code) {
                var costInput = document.getElementById('editCost_' + code);
                var sharesInput = document.getElementById('editShares_' + code);
                if (costInput && sharesInput) {
                    var newCost = parseFloat(costInput.value);
                    var newShares = parseFloat(sharesInput.value);
                    if (!isNaN(newCost) && newCost > 0 && !isNaN(newShares) && newShares > 0) {
                        if (holdings[code].cost !== newCost || holdings[code].shares !== newShares) {
                            holdings[code].cost = newCost;
                            holdings[code].shares = newShares;
                            hasChanges = true;
                        }
                    }
                }
            });
            if (hasChanges) {
                saveAll();
                silentUpdate().then(function() {
                    renderAll();
                });
            }
            editMode = false;
            renderAll();
        }

        function deleteFund(code) {
            showConfirm('确定要删除 ' + code + ' 吗？', '删除基金').then(function(confirmed) {
                if (!confirmed) return;
                delete holdings[code];
                delete cache[code];
                saveAll();
                renderAll();
            });
        }

        // ===== 模态框工具 =====
        var promptOverlay = document.getElementById('promptModalOverlay');
        var promptTitle = document.getElementById('promptTitle');
        var promptMessage = document.getElementById('promptMessage');
        var promptActions = document.getElementById('promptActions');

        function showPrompt(title, message, buttons) {
            return new Promise(function(resolve) {
                promptTitle.textContent = title || '提示';
                promptMessage.textContent = message || '';
                promptActions.innerHTML = '';
                buttons.forEach(function(btn) {
                    var el = document.createElement('button');
                    el.textContent = btn.text;
                    el.className = btn.className || 'btn-confirm';
                    el.addEventListener('click', function() {
                        closePrompt();
                        resolve(btn.value);
                    });
                    promptActions.appendChild(el);
                });
                promptOverlay.classList.add('active');
            });
        }

        function closePrompt() { promptOverlay.classList.remove('active'); }

        function showAlert(message, title) {
            if (title === undefined) title = '提示';
            return showPrompt(title, message, [{ text: '确定', className: 'btn-confirm', value: true }]);
        }

        function showConfirm(message, title) {
            if (title === undefined) title = '确认操作';
            return showPrompt(title, message, [
                { text: '取消', className: 'btn-cancel', value: false },
                { text: '确定', className: 'btn-danger', value: true }
            ]);
        }

        promptOverlay.addEventListener('click', function(e) {
            if (e.target === promptOverlay && promptActions.children.length === 1) {
                var btn = promptActions.querySelector('.btn-confirm');
                if (btn) btn.click();
            }
        });

        // ===== 添加基金自动识别 =====
        var currentFetchName = '';

        async function autoFillFromCode(code) {
            var infoBox = document.getElementById('autoFillInfo');
            var infoText = document.getElementById('autoFillText');
            var confirmBtn = document.getElementById('confirmAddBtn');
            if (code.length !== 6 || isNaN(code)) {
                infoBox.classList.remove('show');
                confirmBtn.disabled = true;
                currentFetchName = '';
                return;
            }
            try {
                var data = await fetchTTFund(code, 2);
                if (data && data.name) {
                    currentFetchName = data.name;
                    infoText.textContent = '已识别：' + data.name;
                    infoBox.style.borderColor = 'rgba(255,255,255,0.2)';
                    infoBox.classList.add('show');
                    confirmBtn.disabled = false;
                } else {
                    infoBox.classList.remove('show');
                    confirmBtn.disabled = true;
                    currentFetchName = '';
                }
            } catch (e) {
                infoBox.classList.remove('show');
                confirmBtn.disabled = true;
                currentFetchName = '';
            }
        }

        function setupModal() {
            var overlay = document.getElementById('modalOverlay');
            var closeBtn = document.getElementById('closeModalBtn');
            var confirmBtn = document.getElementById('confirmAddBtn');
            var openBtn = document.getElementById('openAddModalBtn');
            var codeInput = document.getElementById('fundCodeInput');
            var costInput = document.getElementById('fundCostInput');
            var sharesInput = document.getElementById('fundSharesInput');
            var closeCircle = document.getElementById('closeModalBtnCircle');

            openBtn.addEventListener('click', function() {
                if (editMode) return;
                var icon = this.querySelector('.icon-wrap');
                if (icon) {
                    icon.classList.remove('pop');
                    void icon.offsetWidth;
                    icon.classList.add('pop');
                }
                confirmBtn.dataset.editCode = '';
                confirmBtn.textContent = '确认添加';
                confirmBtn.disabled = true;
                codeInput.value = '';
                costInput.value = '';
                sharesInput.value = '';
                document.getElementById('autoFillInfo').classList.remove('show');
                currentFetchName = '';
                overlay.classList.add('active');
                setTimeout(function() { codeInput.focus(); }, 300);
            });

            closeBtn.addEventListener('click', function() { overlay.classList.remove('active'); });
            closeCircle.addEventListener('click', function() { overlay.classList.remove('active'); });

            overlay.addEventListener('click', function(e) {
                var content = this.querySelector('.add-content');
                if (content && !content.contains(e.target)) {
                    this.classList.remove('active');
                }
            });

            codeInput.addEventListener('input', function() {
                var code = this.value.trim();
                if (code.length === 6 && !isNaN(code)) {
                    autoFillFromCode(code);
                } else {
                    document.getElementById('autoFillInfo').classList.remove('show');
                    confirmBtn.disabled = true;
                    currentFetchName = '';
                }
            });

            confirmBtn.addEventListener('click', async function() {
                var code = codeInput.value.trim();
                var cost = parseFloat(costInput.value);
                var shares = parseFloat(sharesInput.value);
                if (code.length !== 6) { await showAlert('请输入6位基金代码'); return; }
                if (isNaN(cost) || cost <= 0) { await showAlert('请输入有效的成本价'); return; }
                if (isNaN(shares) || shares <= 0) { await showAlert('请输入有效的持有份额'); return; }
                var name = currentFetchName;
                if (!name) {
                    try {
                        var data = await fetchTTFund(code, 2);
                        if (data && data.name) name = data.name;
                    } catch (_) {}
                }
                if (!name) {
                    await showAlert('未能识别基金代码，请确认正确后重试');
                    return;
                }
                var editCode = confirmBtn.dataset.editCode;
                if (editCode) {
                    if (editCode !== code) {
                        delete holdings[editCode];
                        delete cache[editCode];
                    }
                    holdings[code] = { cost: cost, shares: shares, name: name };
                } else {
                    if (holdings[code]) {
                        var overwrite = await showConfirm('已存在 ' + name + '(' + code + ')，是否覆盖？');
                        if (!overwrite) return;
                    }
                    holdings[code] = { cost: cost, shares: shares, name: name };
                }
                saveAll();
                overlay.classList.remove('active');
                await updateFund(code);
                renderAll();
            });
        }

        function setupBackup() {
            var overlay = document.getElementById('backupModalOverlay');
            var openBtn = document.getElementById('openBackupModalBtn');
            var exportBtn = document.getElementById('exportBtn');
            var importInput = document.getElementById('importFileInput');
            var clearCacheBtn = document.getElementById('clearCacheBtn');
            var closeCircle = document.getElementById('closeBackupModalBtnCircle');

            openBtn.addEventListener('click', function() {
                if (editMode) {
                    showAlert('请先完成编辑再操作数据管理');
                    return;
                }
                var icon = this.querySelector('.icon-wrap');
                if (icon) {
                    icon.classList.remove('pop');
                    void icon.offsetWidth;
                    icon.classList.add('pop');
                }
                overlay.classList.add('active');
            });

            closeCircle.addEventListener('click', function() { overlay.classList.remove('active'); });

            overlay.addEventListener('click', function(e) {
                var content = this.querySelector('.backup-content');
                if (content && !content.contains(e.target)) {
                    this.classList.remove('active');
                }
            });

            exportBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                var data = JSON.stringify({ holdings: holdings, cache: cache }, null, 2);
                var blob = new Blob([data], { type: 'application/json' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = '持仓配置_' + new Date().toISOString().slice(0, 10) + '.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });

            importInput.addEventListener('change', async function(e) {
                e.stopPropagation();
                var file = this.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = async function(ev) {
                    try {
                        var data = JSON.parse(ev.target.result);
                        if (data.holdings && typeof data.holdings === 'object') {
                            var confirmed = await showConfirm('将导入 ' + Object.keys(data.holdings).length +
                                ' 只基金配置，覆盖当前所有数据，确定吗？');
                            if (confirmed) {
                                holdings = data.holdings || {};
                                cache = data.cache || {};
                                saveAll();
                                overlay.classList.remove('active');
                                await refreshWithCache(false);
                            }
                        } else {
                            await showAlert('配置格式无效，请检查文件');
                        }
                    } catch (_) {
                        await showAlert('文件解析失败，请确保是有效的 JSON 文件');
                    }
                };
                reader.readAsText(file);
                this.value = '';
            });

            clearCacheBtn.addEventListener('click', async function(e) {
                e.stopPropagation();
                var confirmed = await showConfirm('确定要清除所有缓存数据吗？\n（持仓配置不会被删除）', '清除缓存');
                if (confirmed) {
                    cache = {};
                    localStorage.setItem(STORAGE_C, JSON.stringify(cache));
                    overlay.classList.remove('active');
                    renderAll();
                    await showAlert('缓存已清除');
                }
            });
        }

        function showUpdating(show) {
            var tip = document.getElementById('updatingTip');
            var btn = document.getElementById('refreshBtn');
            var icon = btn ? btn.querySelector('.icon-wrap i') : null;
            if (show) {
                tip.classList.add('show');
                btn.classList.add('refresh-loading');
                if (icon) icon.className = 'fas fa-spinner fa-spin';
            } else {
                tip.classList.remove('show');
                btn.classList.remove('refresh-loading');
                if (icon) icon.className = 'fas fa-sync-alt';
            }
        }

        function registerSW() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(function() { console.log('Service Worker 注册成功'); })
                    .catch(function() { console.log('Service Worker 注册失败'); });
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            setupPrivacyEasterEgg();
            renderAll();

            if (Object.keys(holdings).length > 0) {
                var hasCache = Object.keys(cache).length > 0;
                if (!hasCache) {
                    refreshWithCache(false).then(function() {
                        if (isTradingTime()) startAutoRefresh();
                    });
                } else {
                    silentUpdate().then(function() {
                        if (isTradingTime()) startAutoRefresh();
                    });
                }
            }

            setupModal();
            setupBackup();

            var bottomBar = document.getElementById('bottomActions');
            bottomBar.addEventListener('dblclick', function(e) {
                if (!editMode) {
                    enterEditMode();
                }
            });

            setInterval(function() {
                if (isTradingTime() && !autoTimer) startAutoRefresh();
                if (!isTradingTime() && autoTimer) stopAutoRefresh();
            }, 30000);

            registerSW();

            console.log('✅ 刷新优化版：超时6s，重试3次，全部并发');
        });
    </script>
</body>
</html>
